async function carregarAvisosDaPlanilha() {
  if (!CONFIG.csvAvisos) return null;
  const texto = await fetchCSV(CONFIG.csvAvisos);
  if (!texto) return null;
  if (texto.trim().startsWith('<') || texto.includes('<!DOCTYPE')) {
    console.error('❌ csvAvisos retornou HTML, não CSV.');
    return null;
  }
  const linhas = parseCSV(texto);
  if (linhas.length < 2) return [];

  // Detecta cabeçalho
  let idxCab = 0;
  for (let i = 0; i < Math.min(linhas.length, 5); i++) {
    const l = linhas[i].map(c => (c || '').toUpperCase());
    if (l.some(c => c.includes('TÍTULO') || c.includes('TITULO') || c.includes('MENSAGEM') || c.includes('AVISO'))) {
      idxCab = i;
      break;
    }
  }
  const cab = linhas[idxCab].map(c => (c || '').toUpperCase());
  const colTitulo    = cab.findIndex(c => c.includes('TÍTULO') || c.includes('TITULO') || c.includes('AVISO'));
  const colMensagem  = cab.findIndex(c => c.includes('MENSAGEM') || c.includes('DESCRI') || c.includes('CONTE'));
  const colTipo      = cab.findIndex(c => c.includes('TIPO') || c.includes('CATEG'));
  const colData      = cab.findIndex(c => c.includes('DATA') || c.includes('VALIDA'));
  const colMostrar   = cab.findIndex(c => c.includes('MOSTRAR') || c.includes('ATIVO'));

  const result = [];
  for (let i = idxCab + 1; i < linhas.length; i++) {
    const l = linhas[i];
    const titulo = (colTitulo !== -1 ? l[colTitulo] : l[0] || '').trim();
    const mensagem = (colMensagem !== -1 ? l[colMensagem] : l[1] || '').trim();
    if (!titulo && !mensagem) continue;
    const tipo = (colTipo !== -1 ? l[colTipo] : 'AVISO').trim().toUpperCase();
    const data = (colData !== -1 ? l[colData] : '').trim();
    const mostrar = (colMostrar !== -1 ? l[colMostrar] : 'SIM').trim().toUpperCase();
    if (mostrar === 'NÃO' || mostrar === 'NAO' || mostrar === 'N') continue;
    result.push({ titulo, mensagem, tipo, data });
  }
  console.log('✅ ' + result.length + ' avisos carregados');
  return result;
}



async function carregarProducaoLabDaPlanilha() {
  if (!CONFIG.csvProducaoLab) return null;
  const texto = await fetchCSV(CONFIG.csvProducaoLab);
  if (!texto) return null;
  if (texto.trim().startsWith('<') || texto.includes('<!DOCTYPE')) {
    console.error('❌ csvProducaoLab retornou HTML, não CSV.');
    return null;
  }
  const linhas = parseCSV(texto);
  if (linhas.length < 2) return null;

  // Helper pra normalizar texto (remover acentos e maiúsculas)
  const norm = s => (s || '').toString().toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();

  // Helper pra extrair número de um string
  // Inteligente: detecta separador decimal e remove só separadores de milhar
  const num = s => {
    if (s === null || s === undefined) return null;
    let str = String(s).trim();
    // Remove % e outros símbolos não-numéricos exceto . , -
    str = str.replace(/[^0-9.,\-]/g, '');
    if (!str) return null;
    // Detecta o último separador (decimal real)
    const ultPonto = str.lastIndexOf('.');
    const ultVirgula = str.lastIndexOf(',');
    if (ultPonto === -1 && ultVirgula === -1) {
      // Só dígitos
      const n = parseFloat(str);
      return isNaN(n) ? null : n;
    }
    let separadorDecimal, separadorMilhar;
    if (ultVirgula > ultPonto) {
      // Vírgula é decimal (padrão BR: 1.234,56)
      separadorDecimal = ',';
      separadorMilhar = '.';
    } else {
      // Ponto é decimal (padrão US: 1,234.56) ou só ponto (69.10)
      separadorDecimal = '.';
      separadorMilhar = ',';
    }
    // Remove separadores de milhar e troca decimal por ponto
    str = str.split(separadorMilhar).join('').replace(separadorDecimal, '.');
    const n = parseFloat(str);
    return isNaN(n) ? null : n;
  };

  // Procura células com rótulos conhecidos e pega o valor à direita
  const dados = {
    mesRef: null,
    metaGestor: null,
    totalModulos: null,
    totalPixels: null,
    totalTrilhas: null,
    totalCIs: null,
    saldoMeta: null,
    conclusaoMeta: null,
    ritmoAtual: null,
    ritmoNecessario: null,
    diasUteis: null,
    statusOperacional: null,
    projecao: null,
    tecnicos: []
  };

  let linhaCabecalhoTecnicos = -1;

  for (let i = 0; i < linhas.length; i++) {
    const linha = linhas[i];
    for (let c = 0; c < linha.length; c++) {
      const cel = norm(linha[c]);
      const proxima = linha[c + 1];
      if (cel.includes('PESQUISAR MES') && proxima) dados.mesRef = String(proxima).trim();
      else if (cel.includes('META GESTOR') && proxima) dados.metaGestor = num(proxima);
      else if (cel.includes('TOTAL DE MODULOS') && proxima) dados.totalModulos = num(proxima);
      else if (cel.includes('TOTAL DE PIXELS') && proxima) dados.totalPixels = num(proxima);
      else if (cel.includes('TOTAL DE TRILHAS') && proxima) dados.totalTrilhas = num(proxima);
      else if (cel.includes('TOTAL DE CI') && proxima) dados.totalCIs = num(proxima);
      else if (cel.includes('SALDO RESTANTE') && proxima) dados.saldoMeta = num(proxima);
      else if (cel.includes('CONCLUSAO DA META') && proxima) {
        const valStr = String(proxima);
        // Pode vir como "69,10%" ou 0,691
        const n = num(valStr);
        if (n !== null) {
          // Se for menor que 1, assume fração; senão é %
          dados.conclusaoMeta = n < 1 ? n * 100 : n;
        }
      }
      else if (cel.includes('RITMO ATUAL') && proxima) dados.ritmoAtual = num(proxima);
      else if (cel.includes('RITMO NECESSARIO') && proxima) dados.ritmoNecessario = num(proxima);
      else if (cel.includes('DIAS UTEIS') && proxima) dados.diasUteis = num(proxima);
      else if (cel.includes('STATUS OPERACIONAL') && proxima) dados.statusOperacional = String(proxima).trim();
      else if (cel.includes('PROJECAO DE FECHAMENTO') && proxima) dados.projecao = num(proxima);
      else if (cel === 'TECNICO' || cel === 'TÉCNICO') {
        linhaCabecalhoTecnicos = i;
      }
    }
  }

  // Lista de técnicos: linhas após o cabeçalho "TÉCNICO"
  console.log('🔍 Linha do cabeçalho TÉCNICO:', linhaCabecalhoTecnicos);
  if (linhaCabecalhoTecnicos !== -1) {
    for (let i = linhaCabecalhoTecnicos + 1; i < linhas.length; i++) {
      const linha = linhas[i];
      // Procura PARES de (nome, valor) na linha
      for (let c = 0; c < linha.length - 1; c++) {
        const nomeBruto = (linha[c] || '').trim();
        const proxBruto = (linha[c + 1] || '').trim();
        if (!nomeBruto || !proxBruto) continue;
        // O nome não pode começar com dígito
        if (/^\d/.test(nomeBruto)) continue;
        // Tenta parsear o próximo como número
        const valor = num(proxBruto);
        if (valor === null || valor <= 0) continue;
        // Evita pegar "TÉCNICO" / "MÓDULOS" / "TOTAL" como nome
        const nUp = norm(nomeBruto);
        if (nUp === 'TECNICO' || nUp === 'MODULOS' || nUp === 'TOTAL' || nUp === '') continue;
        dados.tecnicos.push({ nome: nomeBruto, modulos: valor });
        break;
      }
    }
  } else {
    console.warn('⚠ Cabeçalho TÉCNICO não encontrado no CSV. Tentando fallback...');
    // Fallback: procura linhas que tenham "nome em maiúsculas + número" no final do CSV
    for (let i = linhas.length - 1; i >= Math.max(0, linhas.length - 30); i--) {
      const linha = linhas[i];
      for (let c = 0; c < linha.length - 1; c++) {
        const nomeBruto = (linha[c] || '').trim();
        const proxBruto = (linha[c + 1] || '').trim();
        if (!nomeBruto || !proxBruto || /^\d/.test(nomeBruto)) continue;
        const valor = num(proxBruto);
        if (valor === null || valor <= 0 || valor > 10000) continue;
        // Nome deve ter pelo menos 3 letras e parecer nome próprio (sem dois-pontos)
        if (nomeBruto.length < 3 || nomeBruto.includes(':') || nomeBruto.includes('Total')) continue;
        dados.tecnicos.push({ nome: nomeBruto, modulos: valor });
        break;
      }
    }
  }

  // Ordena técnicos do maior pro menor
  dados.tecnicos.sort((a, b) => b.modulos - a.modulos);

  console.log('✅ Produção Lab carregada:', dados);
  return dados;
}


async function carregarComprasEntregaDaPlanilha() {
  if (!CONFIG.csvComprasEntrega) return null;
  const texto = await fetchCSV(CONFIG.csvComprasEntrega);
  if (!texto) return null;
  if (texto.trim().startsWith('<') || texto.includes('<!DOCTYPE')) {
    console.error('❌ csvComprasEntrega retornou HTML, não CSV.');
    return null;
  }
  const linhas = parseCSV(texto);
  if (linhas.length < 2) return [];

  // Helper: tenta parsear data em vários formatos
  function tentaParseData(valStr) {
    if (!valStr) return null;
    valStr = String(valStr).trim();
    if (!valStr) return null;

    // Texto que NÃO é data (Entregue, A definir, etc)
    const semData = ['ENTREGUE', 'A DEFINIR', 'PENDENTE', 'AGUARDANDO', '-', ''];
    if (semData.includes(valStr.toUpperCase())) return null;

    // Tenta serial Excel
    const d1 = serialParaData(valStr);
    if (d1 && !isNaN(d1.getTime()) && d1.getFullYear() > 2020 && d1.getFullYear() < 2100) {
      return d1;
    }
    // Tenta dd/mm/yyyy (com ou sem horário)
    const m = valStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
    if (m) {
      const dia = parseInt(m[1]);
      const mes = parseInt(m[2]) - 1;
      let ano = parseInt(m[3]);
      if (ano < 100) ano += 2000;
      if (ano < 2020 || ano > 2100) return null;
      const d = new Date(ano, mes, dia);
      if (!isNaN(d.getTime())) return d;
    }
    return null;
  }

  const cabecalho = linhas[0].map(c => (c || '').toUpperCase().trim());
  // Detecta colunas pelos nomes esperados
  const colId = cabecalho.findIndex(c => c.includes('ID') || c.includes('SOLI'));
  const colProduto = cabecalho.findIndex(c => c.includes('PRODUTO') || c.includes('ITEM'));
  const colSetor = cabecalho.findIndex(c => c === 'SETOR' || c.startsWith('SETOR'));
  const colData = cabecalho.findIndex(c => c === 'DATA' || (c.includes('DATA') && !c.includes('PREVIS') && !c.includes('VENCIM') && !c.includes('ENTREG')));
  const colPrevisao = cabecalho.findIndex(c => c.includes('PREVIS') && c.includes('ENTREG'));

  console.log('🛒 Mapeamento Compras:', {
    id: colId, produto: colProduto, setor: colSetor, data: colData, previsao: colPrevisao,
    cabecalho: cabecalho
  });

  if (colPrevisao === -1) {
    console.error('❌ Coluna PREVISÃO ENTREGA não encontrada');
    return [];
  }

  const result = [];
  for (let i = 1; i < linhas.length; i++) {
    const l = linhas[i];
    const valBrutoH = (l[colPrevisao] || '').trim();
    const valUp = valBrutoH.toUpperCase();

    // Filtro 1: NUNCA mostra itens já entregues
    if (valUp === 'ENTREGUE' || valUp === 'ENTREGUES') continue;

    const previsao = tentaParseData(valBrutoH);

    // Filtro 2: descarta "A DEFINIR" / "PENDENTE" / "AGUARDANDO" (textos explícitos sem data)
    // MAS aceita células vazias (vão como "sem previsão")
    if (!previsao && valBrutoH !== '') {
      // Só passa se for explicitamente vazio ou se for número/data inválida
      const textosIgnorar = ['A DEFINIR', 'PENDENTE', 'AGUARDANDO', '-'];
      if (textosIgnorar.includes(valUp)) {
        // Trata como "sem previsão"
      } else {
        continue; // texto desconhecido, ignora
      }
    }

    const id = (colId !== -1 ? l[colId] : '').trim();
    const produto = (colProduto !== -1 ? l[colProduto] : '').trim();
    const setor = (colSetor !== -1 ? l[colSetor] : '').trim();
    const dataPedido = colData !== -1 ? tentaParseData(l[colData]) : null;

    if (!produto) continue; // se não tem produto, pula

    result.push({
      id, produto, setor, dataPedido,
      previsao,  // null se sem data
      semPrevisao: !previsao
    });
  }

  // Ordena: atrasados primeiro, depois por data crescente, depois sem previsão no final
  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0);
  result.sort((a, b) => {
    // Sem previsão sempre vai pro final
    if (a.semPrevisao && !b.semPrevisao) return 1;
    if (!a.semPrevisao && b.semPrevisao) return -1;
    if (a.semPrevisao && b.semPrevisao) return 0;
    return a.previsao - b.previsao;
  });

  console.log('✅ ' + result.length + ' entregas pendentes carregadas');
  return result;
}



async function carregarLaboratorioDaPlanilha() {
  if (!CONFIG.csvLaboratorio) return null;
  const texto = await fetchCSV(CONFIG.csvLaboratorio);
  if (!texto) return null;
  if (texto.trim().startsWith('<') || texto.includes('<!DOCTYPE')) {
    console.error('❌ csvLaboratorio retornou HTML, não CSV.');
    return null;
  }
  const linhas = parseCSV(texto);
  if (linhas.length < 3) return [];

  console.log('🔬 CSV Laboratório: ' + linhas.length + ' linhas');

  // Estrutura: blocos por DATA
  // Linha de DATA → linha de CABEÇALHO (TÉCNICO|MODELO|PRIORIDADE|STATUS|OBSERVAÇÕES) → linhas de dados → linha vazia → próxima data
  // Vou procurar a data DE HOJE (formato dd/mm/yyyy) e ler até a próxima data ou fim

  const hoje = new Date();
  const diaHoje = String(hoje.getDate()).padStart(2, '0');
  const mesHoje = String(hoje.getMonth() + 1).padStart(2, '0');
  const anoHoje = hoje.getFullYear();
  const dataHojeStr = diaHoje + '/' + mesHoje + '/' + anoHoje;

  console.log('🔬 Procurando data de hoje:', dataHojeStr);

  // Acha a linha que contém a data de hoje em alguma célula
  let inicioBloco = -1;
  for (let i = 0; i < linhas.length; i++) {
    for (let c = 0; c < linhas[i].length; c++) {
      const cel = (linhas[i][c] || '').trim();
      // Aceita formatos: 29/05/2026, 29/5/2026, 29/05/26
      const m = cel.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
      if (m) {
        const dia = parseInt(m[1]);
        const mes = parseInt(m[2]);
        let ano = parseInt(m[3]);
        if (ano < 100) ano += 2000;
        if (dia === hoje.getDate() && mes === (hoje.getMonth() + 1) && ano === hoje.getFullYear()) {
          inicioBloco = i;
          break;
        }
      }
    }
    if (inicioBloco !== -1) break;
  }

  if (inicioBloco === -1) {
    console.warn('⚠ Data de hoje não encontrada no CSV do Laboratório. Tentando primeira data disponível...');
    // Fallback: pega a primeira data que encontrar
    for (let i = 0; i < linhas.length; i++) {
      for (let c = 0; c < linhas[i].length; c++) {
        const cel = (linhas[i][c] || '').trim();
        if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(cel)) {
          inicioBloco = i;
          break;
        }
      }
      if (inicioBloco !== -1) break;
    }
  }

  if (inicioBloco === -1) {
    console.error('❌ Nenhuma data encontrada no CSV do Laboratório');
    return [];
  }

  console.log('🔬 Bloco começa na linha:', inicioBloco);

  // A próxima linha (inicioBloco + 1) deve ter o cabeçalho TÉCNICO/MODELO/etc
  const linhaCab = linhas[inicioBloco + 1] || [];
  const cab = linhaCab.map(c => (c || '').toUpperCase().trim());
  const colTecnico = cab.findIndex(c => c.includes('TÉCNICO') || c.includes('TECNICO') || c.includes('RESPONS'));
  const colModelo = cab.findIndex(c => c.includes('MODELO') || c.includes('PAINEL') || c.includes('TAREFA'));
  const colPrioridade = cab.findIndex(c => c.includes('PRIORIDADE'));
  const colStatus = cab.findIndex(c => c.includes('STATUS'));
  const colObs = cab.findIndex(c => c.includes('OBSERV'));

  console.log('🔬 Colunas:', { tecnico: colTecnico, modelo: colModelo, prio: colPrioridade, status: colStatus });

  if (colTecnico === -1 || colModelo === -1) {
    console.error('❌ Cabeçalho TÉCNICO/MODELO não encontrado na linha esperada');
    return [];
  }

  // Lê linhas de dados até encontrar linha vazia OU próxima data
  const result = [];
  for (let i = inicioBloco + 2; i < linhas.length; i++) {
    const l = linhas[i];
    if (!l || l.every(c => !c || !c.trim())) continue; // pula linhas vazias

    const tecnico = (l[colTecnico] || '').trim();
    const modelo = (l[colModelo] || '').trim();

    // Se a linha tiver outra data, para
    if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(tecnico) || /^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(modelo)) break;

    // Pula se TÉCNICO estiver vazio ou for outro cabeçalho
    if (!tecnico) continue;
    const tUp = tecnico.toUpperCase();
    if (tUp === 'TÉCNICO' || tUp === 'TECNICO') break; // próximo bloco

    const prioridade = (colPrioridade !== -1 ? l[colPrioridade] : '').trim();
    const status = (colStatus !== -1 ? l[colStatus] : '').trim();
    const obs = (colObs !== -1 ? l[colObs] : '').trim();

    result.push({
      tecnico,
      modelo: modelo || '—',
      prioridade: prioridade || 'MÉDIA',
      status: status || 'NÃO INICIADO',
      observacoes: obs
    });
  }

  console.log('✅ Laboratório: ' + result.length + ' técnicos do dia');
  return result;
}

async function carregarFrotasDaPlanilha() {
  if (!CONFIG.csvFrotas) return null;
  const texto = await fetchCSV(CONFIG.csvFrotas);
  if (!texto) return null;
  if (texto.trim().startsWith('<') || texto.includes('<!DOCTYPE')) {
    console.error('❌ csvFrotas retornou HTML, não CSV.');
    return null;
  }
  const linhas = parseCSV(texto);
  if (linhas.length < 4) return [];

  console.log('🚗 Total de linhas no CSV de frotas:', linhas.length);

  // Helper: limpa números mantendo só dígitos
  const limpaNum = s => {
    if (!s) return '';
    return String(s).trim();
  };

  // Detecta onde tá o cabeçalho real (procura "PLACA" como primeira coluna não-vazia)
  let linhaCabecalho = -1;
  for (let i = 0; i < Math.min(linhas.length, 6); i++) {
    const linha = linhas[i];
    for (let c = 0; c < linha.length; c++) {
      const cel = (linha[c] || '').toUpperCase().trim();
      if (cel === 'PLACA') {
        linhaCabecalho = i;
        break;
      }
    }
    if (linhaCabecalho !== -1) {
      // Pega o ÚLTIMO cabeçalho PLACA encontrado (caso haja dois)
      const linha = linhas[i];
      let temPlaca = false;
      for (let c = 0; c < linha.length; c++) {
        if ((linha[c] || '').toUpperCase().trim() === 'PLACA') { temPlaca = true; break; }
      }
      if (temPlaca) linhaCabecalho = i;
    }
  }

  // Continua procurando até a última ocorrência de PLACA como cabeçalho
  for (let i = linhaCabecalho + 1; i < Math.min(linhas.length, 6); i++) {
    const linha = linhas[i];
    for (let c = 0; c < linha.length; c++) {
      if ((linha[c] || '').toUpperCase().trim() === 'PLACA') {
        linhaCabecalho = i;
        break;
      }
    }
  }

  if (linhaCabecalho === -1) {
    console.error('❌ Cabeçalho PLACA não encontrado');
    return [];
  }

  console.log('🚗 Cabeçalho na linha:', linhaCabecalho, '→', linhas[linhaCabecalho]);

  // Detecta colunas pelos nomes
  const cab = linhas[linhaCabecalho].map(c => (c || '').toUpperCase().trim());
  const colPlaca = cab.findIndex(c => c === 'PLACA');
  const colItem = cab.findIndex(c => c.includes('ITEM') || c.includes('CONTROLE'));
  const colTrocadoCom = cab.findIndex(c => c.includes('TROCADO COM') || (c.includes('TROCADO') && c.includes('KM')));
  const colProxima = cab.findIndex(c => c.includes('PRÓXIMA') || c.includes('PROXIMA'));
  const colKmAtual = cab.findIndex(c => c.includes('ATUAL'));
  const colFaltante = cab.findIndex(c => c.includes('FALTANTE') || c.includes('FALTA'));
  const colIndicador = cab.findIndex(c => c.includes('INDICADOR') || c.includes('STATUS'));

  console.log('🚗 Colunas:', {
    placa: colPlaca, item: colItem, trocadoCom: colTrocadoCom,
    proxima: colProxima, kmAtual: colKmAtual, faltante: colFaltante, indicador: colIndicador
  });

  if (colPlaca === -1) {
    console.error('❌ Coluna PLACA não encontrada');
    return [];
  }

  // PEGA SOMENTE OS PRÓXIMOS 10 VEÍCULOS (linhas 4 a 13 da planilha = primeiros 10 após o cabeçalho)
  const result = [];
  const inicio = linhaCabecalho + 1;
  const fim = Math.min(inicio + 10, linhas.length);

  for (let i = inicio; i < fim; i++) {
    const l = linhas[i];
    if (!l) continue;
    const placa = (l[colPlaca] || '').trim();
    if (!placa) continue;

    // Pula se for outro cabeçalho intermediário
    if (placa.toUpperCase() === 'PLACA') continue;

    const item = colItem !== -1 ? (l[colItem] || '').trim() : '';
    const trocadoCom = colTrocadoCom !== -1 ? limpaNum(l[colTrocadoCom]) : '';
    const proxima = colProxima !== -1 ? limpaNum(l[colProxima]) : '';
    const kmAtual = colKmAtual !== -1 ? limpaNum(l[colKmAtual]) : '';
    const faltante = colFaltante !== -1 ? limpaNum(l[colFaltante]) : '';
    const indicador = colIndicador !== -1 ? (l[colIndicador] || '').trim() : '';

    result.push({ placa, item, trocadoCom, proxima, kmAtual, faltante, indicador });
  }

  console.log('✅ ' + result.length + ' veículos carregados');
  return result;
}

async function carregarEstoqueDaPlanilha() {
  if (!CONFIG.csvEstoque) return null;
  const texto = await fetchCSV(CONFIG.csvEstoque);
  if (!texto) return null;
  if (texto.trim().startsWith('<') || texto.includes('<!DOCTYPE')) {
    console.error('❌ csvEstoque retornou HTML, não CSV.');
    return null;
  }
  const linhas = parseCSV(texto);
  if (linhas.length < 2) return [];

  // Detecta cabeçalho
  let idxCab = 0;
  for (let i = 0; i < Math.min(linhas.length, 5); i++) {
    const l = linhas[i].map(c => (c || '').toUpperCase());
    if (l.some(c => c.includes('EQUIPAMENTO') || c.includes('METRAGEM') || c.includes('QUANTIDADE'))) {
      idxCab = i;
      break;
    }
  }
  const cab = linhas[idxCab].map(c => (c || '').toUpperCase());

  // Detecta colunas: equipamento, quantidade, tipo, metragem
  const colEquip = cab.findIndex(c => c.includes('EQUIPAMENTO') || c.includes('MODELO') || c.includes('PAINEL'));
  const colQtd = cab.findIndex(c => c.includes('QUANTIDADE') || c.includes('QTD') || c === 'QTDE');
  const colTipo = cab.findIndex(c => c.includes('OUTDOOR') || c.includes('INDOOR') || c.includes('TIPO') || c.includes('CATEGORIA'));
  const colMet = cab.findIndex(c => c.includes('METRAGEM') || c.includes('METROS') || c.includes('M²') || c.includes('M2'));

  const result = [];
  for (let i = idxCab + 1; i < linhas.length; i++) {
    const l = linhas[i];
    const equip = (colEquip !== -1 ? l[colEquip] : l[0] || '').trim();
    if (!equip) continue;
    const qtd = parseInt((colQtd !== -1 ? l[colQtd] : '0').replace(/\D/g, '') || '0');
    const tipo = (colTipo !== -1 ? l[colTipo] : '').trim().toUpperCase();
    const metStr = (colMet !== -1 ? l[colMet] : '0').trim().replace(',', '.');
    const metragem = parseFloat(metStr.replace(/[^\d.-]/g, '')) || 0;
    result.push({ equipamento: equip, quantidade: qtd, tipo, metragem });
  }
  console.log('✅ ' + result.length + ' itens de estoque carregados');
  return result;
}

async function carregarIndicadoresDaPlanilha() {

    return null;
  }
  const linhas = parseCSV(texto);
  if (linhas.length < 2) return [];

  // Detecta cabeçalho
  let idxCab = 0;
  for (let i = 0; i < Math.min(linhas.length, 5); i++) {
    const l = linhas[i].map(c => (c || '').toUpperCase());
    if (l.some(c => c.includes('INDICADOR') || c.includes('DATA'))) {
      idxCab = i;
      break;
    }
  }
  const cab = linhas[idxCab].map(c => (c || '').toUpperCase());
  const colInd = cab.findIndex(c => c.includes('INDICADOR'));
  const colData = cab.findIndex(c => c.includes('DATA'));
  const colDesc = cab.findIndex(c => c.includes('DESCRI'));

  const result = [];
  for (let i = idxCab + 1; i < linhas.length; i++) {
    const l = linhas[i];
    const nome = (colInd !== -1 ? l[colInd] : l[0] || '').trim();
    if (!nome) continue;
    const dataStr = (colData !== -1 ? l[colData] : l[1] || '').trim();
    const desc = (colDesc !== -1 ? l[colDesc] : l[2] || '').trim();

    // Parse data: aceita dd/mm/yyyy ou número serial
    let dataIncidente = null;
    if (dataStr) {
      const d1 = serialParaData(dataStr);
      if (d1 && !isNaN(d1.getTime()) && d1.getFullYear() > 2020) {
        dataIncidente = d1;
      } else {
        const m = dataStr.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
        if (m) {
          const dia = parseInt(m[1]);
          const mes = parseInt(m[2]) - 1;
          let ano = m[3] ? parseInt(m[3]) : new Date().getFullYear();
          if (ano < 100) ano += 2000;
          dataIncidente = new Date(ano, mes, dia);
        }
      }
    }
    result.push({ nome, dataIncidente, descricao: desc });
  }
  console.log('✅ ' + result.length + ' indicadores carregados');
  return result;
}

    '</div>' +

}


function renderizarTelaEntregas() {
  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0);

  if (COMPRAS_ENTREGAS.length === 0) {
    return '<div class="tela tela-entregas">' +
      '<div class="entregas-cabecalho">' +
        '<div class="titulo"><div class="barra"></div><h2>PREVISÃO DE ENTREGAS</h2></div>' +
      '</div>' +
      '<div class="entregas-container">' +
        '<div class="estado-vazio-entregas">' +
          '<div class="icone">📦</div>' +
          '<div class="msg">Nenhuma entrega pendente</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // Classifica por urgência
  function classificar(item) {
    if (item.semPrevisao) return 'sem-previsao';
    const diasParaEntrega = Math.floor((item.previsao - hoje) / (1000 * 60 * 60 * 24));
    if (diasParaEntrega < 0) return 'atrasado';
    if (diasParaEntrega <= 1) return 'hoje-amanha';
    if (diasParaEntrega <= 3) return 'proxima';
    return 'tranquila';
  }

  function classeSetor(setor) {
    const s = (setor || '').toUpperCase();
    if (s.includes('ESTOQUE')) return 'estoque';
    if (s.includes('LABORAT')) return 'lab';
    if (s.includes('INSTAL')) return 'instalacao';
    if (s.includes('FROTA')) return 'frota';
    if (s.includes('QUALID')) return 'qualidade';
    if (s.includes('ADMIN') || s.includes('COMERCIAL') || s.includes('RH')) return 'admin';
    if (s.includes('COMPRA')) return 'compras';
    return '';
  }

  function fmtData(d) {
    const dia = String(d.getDate()).padStart(2, '0');
    const mes = String(d.getMonth() + 1).padStart(2, '0');
    return dia + '/' + mes;
  }

  function rotuloDias(dataPrev) {
    const dias = Math.floor((dataPrev - hoje) / (1000 * 60 * 60 * 24));
    if (dias < 0) return Math.abs(dias) + 'd atraso';
    if (dias === 0) return 'HOJE';
    if (dias === 1) return 'AMANHÃ';
    if (dias <= 6) return 'em ' + dias + 'd';
    return null; // só mostra data
  }

  // Conta totais por urgência
  let nAtrasado = 0, nHojeAmanha = 0, nProxima = 0, nTranquila = 0, nSemPrev = 0;
  COMPRAS_ENTREGAS.forEach(item => {
    const c = classificar(item);
    if (c === 'atrasado') nAtrasado++;
    else if (c === 'hoje-amanha') nHojeAmanha++;
    else if (c === 'proxima') nProxima++;
    else if (c === 'sem-previsao') nSemPrev++;
    else nTranquila++;
  });

  // Limita a 30 entregas pra não estourar a tela
  const exibir = COMPRAS_ENTREGAS.slice(0, 30);

  const linhasHtml = exibir.map(item => {
    const urgencia = classificar(item);
    const setorClass = classeSetor(item.setor);

    let dataHtml;
    if (item.semPrevisao) {
      // Sem data de previsão — mostra etiqueta neutra
      dataHtml = '<span class="ent-icone">❓</span>SEM PREVISÃO';
    } else {
      const dataFmt = fmtData(item.previsao);
      const rotulo = rotuloDias(item.previsao);
      let icone = '📅';
      if (urgencia === 'atrasado') icone = '⚠️';
      else if (urgencia === 'hoje-amanha') icone = '🔥';
      else if (urgencia === 'proxima') icone = '⏰';
      dataHtml = rotulo
        ? '<span class="ent-icone">' + icone + '</span>' + rotulo + ' · ' + dataFmt
        : '<span class="ent-icone">' + icone + '</span>' + dataFmt;
    }

    const idHtml = item.id ? '<div class="ent-id">#' + item.id + '</div>' : '<div></div>';
    const setorHtml = item.setor ? '<div class="ent-setor ' + setorClass + '">' + item.setor + '</div>' : '<div></div>';

    return '<div class="linha-entrega ' + urgencia + '">' +
      '<div class="marcador"></div>' +
      idHtml +
      '<div class="ent-produto">' + item.produto + '</div>' +
      setorHtml +
      '<div class="ent-data-entrega">' + dataHtml + '</div>' +
    '</div>';
  }).join('');

  return '<div class="tela tela-entregas">' +
    '<div class="entregas-cabecalho">' +
      '<div class="titulo"><div class="barra"></div><h2>PREVISÃO DE ENTREGAS</h2></div>' +
      '<div class="resumo">' +
        (nAtrasado > 0 ? '<div class="item"><span class="dot" style="background:#EF4444; color:#EF4444"></span><strong>' + nAtrasado + '</strong> atrasada' + (nAtrasado === 1 ? '' : 's') + '</div>' : '') +
        (nHojeAmanha > 0 ? '<div class="item"><span class="dot" style="background:#F97316; color:#F97316"></span><strong>' + nHojeAmanha + '</strong> urgente' + (nHojeAmanha === 1 ? '' : 's') + '</div>' : '') +
        (nProxima > 0 ? '<div class="item"><span class="dot" style="background:#FBBF24; color:#FBBF24"></span><strong>' + nProxima + '</strong> em breve</div>' : '') +
        (nTranquila > 0 ? '<div class="item"><span class="dot" style="background:#10B981; color:#10B981"></span><strong>' + nTranquila + '</strong> no prazo</div>' : '') +
        (nSemPrev > 0 ? '<div class="item"><span class="dot" style="background:#6B7280; color:#6B7280"></span><strong>' + nSemPrev + '</strong> sem previsão</div>' : '') +
        '<div class="item" style="margin-left:8px; padding-left:12px; border-left:1px solid rgba(255,255,255,0.1);">Total: <strong>' + COMPRAS_ENTREGAS.length + '</strong></div>' +
      '</div>' +
    '</div>' +
    '<div class="entregas-container">' + linhasHtml + '</div>' +
  '</div>';
}


function renderizarTelaFrotas() {
  if (FROTAS.length === 0) {
    return '<div class="tela tela-frotas">' +
      '<div class="frotas-cabecalho">' +
        '<div class="titulo"><div class="barra"></div><h2>GESTÃO DE FROTAS</h2></div>' +
      '</div>' +
      '<div class="frotas-container">' +
        '<div class="frota-estado-vazio">' +
          '<div class="icone">🚗</div>' +
          '<div class="msg">Aguardando dados das frotas...</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function classificarStatus(indicador) {
    const ind = (indicador || '').toUpperCase().trim();
    if (ind.includes('VENCIDO') || ind.includes('ATRASADO') || ind.includes('CRITICO')) return 'vencido';
    if (ind === 'TROCA' || ind.includes('TROCAR') || ind.includes('AGENDAR') || ind.includes('ATENCAO') || ind.includes('PRÓXIMO') || ind.includes('PROXIMO')) return 'troca';
    return 'em-dia';
  }

  // Conta totais por status
  let nEmDia = 0, nVencido = 0, nTroca = 0;
  FROTAS.forEach(v => {
    const s = classificarStatus(v.indicador);
    if (s === 'em-dia') nEmDia++;
    else if (s === 'vencido') nVencido++;
    else if (s === 'troca') nTroca++;
  });

  // Ordena: vencidos primeiro, depois troca, depois em-dia
  const ordemPrioridade = { 'vencido': 0, 'troca': 1, 'em-dia': 2 };
  const ordenado = [...FROTAS].sort((a, b) => {
    return ordemPrioridade[classificarStatus(a.indicador)] - ordemPrioridade[classificarStatus(b.indicador)];
  });

  const linhasHtml = ordenado.map(v => {
    const status = classificarStatus(v.indicador);
    return '<div class="linha-frota ' + status + '">' +
      '<div class="frota-placa">' + (v.placa || '—') + '</div>' +
      '<div class="frota-item">' + (v.item || '—') + '</div>' +
      '<div class="frota-num">' + (v.trocadoCom || '—') + '</div>' +
      '<div class="frota-num">' + (v.proxima || '—') + '</div>' +
      '<div class="frota-num">' + (v.kmAtual || '—') + '</div>' +
      '<div class="frota-faltante">' + (v.faltante || '—') + '</div>' +
      '<div class="frota-indicador">' + (v.indicador || '—') + '</div>' +
    '</div>';
  }).join('');

  return '<div class="tela tela-frotas">' +
    '<div class="frotas-cabecalho">' +
      '<div class="titulo"><div class="barra"></div><h2>GESTÃO DE FROTAS — TROCA DE ÓLEO E FILTROS</h2></div>' +
      '<div class="resumo">' +
        (nVencido > 0 ? '<div class="item"><span class="dot" style="background:#EF4444; color:#EF4444"></span><strong>' + nVencido + '</strong> vencido' + (nVencido === 1 ? '' : 's') + '</div>' : '') +
        (nTroca > 0 ? '<div class="item"><span class="dot" style="background:#FBBF24; color:#FBBF24"></span><strong>' + nTroca + '</strong> troca</div>' : '') +
        (nEmDia > 0 ? '<div class="item"><span class="dot" style="background:#10B981; color:#10B981"></span><strong>' + nEmDia + '</strong> em dia</div>' : '') +
        '<div class="item" style="margin-left:8px; padding-left:12px; border-left:1px solid rgba(255,255,255,0.1);">Total: <strong>' + FROTAS.length + '</strong></div>' +
      '</div>' +
    '</div>' +
    '<div class="frotas-container">' +
      '<div class="frotas-tabela-header">' +
        '<div>Placa</div>' +
        '<div>Item Controle</div>' +
        '<div>Trocado (km)</div>' +
        '<div>Próxima Troca</div>' +
        '<div>KM Atual</div>' +
        '<div>KM Faltante</div>' +
        '<div>Indicador</div>' +
      '</div>' +
      '<div class="frotas-corpo">' + linhasHtml + '</div>' +
    '</div>' +
  '</div>';
}

function renderizarTelaEstoque() {
  if (ESTOQUE.length === 0) {
    return '<div class="tela tela-estoque">' +
      '<div class="estoque-cabecalho">' +
        '<div class="titulo"><div class="barra"></div><h2>ESTOQUE DE PAINÉIS</h2></div>' +
      '</div>' +
      '<div class="estado-vazio" style="flex:1; display:flex; align-items:center; justify-content:center;">' +
        '<div class="icone">📦</div>' +
        '<div class="msg">Estoque ainda não carregado</div>' +
      '</div>' +
    '</div>';
  }

  // Classifica por nível baseado na metragem
  function classificar(m) {
    if (m === 0) return 'nivel-zero';
    if (m < 4) return 'nivel-critico';
    if (m <= 10) return 'nivel-atencao';
    return 'nivel-ok';
  }

  function classeTipo(tipo) {
    if (tipo.includes('INDOOR')) return 'indoor';
    if (tipo.includes('OUTDOOR')) return 'outdoor';
    if (tipo.includes('TV')) return 'tv';
    if (tipo.includes('TOTEM') || tipo.includes('TOTEN')) return 'totem';
    return '';
  }

  // Conta totais por nível
  let nCritico = 0, nAtencao = 0, nOk = 0, nZero = 0;
  let totalMetragem = 0;
  ESTOQUE.forEach(item => {
    totalMetragem += item.metragem || 0;
    const nivel = classificar(item.metragem);
    if (nivel === 'nivel-critico') nCritico++;
    else if (nivel === 'nivel-atencao') nAtencao++;
    else if (nivel === 'nivel-ok') nOk++;
    else nZero++;
  });

  // Ordena: críticos primeiro (pra chamar atenção), depois atenção, depois ok, depois zerados
  const ordemNivel = { 'nivel-critico': 0, 'nivel-atencao': 1, 'nivel-ok': 2, 'nivel-zero': 3 };
  const ordenado = [...ESTOQUE].sort((a, b) => {
    const na = ordemNivel[classificar(a.metragem)];
    const nb = ordemNivel[classificar(b.metragem)];
    if (na !== nb) return na - nb;
    return (b.metragem || 0) - (a.metragem || 0);
  });

  const linhasHtml = ordenado.map(item => {
    const nivel = classificar(item.metragem);
    const tipoClass = classeTipo(item.tipo);
    const tipoLabel = item.tipo || '';

    // Formata metragem (sem decimais se for inteiro)
    const metFmt = item.metragem % 1 === 0 ? item.metragem.toFixed(0) : item.metragem.toFixed(1);

    return '<div class="linha-estoque ' + nivel + '">' +
      '<div class="marcador"></div>' +
      '<div class="nome-equip">' + item.equipamento + '</div>' +
      (tipoLabel ? '<div class="tag-tipo ' + tipoClass + '">' + tipoLabel + '</div>' : '<div></div>') +
      '<div class="qtd-info"><strong>' + item.quantidade + '</strong> un</div>' +
      '<div class="metragem">' + metFmt + '<span class="unidade">m²</span></div>' +
    '</div>';
  }).join('');

  // Total formatado
  const totalFmt = totalMetragem % 1 === 0 ? totalMetragem.toFixed(0) : totalMetragem.toFixed(1);

  return '<div class="tela tela-estoque">' +
    '<div class="estoque-cabecalho">' +
      '<div class="titulo"><div class="barra"></div><h2>ESTOQUE DE PAINÉIS</h2></div>' +
      '<div class="resumo">' +
        '<div class="item"><span class="dot" style="background:#EF4444; color:#EF4444"></span><strong>' + nCritico + '</strong> crítico</div>' +
        '<div class="item"><span class="dot" style="background:#FBBF24; color:#FBBF24"></span><strong>' + nAtencao + '</strong> atenção</div>' +
        '<div class="item"><span class="dot" style="background:#10B981; color:#10B981"></span><strong>' + nOk + '</strong> OK</div>' +
        '<div class="item" style="margin-left: 10px; padding-left: 12px; border-left: 1px solid rgba(255,255,255,0.1);">' +
          'Total: <strong>' + totalFmt + ' m²</strong>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="estoque-container">' + linhasHtml + '</div>' +
  '</div>';
}

function renderizarTelaIndicadores() {
  const CORES_IND = {
    'ACIDENTES': '#EF4444',
    'ERROS CONTROLE DE QUALIDADE': '#3B82F6',
    'ERROS ESTOQUE': '#F59E0B',
    'ERROS LABORATÓRIO': '#10B981'
  };
  const ICONES_IND = {
    'ACIDENTES': '🛡️',
    'ERROS CONTROLE DE QUALIDADE': '✅',
    'ERROS ESTOQUE': '📦',
    'ERROS LABORATÓRIO': '🔬'
  };
  const LABELS_CURTOS = {
    'ACIDENTES': 'SEM ACIDENTES',
    'ERROS CONTROLE DE QUALIDADE': 'SEM ERROS DE QUALIDADE',
    'ERROS ESTOQUE': 'SEM ERROS NO ESTOQUE',
    'ERROS LABORATÓRIO': 'SEM ERROS NO LAB'
  };

  if (INDICADORES.length === 0) {
    return '<div class="tela tela-indicadores">' +
      '<div class="indicadores-cabecalho">' +
        '<div class="titulo"><div class="barra"></div><h2>SEGURANÇA E QUALIDADE</h2></div>' +
      '</div>' +
      '<div class="estado-vazio" style="flex:1; display:flex; align-items:center; justify-content:center;">' +
        '<div class="icone">📊</div>' +
        '<div class="msg">Nenhum indicador cadastrado</div>' +
      '</div>' +
    '</div>';
  }

  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0);

  const cardsHtml = INDICADORES.map(ind => {
    const nome = (ind.nome || '').toUpperCase().trim();
    const cor = CORES_IND[nome] || '#10B981';
    const icone = ICONES_IND[nome] || '📊';
    const labelCurto = LABELS_CURTOS[nome] || 'SEM REGISTROS';

    // Calcula dias atuais
    let diasAtuais = null;
    if (ind.dataIncidente) {
      const di = new Date(ind.dataIncidente);
      di.setHours(0, 0, 0, 0);
      diasAtuais = Math.floor((hoje - di) / (1000 * 60 * 60 * 24));
      if (diasAtuais < 0) diasAtuais = 0;
    }

    // localStorage: chave de recorde por indicador
    const chaveRecorde = 'recorde_' + nome.replace(/[^a-z0-9]/gi, '_');
    const chaveUltimaData = 'ultimadata_' + nome.replace(/[^a-z0-9]/gi, '_');
    let recorde = parseInt(localStorage.getItem(chaveRecorde) || '0');
    const ultimaDataSalva = localStorage.getItem(chaveUltimaData);

    // Detecta se a data mudou (incidente novo): se mudou, pega o pico anterior e salva como recorde
    if (ind.dataIncidente) {
      const dataAtualStr = ind.dataIncidente.toISOString().split('T')[0];

      if (ultimaDataSalva && ultimaDataSalva !== dataAtualStr) {
        // A data foi alterada — pega o pico salvo (que ficou em uma chave separada)
        const chavePico = 'pico_' + nome.replace(/[^a-z0-9]/gi, '_');
        const picoAnterior = parseInt(localStorage.getItem(chavePico) || '0');
        if (picoAnterior > recorde) {
          recorde = picoAnterior;
          localStorage.setItem(chaveRecorde, String(recorde));
        }
        localStorage.setItem(chavePico, '0');
      }
      localStorage.setItem(chaveUltimaData, dataAtualStr);

      // Atualiza o pico (sempre que dias atuais é maior que o pico salvo)
      const chavePico = 'pico_' + nome.replace(/[^a-z0-9]/gi, '_');
      const picoSalvo = parseInt(localStorage.getItem(chavePico) || '0');
      if (diasAtuais > picoSalvo) {
        localStorage.setItem(chavePico, String(diasAtuais));
      }

      // Se os dias atuais já passaram do recorde, atualiza o recorde também
      if (diasAtuais > recorde) {
        recorde = diasAtuais;
        localStorage.setItem(chaveRecorde, String(recorde));
      }
    }

    const ehRecorde = diasAtuais !== null && diasAtuais > 0 && diasAtuais >= recorde && recorde > 0;

    // Detecta marcos (30, 60, 100, 365)
    let badgeMarco = '';
    if (diasAtuais !== null && !ehRecorde) {
      if (diasAtuais === 365) badgeMarco = '<div class="badge-marco">🏆 1 ANO</div>';
      else if (diasAtuais === 100) badgeMarco = '<div class="badge-marco">💯 100 DIAS</div>';
      else if (diasAtuais === 60) badgeMarco = '<div class="badge-marco">🎯 60 DIAS</div>';
      else if (diasAtuais === 30) badgeMarco = '<div class="badge-marco">⭐ 30 DIAS</div>';
    }

    // Progresso visual (até alcançar o recorde)
    let progPct = 0;
    if (recorde > 0 && diasAtuais !== null) {
      progPct = Math.min(100, (diasAtuais / recorde) * 100);
    }

    // HTML do número grande ou "SEM REGISTROS"
    let numeroHtml;
    if (diasAtuais === null) {
      numeroHtml = '<div class="ind-numero-sem">SEM REGISTROS</div>' +
        '<div class="ind-label-dias" style="margin-top: 4px;">aguardando data</div>';
    } else {
      numeroHtml = '<div class="ind-numero-grande">' + diasAtuais + '</div>' +
        '<div class="ind-label-dias">' + (diasAtuais === 1 ? 'DIA' : 'DIAS') + ' ' + labelCurto + '</div>';
    }

    // Descrição
    const descHtml = ind.descricao && ind.descricao.trim()
      ? '<div class="ind-descricao">📝 ' + ind.descricao + '</div>'
      : '<div class="ind-descricao-vazia">sem ocorrências registradas</div>';

    // Recorde (só mostra se tiver)
    let recordeHtml = '';
    if (recorde > 0) {
      recordeHtml = '<div class="ind-recorde">' +
        '<span class="label">RECORDE</span>' +
        '<span class="valor">' + recorde + ' DIAS</span>' +
      '</div>' +
      '<div class="ind-progresso-wrap"><div class="ind-progresso" style="width: ' + progPct.toFixed(1) + '%"></div></div>';
    }

    const classRecorde = ehRecorde ? 'recorde' : '';
    const badgeRecordeHtml = ehRecorde ? '<div class="badge-recorde">🏆 NOVO RECORDE!</div>' : '';

    return '<div class="card-indicador ' + classRecorde + '" style="--cor-ind: ' + cor + '">' +
      badgeRecordeHtml +
      badgeMarco +
      '<div class="ind-icone">' + icone + '</div>' +
      '<div class="ind-titulo">' + nome + '</div>' +
      numeroHtml +
      recordeHtml +
      descHtml +
    '</div>';
  }).join('');

  return '<div class="tela tela-indicadores">' +
    '<div class="indicadores-cabecalho">' +
      '<div class="titulo"><div class="barra"></div><h2>SEGURANÇA E QUALIDADE</h2></div>' +
    '</div>' +
    '<div class="grid-indicadores">' + cardsHtml + '</div>' +
  '</div>';
}

      '</div>' +
    '</div>';
  }).join('');

  return '<div class="tela tela-avisos">' +
    '<div class="avisos-cabecalho">' +
      '<div class="titulo"><div class="barra"></div><h2>AVISOS</h2></div>' +
      '<div class="contador-avisos"><strong>' + AVISOS.length + '</strong>aviso' + (AVISOS.length === 1 ? '' : 's') + ' ativo' + (AVISOS.length === 1 ? '' : 's') + '</div>' +
    '</div>' +
    '<div class="lista-avisos">' + cardsHtml + '</div>' +
  '</div>';
}

function renderizarTelaPessoas() {
  const hoje = new Date();
  const mesAtual = hoje.getMonth() + 1;
  const diaHoje = hoje.getDate();
  // Mostra aniversariantes do mês atual primeiro; se sobrar espaço, do próximo mês
  const doMes = ANIVERSARIANTES.filter(a => a.mes === mesAtual).sort((a,b) => a.dia - b.dia);
  const proxMes = ANIVERSARIANTES.filter(a => a.mes === (mesAtual % 12) + 1).sort((a,b) => a.dia - b.dia);
  const proximos = [...doMes, ...proxMes];

  const listaHtml = proximos.length === 0
    ? '<div class="estado-vazio"><div class="icone">🎂</div><div class="msg">Nenhum aniversariante no período</div></div>'
    : proximos.slice(0, 8).map(a => {
        const ehHoje = a.mes === mesAtual && a.dia === diaHoje;
        return '<div class="item-aniversario ' + (ehHoje ? 'hoje' : '') + '">' +
            '<div class="data">' + pad(a.dia) + '/' + pad(a.mes) + '</div>' +
            '<div class="info"><div class="nome">' + a.nome + '</div>' +
            (a.setor ? '<div class="setor">' + a.setor + '</div>' : '') +
            '</div>' +
            (ehHoje ? '<div class="badge-hoje">HOJE</div>' : '') +
          '</div>';
      }).join('');

  // Rotaciona entre os funcionários do mês a cada renderização
  const fm = FUNCIONARIOS_MES[idxFuncionarioMes % FUNCIONARIOS_MES.length];
  idxFuncionarioMes++;
  const iniciais = fm.nome.split(' ').map(n => n[0]).slice(0,2).join('');
  const fotoStyle = fm.foto ? 'background-image: url(\'' + fm.foto + '\'); color: transparent;' : '';

  return '<div class="tela tela-pessoas">' +
      '<div class="painel-aniversarios">' +
        '<div class="painel-titulo">🎂 ANIVERSARIANTES</div>' +
        '<div class="lista-aniversarios">' + listaHtml + '</div>' +
      '</div>' +
      '<div class="painel-func-mes">' +
        '<div class="painel-titulo">⭐ FUNCIONÁRIO DO MÊS — ' + fm.mesAno + '</div>' +
        '<div class="func-mes-conteudo">' +
          '<div class="func-mes-foto" style="' + fotoStyle + '">' + (fm.foto ? '' : iniciais) + '</div>' +
          '<div class="func-mes-nome">' + fm.nome + '</div>' +
          '<div class="func-mes-setor">' + fm.setor + '</div>' +
          '<div class="func-mes-destaque">"' + fm.destaque + '"</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

let indiceAtual = 0;
const conteudoEl = document.getElementById('conteudo');
const pipsEl = document.getElementById('indicador-pips');
const indicadorNomeEl = document.getElementById('indicador-nome');

function renderTudo() {
  conteudoEl.innerHTML = TELAS.map(tela => {
    if (tela.tipo === 'setor') return renderizarTelaSetor(tela);
    if (tela.tipo === 'timeline') return renderizarTelaTimeline();
    if (tela.tipo === 'semanal') return renderizarTelaSemanal();
    if (tela.tipo === 'avisos') return renderizarTelaAvisos();
    if (tela.tipo === 'indicadores') return renderizarTelaIndicadores();
    if (tela.tipo === 'estoque') return renderizarTelaEstoque();
    if (tela.tipo === 'prod-lab') return renderizarTelaProducaoLab();
    if (tela.tipo === 'entregas') return renderizarTelaEntregas();
    if (tela.tipo === 'frotas') return renderizarTelaFrotas();
    if (tela.tipo === 'aniversariantes') return renderizarTelaAniversariantes();
    if (tela.tipo === 'funcionario') return renderizarTelaFuncionario();
    return renderizarTelaPessoas();
  }).join('');
  pipsEl.innerHTML = TELAS.map(() => '<div class="pip"></div>').join('');
  ativarTela(indiceAtual);
}

function ativarTela(idx) {
  const todasTelas = conteudoEl.querySelectorAll('.tela');
  const todosPips = pipsEl.querySelectorAll('.pip');
  todasTelas.forEach((el, i) => el.classList.toggle('ativa', i === idx));
  todosPips.forEach((el, i) => {
    el.classList.toggle('ativo', i === idx);
    el.style.setProperty('--cor-atual', TELAS[idx].cor);
    el.style.setProperty('--duracao', CONFIG.rotacaoSegundos + 's');
    if (i === idx) el.offsetHeight;
  });
  indicadorNomeEl.textContent = TELAS[idx].titulo;

  // Quando entrar na tela de funcionário, carrega a arte (com rotação)
  if (TELAS[idx].tipo === 'funcionario') {
    ativarTelaFuncionario();
  }
}

function rotacionar() {
  indiceAtual = (indiceAtual + 1) % TELAS.length;
  ativarTela(indiceAtual);
}

renderTudo();
setInterval(rotacionar, CONFIG.rotacaoSegundos * 1000);
document.getElementById('clima-temp').textContent = '28°';
setInterval(renderTudo, CONFIG.atualizarSegundos * 1000);
</script>

<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ILED · Sistema Operacional</title>
<style>
:root{--red:#e10600;--red2:#ff2b30;--bg:#08080a;--txt:#f3f4f7;--mut:#9aa0ac;
--glass:rgba(255,255,255,.04);--brd:rgba(255,255,255,.09);--ok:#34d399;--radius:16px}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:system-ui,Segoe UI,Roboto,sans-serif;color:var(--txt);
background:radial-gradient(1200px 600px at 80% -10%,rgba(225,6,0,.14),transparent 60%),
linear-gradient(180deg,#08080a,#0b0b0f 50%,#08080a);background-attachment:fixed;min-height:100vh}
.glass{background:var(--glass);border:1px solid var(--brd);border-radius:var(--radius);backdrop-filter:blur(14px)}
.wrap{max-width:1180px;margin:0 auto;padding:22px 20px 60px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(180deg,var(--red2),var(--red));
display:grid;place-items:center;font-weight:900;color:#fff;box-shadow:0 6px 20px rgba(225,6,0,.32)}
.brand b{font-size:16px;letter-spacing:.02em}.brand span{display:block;font-size:10px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase}
.pill{font-size:11px;font-weight:800;padding:5px 11px;border-radius:999px;background:rgba(52,211,153,.14);color:var(--ok)}
.tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:9px 16px;border-radius:11px;border:1px solid transparent;background:none;color:var(--mut);
font-weight:700;font-size:13.5px;cursor:pointer}
.tab.on{background:rgba(225,6,0,.14);color:#fff;border-color:rgba(225,6,0,.3)}
.grid{display:grid;gap:14px;grid-template-columns:repeat(4,1fr);margin-bottom:18px}
.kpi{padding:18px}.kpi .n{font-size:30px;font-weight:800;letter-spacing:-.02em}
.kpi .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.12em;font-weight:800;margin-top:4px}
.card{padding:18px;margin-bottom:16px}.card h2{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin:0 0 12px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);padding:8px 10px;border-bottom:1px solid var(--brd)}
td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.05)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
input{background:rgba(0,0,0,.3);color:var(--txt);border:1px solid var(--brd);border-radius:10px;padding:9px 11px;font-size:13.5px;font-weight:600;outline:none}
input:focus{border-color:rgba(225,6,0,.5)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:12px}
.f label{display:block;font-size:11px;color:var(--mut);font-weight:700;margin-bottom:5px}
.tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;background:rgba(225,6,0,.16);color:var(--red2)}
@media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}}
</style></head>
<body>
<div id="app"></div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const SB_URL="https://bmgwnoulgthejfjxqugw.supabase.co", SB_KEY="sb_publishable_ya-Eb1L5tsbvC1YF8iYQ-A_ML-ZC8Ef"
const sb = createClient(SB_URL, SB_KEY)
const app = document.getElementById('app')
app.innerHTML = `<div class="wrap"><header>
  <div class="brand"><div class="logo">IL</div><div><b>ILED</b><span>Operacional · Fase 1</span></div></div>
  <span class="pill">● conectado</span></header>
  <div class="tabs">
    <button class="tab on" data-t="geral">Visão Geral</button>
    <button class="tab" data-t="estoque">Estoque</button>
    <button class="tab" data-t="eventos">Eventos</button>
  </div><div id="view">Carregando...</div></div>`
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');render(b.dataset.t)})
function kpi(n,l){return `<div class="glass kpi"><div class="n">${n??'—'}</div><div class="l">${l}</div></div>`}
async function render(t){const v=document.getElementById('view');v.innerHTML='Carregando...'
  if(t==='geral')return geral(v);if(t==='estoque')return estoque(v);if(t==='eventos')return eventos(v)}
async function geral(v){
  const [ev,md,sa,est]=await Promise.all([
    sb.from('eventos').select('*',{count:'exact',head:true}),
    sb.from('modelos_painel').select('*',{count:'exact',head:true}),
    sb.from('evento_saidas').select('*',{count:'exact',head:true}),
    sb.from('estoque').select('estoque_total,disponivel,bases(sigla)')])
  const rows=est.data||[];let tb=0,ts=0,db=0,ds=0
  rows.forEach(r=>{const s=r.bases?.sigla;if(s==='BSB'){tb+=+r.estoque_total||0;db+=+r.disponivel||0}else{ts+=+r.estoque_total||0;ds+=+r.disponivel||0}})
  v.innerHTML=`<div class="grid">${kpi(md.count,'Modelos de painel')}${kpi(ev.count,'Eventos')}${kpi(sa.count,'Saídas registradas')}${kpi(tb+ts,'Cabinets em estoque')}</div>
  <div class="card glass"><h2>Estoque por base</h2>
  <table><thead><tr><th>Base</th><th class="num">Total</th><th class="num">Disponível</th></tr></thead><tbody>
  <tr><td>Brasília (BSB)</td><td class="num">${tb}</td><td class="num">${db}</td></tr>
  <tr><td>São Paulo (SP)</td><td class="num">${ts}</td><td class="num">${ds}</td></tr></tbody></table></div>`}
async function estoque(v){
  const {data}=await sb.from('estoque').select('estoque_total,disponivel,modelos_painel(nome_canonico,familia_eng),bases(sigla)')
  const rows=(data||[]).map(r=>({m:r.modelos_painel?.nome_canonico||'—',f:r.modelos_painel?.familia_eng||'',b:r.bases?.sigla||'',t:r.estoque_total,d:r.disponivel}))
  v.innerHTML=`<div class="card glass"><h2>Estoque · disponibilidade por base</h2>
  <div class="row"><div class="f"><label>Buscar modelo</label><input id="q" placeholder="ex.: NT 2.9, DP 3.9..."></div></div>
  <table><thead><tr><th>Modelo</th><th>Família</th><th>Base</th><th class="num">Total</th><th class="num">Disponível</th></tr></thead><tbody id="tb"></tbody></table></div>`
  const draw=(f='')=>{document.getElementById('tb').innerHTML=rows.filter(r=>r.m.toLowerCase().includes(f.toLowerCase()))
    .map(r=>`<tr><td>${r.m}</td><td>${r.f?`<span class="tag">${r.f}</span>`:''}</td><td>${r.b}</td><td class="num">${r.t}</td><td class="num">${r.d}</td></tr>`).join('')}
  draw();document.getElementById('q').oninput=e=>draw(e.target.value)}
async function eventos(v){
  const {data}=await sb.from('eventos').select('nome').order('nome')
  const rows=data||[]
  v.innerHTML=`<div class="card glass"><h2>Eventos (${rows.length})</h2>
  <div class="row"><div class="f"><label>Buscar evento</label><input id="q" placeholder="nome do evento..."></div></div>
  <table><thead><tr><th>Evento</th></tr></thead><tbody id="tb"></tbody></table></div>`
  const draw=(f='')=>{document.getElementById('tb').innerHTML=rows.filter(r=>(r.nome||'').toLowerCase().includes(f.toLowerCase()))
    .map(r=>`<tr><td>${r.nome}</td></tr>`).join('')}
  draw();document.getElementById('q').oninput=e=>draw(e.target.value)}
render('geral')
</script></body></html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ILED — Sistema Operacional</title>
<style>
:root{
  --bg:#08080a; --txt:#f3f4f7; --mut:#9aa0ac;
  --red:#e10600; --red2:#ff2b38; --grn:#37c98a; --amber:#f2b53c; --blue:#3d74ff;
  --line:rgba(255,255,255,.075); --glass-bd:rgba(255,255,255,.10);
  --glass-sh:0 8px 32px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.09);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  color-scheme:dark; background:var(--bg); color:var(--txt);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100vh; overflow-x:hidden;
}
body:before{
  content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
  background:
   radial-gradient(1100px 600px at 12% -8%, rgba(225,6,0,.14), transparent 60%),
   radial-gradient(900px 620px at 108% 8%, rgba(61,116,255,.10), transparent 60%),
   radial-gradient(1200px 800px at 50% 120%, rgba(225,6,0,.06), transparent 55%),
   linear-gradient(180deg,#08080a,#0a0a0d 60%,#08080a);
}
#fx{position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.6}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:#0b0b0f}
::-webkit-scrollbar-thumb{background:linear-gradient(#e10600,#7a0400);border-radius:8px;border:2px solid #0b0b0f}
::-webkit-scrollbar-thumb:hover{background:#ff2b38}

.subpixel{height:5px;width:100%;display:flex}
.subpixel i{flex:1}
.subpixel i:nth-child(4n+1){background:var(--red)}
.subpixel i:nth-child(4n+2){background:var(--amber)}
.subpixel i:nth-child(4n+3){background:#f5f5f5}
.subpixel i:nth-child(4n){background:var(--blue)}

.glass{
  background:linear-gradient(180deg,rgba(22,22,28,.72),rgba(14,14,18,.62));
  -webkit-backdrop-filter:blur(16px) saturate(150%); backdrop-filter:blur(16px) saturate(150%);
  border:1px solid var(--glass-bd); border-radius:18px; box-shadow:var(--glass-sh);
}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mut);font-weight:700}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.02em}

/* ---------- HEADER ---------- */
header.top{position:sticky;top:0;z-index:20;backdrop-filter:blur(14px);background:rgba(8,8,10,.82);border-bottom:1px solid var(--line)}
.topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;flex-wrap:wrap}
.logowrap{position:relative;display:grid;place-items:center;flex:none}
.logowrap .glow{position:absolute;width:66px;height:20px;border-radius:12px;filter:blur(18px);z-index:0;animation:cyc 5s linear infinite}
@keyframes cyc{0%{background:#e10600}25%{background:#f2b53c}50%{background:#f5f5f5}75%{background:#3d74ff}100%{background:#e10600}}
.logowrap img{height:46px;width:auto;position:relative;z-index:1;display:block}
.htitle b{font-size:14.5px;font-weight:800;letter-spacing:.03em;display:block}
.htitle span{font-size:10px;color:var(--mut);letter-spacing:.18em;text-transform:uppercase}
.grow{flex:1}
.iconbtn{background:rgba(255,255,255,.05);border:1px solid var(--glass-bd);color:var(--txt);
  padding:8px 13px;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer}
.iconbtn:hover{background:rgba(255,255,255,.09)}
.tstamp{font-size:11px;color:var(--mut)}
.stat{font-size:11px;font-weight:800;padding:5px 11px;border-radius:999px;background:rgba(55,201,138,.14);color:var(--grn);display:inline-flex;align-items:center;gap:6px}
.stat i{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}

nav.setores{display:flex;gap:2px;padding:0 16px;overflow-x:auto}
nav.setores button{white-space:nowrap;border:none;background:transparent;color:var(--mut);
  padding:11px 14px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent}
nav.setores button:hover:not(:disabled){color:var(--txt)}
nav.setores button.on{color:#fff;border-bottom-color:var(--red)}
nav.setores button:disabled{opacity:.32;cursor:not-allowed}
nav.setores button small{font-size:9px;opacity:.7;margin-left:5px;letter-spacing:.08em}

/* ---------- LAYOUT DE SESSOES EM COLUNAS ---------- */
main{padding:20px;max-width:1560px;margin:0 auto}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.span2{grid-column:1 / -1}
.sec{padding:18px}
.sechead{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sechead h3{margin:0;font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:800}
.sechead .cnt{font-size:11px;color:var(--mut);font-weight:700}
.sechead .sp{flex:1}
.addbtn{background:linear-gradient(180deg,var(--red2),var(--red));border:none;color:#fff;
  padding:7px 13px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(225,6,0,.3)}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{padding:17px}
.kpi .v{font-size:29px;font-weight:800;letter-spacing:-.03em;line-height:1.05}
.kpi .k{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.14em;font-weight:800;margin-top:7px}
.kpi.hero{background:linear-gradient(140deg,rgba(225,6,0,.20),rgba(20,20,26,.7))}

.tblwrap{max-height:430px;overflow:auto;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{position:sticky;top:0;background:#111116;text-align:left;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--mut);padding:9px 9px;border-bottom:1px solid var(--glass-bd);z-index:1}
td{padding:8px 9px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:nth-child(even){background:rgba(255,255,255,.016)}
tbody tr:hover{background:rgba(225,6,0,.06)}
td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
.mini{font-size:11px;color:var(--mut)}

input,select{background:rgba(0,0,0,.34);color:var(--txt);border:1px solid var(--glass-bd);
  border-radius:10px;padding:8px 11px;font-size:13px;font-weight:600;outline:none;font-family:inherit}
input:focus,select:focus{border-color:rgba(225,6,0,.55)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters input{flex:1;min-width:150px}

.chip{display:inline-block;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;white-space:nowrap}
.chip.ok{background:rgba(55,201,138,.15);color:var(--grn)}
.chip.wa{background:rgba(242,181,60,.15);color:var(--amber)}
.chip.no{background:rgba(255,43,56,.15);color:var(--red2)}
.chip.nt{background:rgba(61,116,255,.14);color:var(--blue)}
.chip.gy{background:rgba(255,255,255,.07);color:var(--mut)}

.bar{height:6px;border-radius:5px;background:rgba(255,255,255,.09);overflow:hidden;min-width:64px}
.bar i{display:block;height:100%;border-radius:5px}

.acts{display:flex;gap:5px}
.ico{background:rgba(255,255,255,.05);border:1px solid var(--glass-bd);color:var(--mut);
  width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:12px;line-height:1;display:grid;place-items:center}
.ico:hover{color:#fff;background:rgba(255,255,255,.1)}
.ico.del:hover{color:var(--red2);border-color:rgba(255,43,56,.4)}
.ico.pr{color:var(--blue);border-color:rgba(61,116,255,.28)}
.ico.pr:hover{color:#fff;background:rgba(61,116,255,.22)}

/* consulta */
.qform{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.qform .full{grid-column:1/-1}
.qform label{display:block;font-size:10.5px;color:var(--mut);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.1em}
.qform input,.qform select{width:100%}
.verdict{padding:16px;border-radius:14px;margin-top:6px;display:none}
.verdict.on{display:block}
.verdict.yes{background:rgba(55,201,138,.12);border:1px solid rgba(55,201,138,.35)}
.verdict.non{background:rgba(255,43,56,.12);border:1px solid rgba(255,43,56,.35)}
.verdict .big{font-size:21px;font-weight:800;letter-spacing:-.02em}

/* modal */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.66);backdrop-filter:blur(4px);z-index:60;
  display:none;align-items:center;justify-content:center;padding:20px}
.mask.on{display:flex}
.modal{width:100%;max-width:520px;padding:24px;max-height:88vh;overflow:auto}
.modal h4{margin:0 0 4px;font-size:16px}
.modal .sub{font-size:12px;color:var(--mut);margin-bottom:16px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fgrid .full{grid-column:1/-1}
.fgrid label{display:block;font-size:10.5px;color:var(--mut);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}
.fgrid input,.fgrid select{width:100%}
.mfoot{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
.btn{padding:10px 18px;border-radius:11px;font-weight:800;font-size:13px;cursor:pointer;border:none}
.btn.p{background:linear-gradient(180deg,var(--red2),var(--red));color:#fff;box-shadow:0 5px 16px rgba(225,6,0,.3)}
.btn.g{background:rgba(255,255,255,.06);color:var(--txt);border:1px solid var(--glass-bd)}

.toast{position:fixed;bottom:22px;right:22px;z-index:80;padding:13px 18px;border-radius:12px;
  font-weight:700;font-size:13px;display:none;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.on{display:block}
.toast.ok{background:#12492f;color:#8ff0c0;border:1px solid rgba(55,201,138,.4)}
.toast.er{background:#4d1418;color:#ffb4ba;border:1px solid rgba(255,43,56,.4)}

.loading{padding:60px;text-align:center;color:var(--mut)}
.spin{width:26px;height:26px;border:3px solid rgba(255,255,255,.12);border-top-color:var(--red);
  border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.warn{background:rgba(242,181,60,.1);border:1px solid rgba(242,181,60,.3);padding:10px 13px;
  border-radius:10px;font-size:12px;color:var(--amber);margin-bottom:12px}


/* ---------- MODO TV (fullscreen) ---------- */
#tv{position:fixed;inset:0;z-index:999;background:#08080a;display:none;flex-direction:column;overflow:hidden}
#tv.on{display:flex}
.tvtop{display:flex;align-items:center;gap:18px;padding:16px 26px;border-bottom:1px solid var(--glass-bd)}
.tvtop .lg{height:52px}
.tvtop .emp b{font-size:22px;font-weight:800;letter-spacing:.02em;display:block;line-height:1.15}
.tvtop .emp span{font-size:12px;color:var(--mut);text-transform:capitalize}
.tvclock{font-size:56px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1}
.tvclock small{font-size:22px;color:var(--mut);font-weight:700}
.tvbody{flex:1;padding:22px 26px;overflow:hidden;position:relative}
.tvscr{position:absolute;inset:22px 26px;opacity:0;transform:translateY(14px);
  transition:opacity .5s,transform .5s;pointer-events:none;overflow:hidden}
.tvscr.on{opacity:1;transform:none}
.tvh{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.tvh h2{margin:0;font-size:30px;font-weight:800;letter-spacing:-.02em}
.tvh .bar{width:5px;height:34px;border-radius:3px;background:var(--red)}
.tvh .cnt{font-size:14px;color:var(--mut);font-weight:700}
.tvfoot{display:flex;align-items:center;gap:12px;padding:12px 26px;border-top:1px solid var(--glass-bd);font-size:12px;color:var(--mut)}
.tvdots{display:flex;gap:6px;flex:1}
.tvdots i{width:26px;height:4px;border-radius:2px;background:rgba(255,255,255,.14);transition:background .3s}
.tvdots i.on{background:var(--red)}
.tvgrid{display:grid;gap:14px}
.tvcard{background:linear-gradient(180deg,rgba(24,24,30,.8),rgba(14,14,18,.7));
  border:1px solid var(--glass-bd);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden}
.tvcard:before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--mut)}
.tvcard.alta:before{background:var(--red)} .tvcard.media:before{background:var(--amber)}
.tvcard.baixa:before{background:var(--blue)} .tvcard.ok:before{background:var(--grn)}
.tvcard h4{margin:0 0 6px;font-size:21px;font-weight:800;line-height:1.25}
.tvcard .who{font-size:14px;color:var(--mut);font-weight:700}
.tvcard .tag{position:absolute;right:16px;top:16px;font-size:11px;font-weight:800;padding:5px 11px;border-radius:7px}
.tvbig{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.tvkpi{background:linear-gradient(140deg,rgba(225,6,0,.14),rgba(20,20,26,.75));
  border:1px solid var(--glass-bd);border-radius:18px;padding:24px}
.tvkpi .v{font-size:52px;font-weight:800;letter-spacing:-.03em;line-height:1}
.tvkpi .k{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.14em;font-weight:800;margin-top:10px}
.tvaviso{border-radius:18px;padding:26px 30px;margin-bottom:14px}
.tvaviso h3{margin:0 0 8px;font-size:28px;font-weight:800}
.tvaviso p{margin:0;font-size:18px;line-height:1.5;color:#d6d9de}
.tvaviso.INFO{background:rgba(61,116,255,.12);border:1px solid rgba(61,116,255,.35)}
.tvaviso.ATENCAO{background:rgba(242,181,60,.12);border:1px solid rgba(242,181,60,.4)}
.tvaviso.URGENTE{background:rgba(255,43,56,.13);border:1px solid rgba(255,43,56,.45)}
.tvaviso.COMEMORACAO{background:rgba(55,201,138,.12);border:1px solid rgba(55,201,138,.38)}
.tvperson{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.04);
  border:1px solid var(--glass-bd);border-radius:16px;padding:16px 20px}
.tvperson .av{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;
  font-size:22px;font-weight:800;background:linear-gradient(140deg,var(--red2),var(--red));color:#fff}
.tvperson b{font-size:21px;display:block} .tvperson span{font-size:14px;color:var(--mut)}
@media(prefers-reduced-motion:reduce){.tvscr{transition:none}}

@media(max-width:1120px){.cols{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.kpis{grid-template-columns:1fr}.qform,.fgrid{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){.logowrap .glow{animation:none}}
</style>
</head>

<script>

(function(){
  var cv=document.getElementById('fx'),cx=cv.getContext('2d'),W,H,ps;
  function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  function init(){ps=[];var n=Math.min(80,Math.floor(W*H/22000));
    for(var i=0;i<n;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.1+.5,
      vx:(Math.random()-.5)*.32,vy:(Math.random()-.5)*.32,a:Math.random()*.55+.2});}
  function tick(){cx.clearRect(0,0,W,H);cx.shadowColor='rgba(225,6,0,.95)';cx.shadowBlur=8;
    for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      cx.beginPath();cx.arc(p.x,p.y,p.r,0,6.283);cx.fillStyle='rgba(225,6,0,'+p.a+')';cx.fill();}
    requestAnimationFrame(tick);}
  addEventListener('resize',function(){rs();init();});rs();init();tick();
})();
</script>

/* ================= MOTOR DE DISPONIBILIDADE =================
   disponivel(periodo) = estoque_fisico(base) - Σ saidas que se sobrepoem
   sobreposicao: saida <= dFim  E  (retorno vazio OU retorno >= dIni)      */
function foraNoPeriodo(equip,base,ini,fim){
  const eq=String(equip||'').toUpperCase().trim()
  let qtd=0, lista=[]
  for(const it of DB.ditens){
    if(String(it.equipamento||'').toUpperCase().trim()!==eq) continue
    const dm=it.demandas||{}
    if(base && dm.base!==base) continue
    const ds=toDate(dm.data_saida), dr=toDate(dm.data_retorno)
    const sobrepoe = (!ds || !fim || ds<=fim) && (!dr || !ini || dr>=ini)
    // quantidade NULL = Estoque ainda nao contou -> nao desconta, mas avisa
    if(sobrepoe){ qtd+=(+it.quantidade||0)
      lista.push({evento:dm.evento,quantidade:it.quantidade,
                  data_saida:dm.data_saida,data_retorno:dm.data_retorno}) }
  }
  return {qtd,lista}
}
function estoqueFisico(item,base){
  if(!item) return 0
  if(base==='BSB') return +item.est_bsb||0
  if(base==='SP')  return +item.est_sp||0
  return (+item.est_bsb||0)+(+item.est_sp||0)
}

function openForm(table,row){
  const sp=SPEC[table]; const alvo=sp.tabela||table
  const ed=!!row && !row.__novo; row=row||{}
  const dl=DB.itens.map(i=>`<option value="${esc(i.descricao)}">`).join('')
  const dlTec=[...new Set(DB.lprod.map(x=>x.tecnico).filter(Boolean))].sort().map(t=>`<option value="${esc(t)}">`).join('')
  const dlMod=DB.lmod.map(m=>`<option value="${esc(m.modelo)}">`).join('')
  const dlSet=[...new Set([...DB.csol.map(x=>x.setor),...DB.corc.map(x=>x.setor)].filter(Boolean))].sort().map(t=>`<option value="${esc(t)}">`).join('')
  const dlFor=DB.cforn.map(f=>`<option value="${esc(f.nome_fantasia)}">`).join('')
  const dlFpg=[...new Set(DB.cped.map(x=>x.forma_pagamento).filter(Boolean))].sort().map(t=>`<option value="${esc(t)}">`).join('')
  const dlPla=DB.fvei.map(v=>`<option value="${esc(v.placa)}">${esc(v.veiculo||'')}</option>`).join('')
  const dlMot=DB.fmot.map(m=>`<option value="${esc(m.nome)}">`).join('')
  const dlObr=[...new Set(DB.ifo.map(x=>x.obra).filter(Boolean))].sort().map(o=>`<option value="${esc(o)}">`).join('')
  const dlIfM=[...new Set([...DB.ifs.map(x=>x.item),...DB.ife.map(x=>x.modelo)].filter(Boolean))].sort()
    .map(o=>`<option value="${esc(o)}">`).join('')
  const dlIfP=[...new Set(DB.ifo.map(x=>x.processamento).filter(Boolean))].sort().map(o=>`<option value="${esc(o)}">`).join('')
  const dlEvR=eventosRecentes().map(e=>`<option value="${esc(e.nome)}">${esc(e.ref)}</option>`).join('')
  const html=`<h4>${ed?'Editar':'Novo'} — ${sp.titulo}</h4>
    <div class="sub">${ed?'Alterando registro existente.':'Os dados vão direto para o banco.'}</div>
    <datalist id="dl_itens">${dl}</datalist>
    <datalist id="dl_tecnicos">${dlTec}</datalist>
    <datalist id="dl_modelos">${dlMod}</datalist>
    <datalist id="dl_setores">${dlSet}</datalist>
    <datalist id="dl_forn">${dlFor}</datalist>
    <datalist id="dl_formas">${dlFpg}</datalist>
    <datalist id="dl_placas">${dlPla}</datalist>
    <datalist id="dl_motoristas">${dlMot}</datalist>
    <datalist id="dl_obras">${dlObr}</datalist>
    <datalist id="dl_ifmod">${dlIfM}</datalist>
    <datalist id="dl_ifproc">${dlIfP}</datalist>
    <datalist id="dl_evrec">${dlEvR}</datalist>
    <div class="fgrid">${sp.campos.map(c=>{
      const v=row[c.k]==null?'':row[c.k]
      let f
      if(c.t==='arquivo') f=`<input id="f_${c.k}" type="file" accept="application/pdf,image/*"
          style="padding:9px;font-size:12px">
          ${v?`<div class="mini" style="margin-top:5px">atual: <a href="${esc(v)}" target="_blank" style="color:var(--blue)">ver comprovante</a></div>`:''}`
      else if(c.t==='demanda') f=`<select id="f_${c.k}">${DB.dem.map(dm=>`<option value="${dm.id}" ${v===dm.id?'selected':''}>${esc(dm.evento)} — ${dbr(dm.data_saida)}</option>`).join('')}</select>`
      else if(c.t==='select') f=`<select id="f_${c.k}">${c.opts.map(o=>`<option ${String(v)===o?'selected':''}>${o}</option>`).join('')}</select>`
      else if(c.t==='datalist') f=`<input id="f_${c.k}" list="dl_${c.src||'itens'}" value="${esc(v)}">`
      else f=`<input id="f_${c.k}" type="${c.t}" value="${esc(v)}" ${c.t==='number'?'step="any"':''}>`
      return `<div class="${c.full?'full':''}"><label>${c.l}${c.req?' *':''}</label>${f}</div>`
    }).join('')}</div>
    <div class="mfoot">
      <button class="btn g" id="mcancel">Cancelar</button>
      <button class="btn p" id="msave">${ed?'Salvar':'Adicionar'}</button>
    </div>`
  $('#modal').innerHTML=html; $('#mask').classList.add('on')
  $('#mcancel').onclick=closeForm
  $('#msave').onclick=async()=>{
    const obj={}
    // campos de arquivo: envia ao repositório antes de gravar
    for(const c of sp.campos.filter(x=>x.t==='arquivo')){
      const inp=document.getElementById('f_'+c.k)
      if(inp && inp.files && inp.files[0]){
        const f=inp.files[0]
        if(f.size>10*1024*1024){ toast('Arquivo maior que 10 MB',false); return }
        $('#msave').disabled=true; $('#msave').textContent='Enviando arquivo…'
        const ext=(f.name.split('.').pop()||'pdf').toLowerCase()
        const caminho=`${alvo}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`
        const {error:eu}=await sb.storage.from('comprovantes').upload(caminho,f,{contentType:f.type})
        if(eu){ $('#msave').disabled=false; $('#msave').textContent='Salvar'
          return toast('Erro ao enviar: '+eu.message,false) }
        const {data:pu}=sb.storage.from('comprovantes').getPublicUrl(caminho)
        obj[c.k]=pu.publicUrl
        if(c.nomeEm) obj[c.nomeEm]=f.name
      } else if(ed && row[c.k]) obj[c.k]=row[c.k]
    }
    for(const c of sp.campos){
      if(c.t==='arquivo') continue
      let v=document.getElementById('f_'+c.k).value
      if(c.req && !String(v).trim()){ toast('Preencha: '+c.l,false); return }
      if(c.t==='number') v=v===''?0:Number(v)
      if(c.t==='date' && v==='') v=null
      obj[c.k]=v===''?null:v
    }
    $('#msave').disabled=true
    try{
      if(alvo==='demandas' && sp.tabela) obj.cq_ok=true
      const q = ed ? sb.from(alvo).update(obj).eq('id',row.id) : sb.from(alvo).insert(obj)
      const {error}=await q
      if(error) throw new Error(error.message)
      closeForm(); toast(ed?'Registro atualizado':'Registro adicionado'); await loadAll()
    }catch(ex){ $('#msave').disabled=false; toast('Erro: '+ex.message,false) }
  }
}
function closeForm(){ $('#mask').classList.remove('on'); $('#modal').innerHTML='' }
$('#mask').addEventListener('click',e=>{ if(e.target.id==='mask') closeForm() })

async function delRow(table,id,label){
  if(!confirm('Excluir "'+label+'"?\n\nEssa ação não pode ser desfeita.')) return
  const {error}=await sb.from(table).delete().eq('id',id)
  if(error) return toast('Erro: '+error.message,false)
  toast('Registro excluído'); loadAll()
}

/* ===== MOTOR DE ROMANEIO V38.0 (port do Apps Script) ===== */
const DEGRAU_NOME="M.BENZ/AXOR 2041 S (MB)", DEGRAU_COMP=3.00, DEGRAU_DESC=0.30
const fl=Math.floor
function familiaAmpla(sku){
  const s=String(sku).toUpperCase()
  if(s.includes("UNILUMIN")||s.includes("DICOLOR")||s.includes("OUTDOOR")) return "FAM_OUTDOOR_MISTO"
  if(s.includes("ABSEN")&&s.includes("INDOOR")) return "FAM_NT"
  return "OUTROS"
}
function capacidadeMaxima(v,p){
  if(!p.l||!p.c||!p.a||!v.l||!v.c||!v.a) return null
  if(String(v.nome||'').trim().toUpperCase()===DEGRAU_NOME.trim().toUpperCase()){
    const cN=fl(v.l/p.l),z1N=fl(DEGRAU_COMP/p.c),pN1=fl((v.a-DEGRAU_DESC)/p.a)
    const z2N=fl((v.c-DEGRAU_COMP)/p.c),pN2=fl(v.a/p.a)
    const cV=fl(v.l/p.c),z1V=fl(DEGRAU_COMP/p.l),pV1=fl((v.a-DEGRAU_DESC)/p.a)
    const z2V=fl((v.c-DEGRAU_COMP)/p.l),pV2=fl(v.a/p.a)
    return Math.max((cN*z1N*pN1)+(cN*z2N*pN2),(cV*z1V*pV1)+(cV*z2V*pV2))
  }
  return Math.max(fl(v.l/p.l)*fl(v.c/p.c)*fl(v.a/p.a), fl(v.l/p.c)*fl(v.c/p.l)*fl(v.a/p.a))
}
function gerarRomaneio(veiculo,itens,paineis){
  const v={l:veiculo.l,c:veiculo.c,a:veiculo.a}
  const temDegrau=String(veiculo.nome||'').trim().toUpperCase()===DEGRAU_NOME.trim().toUpperCase()
  const pis={FAM_NT:[],FAM_OUTDOOR_MISTO:[],OUTROS:[]}
  let totalPeso=0,tem=false
  for(const it of itens){
    const q=+it.qtd||0; if(!it.sku||q<=0) continue
    const s=paineis.find(x=>x.sku===it.sku); if(!s) continue
    tem=true; totalPeso+=q*(+s.peso||0)
    for(let n=0;n<q;n++) pis[familiaAmpla(it.sku)].push({nome:it.sku,l:+s.largura,c:+s.comprimento,a:+s.altura})
  }
  if(!tem) return {erro:'Informe ao menos uma quantidade.'}
  const linhas=[]; let sobras=[]; let profSim=0
  for(const fam in pis){
    let pool=pis[fam]; if(!pool.length) continue
    const ref=pool[0]
    const cN=fl(v.l/ref.l),cV=fl(v.l/ref.c)
    let largItem,orient,cols
    if(cV>cN){largItem=ref.c;orient="VIRADO";cols=cV}else{largItem=ref.l;orient="NORMAL";cols=cN}
    if(cols>0){ let t=0
      while(pool.length>0&&t<2000){ t++
        let altD=v.a,zona=2
        if(temDegrau&&profSim<DEGRAU_COMP){altD=v.a-DEGRAU_DESC;zona=1}
        let emp=fl(altD/ref.a); if(emp<1)emp=1
        const cap=cols*emp
        if(pool.length>=cap){
          const iL=[]; const lote=pool.splice(0,cap); let mP=0,mA=0
          for(let c=0;c<cols;c++){
            const pi=lote.splice(0,emp)
            if(pi.length){ let aP=0
              for(const x of pi){const pr=orient==="NORMAL"?x.c:x.l; if(pr>mP)mP=pr; aP+=x.a}
              if(aP>mA)mA=aP
              const n0=pi[0].nome, mix=pi.some(x=>x.nome!==n0)
              iL.push({endereco:'[COL '+(c+1)+']',desc:mix?('MIX ('+pi.length+'x)'):(pi.length+'x '+n0),orient})
            }
          }
          linhas.push({itens:iL,prof:mP,qtdTotal:cap,tipo:"PAREDAO",sL:v.l-(cols*largItem),sA:altD-mA,zona})
          profSim+=mP
        } else { sobras=sobras.concat(pool); pool=[] }
      }
    } else sobras=sobras.concat(pool)
  }
  while(sobras.length>0){
    let lr=v.l,iL=[],mP=0,col=1,qt=0,mAI=0,altS=v.a,zS=2
    if(temDegrau&&profSim<DEGRAU_COMP){altS=v.a-DEGRAU_DESC;zS=1}
    let i=0
    while(i<sobras.length&&lr>0.01){
      const c=sobras[i]; let lg=c.l,pr=c.c,or="NORMAL"
      if(lg>lr&&c.c<=lr){lg=c.c;pr=c.l;or="VIRADO"}
      if(lg<=lr){
        const eM=fl(altS/c.a); const pi=[]; const alvo=c.nome; let k=i
        while(k<sobras.length&&pi.length<eM){ if(sobras[k].nome===alvo)pi.push(sobras.splice(k,1)[0]); else k++ }
        iL.push({endereco:'[COL '+col+']',desc:pi.length+'x '+pi[0].nome,orient:or})
        lr-=lg; mP=Math.max(mP,pr); qt+=pi.length; col++; mAI=Math.max(mAI,c.a*pi.length)
      } else i++
    }
    if(iL.length){linhas.push({itens:iL,prof:mP,qtdTotal:qt,tipo:"SOBRA",sL:lr,sA:altS-mAI,zona:zS});profSim+=mP}
    else break
  }
  linhas.sort((a,b)=>a.zona!==b.zona?a.zona-b.zona
    :(a.tipo==="PAREDAO"&&b.tipo==="SOBRA"?-1:(b.tipo==="PAREDAO"&&a.tipo==="SOBRA"?1:b.qtdTotal-a.qtdTotal)))
  return {linhas,totalCases:linhas.reduce((s,l)=>s+l.qtdTotal,0),totalPeso,
    profUsada:Math.round(profSim*100)/100,profDisp:v.c,cabe:profSim<=v.c}
}

const cfg=(k,def)=>{const r=DB.cfg.find(x=>x.parametro===k);return r?(isNaN(+r.valor)?r.valor:+r.valor):def}
function calcScreen(key,wM,hM){
  const m=PANELS[key]; if(!m) return null
  wM=+wM||0; hM=+hM||0
  const PPP=cfg('pixels_per_port',650000),VOLT=cfg('voltage',220),PF=cfg('power_factor',.35)
  const UW=cfg('uhd_w',3840),UH=cfg('uhd_h',2160)
  const ex=v=>Math.abs(v-Math.round(v))<1e-6
  const cabsW=Math.max(1,Math.round(wM/m.dim.w)), cabsH=Math.max(1,Math.round(hM/m.dim.h))
  const totalCabs=cabsW*cabsH, resW=cabsW*m.res.w, resH=cabsH*m.res.h
  const pxPerCab=m.res.w*m.res.h
  const cabsPerPort=Math.max(1,Math.floor(PPP/pxPerCab))

  const a4x=Math.ceil(resW/UW), a4y=Math.ceil(resH/UH)
  const totalW=totalCabs*m.maxW
  return {m,cabsW,cabsH,exactW:ex(wM/m.dim.w),exactH:ex(hM/m.dim.h),totalCabs,resW,resH,
    totalPx:resW*resH,pxPerCab,cabsPerPort,portsByPixel,areas4k:Math.max(1,a4x*a4y),
    exceeds4k:(resW>UW)||(resH>UH),totalW,avgW:Math.round(totalW/3),
    amps:totalW/VOLT,kVA:(totalW/PF)/1000,circuitsAC:Math.ceil(totalCabs/m.cabsPerAC),
    weight:totalCabs*m.weight,areaM2:(cabsW*m.dim.w)*(cabsH*m.dim.h),
    riggingPoints:Math.ceil(totalCabs/m.riggingLimit)}
}
function signalRouting(cabsW,cabsH,cabsPerPort){
  let colsPerBlock=Math.floor(cabsPerPort/cabsH)
  if(!colsPerBlock||colsPerBlock<1)colsPerBlock=1
  if(colsPerBlock>cabsW)colsPerBlock=cabsW
  const blocks=[]; let c=0
  while(c<cabsW){const w=Math.min(colsPerBlock,cabsW-c);blocks.push({c0:c,cCount:w});c+=w}
  const cells={}; let port=0
  for(const blk of blocks){
    const seq=[]
    for(let ci=0;ci<blk.cCount;ci++){
      const col=blk.c0+ci, up=(ci%2===0)
      if(up){for(let r=cabsH-1;r>=0;r--)seq.push({r,c:col})}
      else{for(let r=0;r<cabsH;r++)seq.push({r,c:col})}
    }
    for(let i=0;i<seq.length;i+=cabsPerPort){
      const ch=seq.slice(i,i+cabsPerPort)
      ch.forEach((x,k)=>cells[x.r+'_'+x.c]={port,order:k}); port++
    }
  }
  return {cells,ports:port,colsPerBlock,blocks:blocks.length}
}
function acRouting(cabsW,cabsH,cabsPerAC){
  const cells={}; let circuit=0,count=0
  for(let r=cabsH-1;r>=0;r--) for(let c=0;c<cabsW;c++){
    if(count===cabsPerAC){circuit++;count=0}
    cells[r+'_'+c]={circuit,order:count}; count++
  }
  return {cells,circuits:circuit+1}
}

function calcCusto(i){
  const LIM=cfg('limiar_km',80), DV=cfg('diaria_viagem',100), DL=cfg('diaria_local',70)
  const HOSP=cfg('hosp_dia',200), GAS=cfg('preco_gasolina',7)
  const CONS={VAN:cfg('consumo_van',7),SPIN:cfg('consumo_spin',10),CARRO:cfg('consumo_carro',10)}
  const b=i.base==='SP'?'sp':'brasilia'
  const rate={Motorista:cfg('cache_'+b+'_motorista',70),Tecnico:cfg('cache_'+b+'_tecnico',b==='sp'?300:200),
    Auxiliar:cfg('cache_'+b+'_auxiliar',100),Freelancer:cfg('cache_'+b+'_freelancer',350),
    Operacao:cfg('cache_'+b+'_operacao',500)}
  const dias=Math.max(1,+i.dias||1)
  const isViagem=(+i.distP||0)>LIM, diaria=isViagem?DV:DL
  const pes=(+i.mot||0)+(+i.tec||0)+(+i.aux||0)+(+i.fre||0)+(+i.ope||0)
  const ci={Motorista:(+i.mot||0)*rate.Motorista,Tecnico:(+i.tec||0)*rate.Tecnico,
    Auxiliar:(+i.aux||0)*rate.Auxiliar,Freelancer:(+i.fre||0)*rate.Freelancer,
    Operacao:(+i.ope||0)*rate.Operacao}
  const cacheBase=Object.values(ci).reduce((a,v)=>a+v,0)
  const cacheTotal=cacheBase*(i.cachePorDia?dias:1)
  const diariasTotal=pes*diaria*dias
  const hosp=i.hospedagem?pes*HOSP*dias:0
  const consP=CONS[i.veicP]||1
  const fuelP=(+i.qVeicP||0)>0?(+i.qVeicP)*(((+i.distP||0)*2)/consP)*GAS:0
  const carRent=(i.veicP==='CARRO')?(+i.qVeicP||0)*(+i.carRent||0)*dias:0
  const fretePrinc=(+i.qTruckP||0)*(((+i.distP||0)*2*(+i.ccdP||0))+(+i.ccP||0))
  const pedagios=(+i.pedP||0)
  const total=cacheTotal+diariasTotal+hosp+fuelP+carRent+fretePrinc+pedagios
  return {isViagem,diaria,dias,pessoas:pes,cacheItens:ci,cacheTotal,diariasTotal,hosp,
    combustivel:fuelP,locacaoCarro:carRent,frete:fretePrinc,pedagios,total,rate}
}

function novaConferencia(){
  CONF={hdr:{evento:'',data_saida:'',data_volta:'',comercial:'',cliente:''},qty:{},busca:''}
  const html=`<h4>Nova conferência de retorno</h4>
    <div class="sub">Lance o que faltou. O total e o recibo saem automaticamente.</div>
    <div class="fgrid">
      <div class="full"><label>Evento *</label><input id="cf_ev" placeholder="Nome do evento"></div>
      <div><label>Data de saída</label><input id="cf_ds" type="date"></div>
      <div><label>Data de volta</label><input id="cf_dv" type="date"></div>
      <div><label>Comercial</label><input id="cf_cm"></div>
      <div><label>Cliente</label><input id="cf_cl"></div>
    </div>
    <div class="eyebrow" style="margin:16px 0 8px">Itens em falta</div>
    <input id="cf_bq" placeholder="Filtrar item…" style="width:100%;margin-bottom:8px">
    <div class="tblwrap" style="max-height:280px"><table>
      <thead><tr><th>Item</th><th class="r">Unitário</th><th class="r">Qtd</th><th class="r">Total</th></tr></thead>
      <tbody id="cf_itens"></tbody></table></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;
      padding:13px 16px;border-radius:12px;background:rgba(242,181,60,.10);border:1px solid rgba(242,181,60,.3)">
      <span class="eyebrow" style="font-size:11px">Total da conferência</span>
      <b class="num" id="cf_tot" style="font-size:24px;color:var(--amber)">R$ 0,00</b></div>
    <div class="mfoot">
      <button class="btn g" id="cf_cancel">Cancelar</button>
      <button class="btn p" id="cf_save">Salvar e gerar recibo</button></div>`
  $('#modal').style.maxWidth='760px'
  $('#modal').innerHTML=html; $('#mask').classList.add('on')
  const listaItens=()=>{
    const f=($('#cf_bq').value||'').toLowerCase()
    const rows=DB.cpre.filter(p=>String(p.item).toLowerCase().includes(f))
    $('#cf_itens').innerHTML=rows.slice(0,300).map(p=>{
      const q=CONF.qty[p.item]||''
      const t=(+q||0)*(+p.valor_unit||0)
      return `<tr><td class="mini">${esc(String(p.item).slice(0,46))}</td>
        <td class="r num">${brl(p.valor_unit)}</td>
        <td class="r"><input type="number" min="0" value="${q}" placeholder="0"
          data-item="${esc(p.item)}" class="cfq" style="width:66px;text-align:right"></td>
        <td class="r num" style="color:${t?'var(--amber)':'var(--mut)'}">${t?brl(t):'—'}</td></tr>`}).join('')
      ||'<tr><td colspan="4" class="mini" style="padding:14px">Nenhum item.</td></tr>'
    document.querySelectorAll('.cfq').forEach(i=>i.oninput=()=>{
      CONF.qty[i.dataset.item]=i.value; recalc(); listaItens()
      const el=document.querySelector(`.cfq[data-item="${CSS.escape(i.dataset.item)}"]`)
      if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}})
  }
  const recalc=()=>{
    const t=Object.entries(CONF.qty).reduce((a,[it,q])=>{
      const p=DB.cpre.find(x=>x.item===it); return a+((+q||0)*(p?+p.valor_unit||0:0))},0)
    $('#cf_tot').textContent=brl(t); return t}
  listaItens(); $('#cf_bq').oninput=listaItens
  $('#cf_cancel').onclick=()=>{$('#modal').style.maxWidth='';closeForm()}
  $('#cf_save').onclick=async()=>{
    const ev=$('#cf_ev').value.trim()
    if(!ev) return toast('Preencha o nome do evento',false)
    const itens=Object.entries(CONF.qty).filter(([,q])=>+q>0)
      .map(([it,q])=>{const p=DB.cpre.find(x=>x.item===it)
        const vu=p?+p.valor_unit||0:0
        return {item:it,quantidade:+q,valor_unit:vu,total:+q*vu}})
    if(!itens.length) return toast('Informe ao menos uma quantidade',false)
    const total=itens.reduce((a,x)=>a+x.total,0)
    $('#cf_save').disabled=true
    try{
      const {data,error}=await sb.from('conf_conferencias').insert({
        evento:ev,data_saida:$('#cf_ds').value||null,data_volta:$('#cf_dv').value||null,
        comercial:$('#cf_cm').value||null,cliente:$('#cf_cl').value||null,
        total,status:'LANCADA'}).select().single()
      if(error) throw new Error(error.message)
      const {error:e2}=await sb.from('conf_itens')
        .insert(itens.map(x=>({...x,conferencia_id:data.id})))
      if(e2) throw new Error(e2.message)
      $('#modal').style.maxWidth=''; closeForm()
      toast('Conferência salva · '+brl(total))
      await loadAll()
      reciboFalta(data.id)
    }catch(ex){ $('#cf_save').disabled=false; toast('Erro: '+ex.message,false) }
  }
}

function eventosRecentes(){
  const lst=[]
  DB.ehist.filter(x=>+x.ano>=2026).forEach(x=>lst.push({
    nome:String(x.nome||'').trim(), ord:(+x.ano||0)*100+(+x.mes||0),
    ref:(MESN[+x.mes]||'')+'/'+x.ano}))
  DB.dem.filter(x=>x.data_saida).forEach(x=>lst.push({
    nome:String(x.evento||'').trim(), ord:+String(x.data_saida).slice(0,4)*100+ +String(x.data_saida).slice(5,7),
    ref:dbr(x.data_saida)}))
  const vistos=new Set(), out=[]
  lst.sort((a,b)=>b.ord-a.ord).forEach(e=>{
    const k=e.nome.toUpperCase()
    if(!e.nome||vistos.has(k))return
    vistos.add(k); out.push(e)})
  return out
}

let IF_={ano:0}
function viewInsFixa(){
  const O=DB.ifo
  const anos=[...new Set(O.map(x=>String(x.data||'').slice(0,4)).filter(Boolean))].sort()
  if(!IF_.ano) IF_.ano=anos[anos.length-1]||''
  const noAno=IF_.ano?O.filter(x=>String(x.data||'').slice(0,4)===IF_.ano):O
  const inst=noAno.filter(x=>sa(x.servico||'').toUpperCase().startsWith('INSTAL'))
  const manu=noAno.filter(x=>sa(x.servico||'').toUpperCase().startsWith('MANUT'))
  const vend=noAno.filter(x=>sa(x.servico||'').toUpperCase().startsWith('VEND'))
  const m2=noAno.reduce((a,x)=>a+(+x.metragem||0),0)
  const placas=noAno.reduce((a,x)=>a+(+x.qtd_placas||0),0)
  // obras que voltaram (mais de um atendimento) — sinal de problema
  const porObra={}
  O.forEach(x=>{const k=String(x.obra||'').trim().toUpperCase();if(!k)return
    porObra[k]=porObra[k]||{n:0,inst:0,manu:0,m2:0,ult:'',lista:[]}
    porObra[k].n++; porObra[k].m2+=(+x.metragem||0)
    if(sa(x.servico||'').toUpperCase().startsWith('INSTAL'))porObra[k].inst++
    if(sa(x.servico||'').toUpperCase().startsWith('MANUT'))porObra[k].manu++
    if(String(x.data||'')>porObra[k].ult)porObra[k].ult=String(x.data||'')
    porObra[k].lista.push(x)})
  const retorno=Object.entries(porObra).filter(([,v])=>v.manu>0)
  const taxaRet=inst.length?Math.round(retorno.length/Object.keys(porObra).length*100):0
  // estoque calculado: entradas - placas usadas em saidas
  const calc={}
  DB.ife.forEach(e=>{const k=String(e.modelo||'').trim().toUpperCase()
    calc[k]=calc[k]||{ent:0,sai:0};calc[k].ent+=(+e.quantidade||0)})
  O.forEach(o=>{const k=String(o.modelo||'').trim().toUpperCase()
    if(!k)return; calc[k]=calc[k]||{ent:0,sai:0};calc[k].sai+=(+o.qtd_placas||0)})
  const divergentes=DB.ifs.filter(s=>{
    const c=calc[String(s.item||'').trim().toUpperCase()]
    if(!c)return false
    return Math.abs((c.ent-c.sai)-(+s.quantidade||0))>0.5}).length

    <button class="addbtn" style="background:rgba(255,255,255,.08);box-shadow:none" onclick="__crud.openForm('insfixa_entradas')">+ Entrada</button>
    <button class="addbtn" style="background:rgba(61,116,255,.18);box-shadow:none;border:1px solid rgba(61,116,255,.35)" onclick="__crud.tarefaDoDia('GERAL')">+ Tarefa do dia</button>
  </div>
  <div class="kpis">
    <div class="glass kpi hero"><div class="v num">${fmt(m2)} m²</div>
      <div class="k">Instalado ${IF_.ano||'(total)'}</div></div>
    <div class="glass kpi"><div class="v num">${inst.length}</div><div class="k">Instalações</div></div>
    <div class="glass kpi"><div class="v num">${manu.length}</div><div class="k">Manutenções</div></div>
    <div class="glass kpi"><div class="v num">${fmt(placas)}</div><div class="k">Placas aplicadas</div></div>
  </div>

  <div class="cols">
    <!-- MIX DE SERVIÇO -->
    <section class="glass sec">
      <div class="sechead"><h3>Mix de serviço</h3><div class="sp"></div>
        <span class="cnt">${noAno.length} atendimentos</span></div>
      <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
        <div>${donut([{l:'Instalação',v:inst.length,cor:'#37c98a'},
                      {l:'Manutenção',v:manu.length,cor:'#f2b53c'},
                      {l:'Venda',v:vend.length,cor:'#3d74ff'}],
          {centro:noAno.length?Math.round(manu.length/noAno.length*100)+'%':'0%',rotulo:'MANUTENÇÃO'})}</div>
        <div style="flex:1;min-width:160px">
          ${[['Instalação',inst.length,'#37c98a'],['Manutenção',manu.length,'#f2b53c'],['Venda',vend.length,'#3d74ff']]
            .map(([l,v,c])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:9px">
              <span style="width:11px;height:11px;border-radius:3px;background:${c}"></span>
              <span class="mini" style="flex:1">${l}</span><b class="num">${v}</b></div>`).join('')}
        </div>
      </div>

      ${(()=>{const g={}
        inst.forEach(x=>{const t=lim2(x.tipo_instalacao)||'—';g[t]=(g[t]||0)+1})

function histObra(nome){

  const prMan=its.find(x=>sa(x.servico||'').toUpperCase().startsWith('MANUT'))

    const tag=st==='CONCLUIDO'?'<span class="tag" style="background:rgba(55,201,138,.2);color:#8ff0c0">CONCLUÍDO</span>'
      :st==='EM ANDAMENTO'?'<span class="tag" style="background:rgba(242,181,60,.2);color:#f6d99b">EM ANDAMENTO</span>'
      :'<span class="tag" style="background:rgba(255,255,255,.08);color:#9aa0ac">PENDENTE</span>'
    return `<div class="tvcard ${cls}">${tag}<h4>${esc(x.tarefa)}</h4>
      <div class="who">${esc(x.setor||'')}${x.responsavel?' · '+esc(x.responsavel):''}${x.hora?' · '+esc(x.hora):''}</div></div>`}
  // 1. tarefas de hoje
  if(tHoje.length) T.push({t:'Tarefas de hoje',c:tHoje.length+' tarefa(s)',
    h:`<div class="tvgrid" style="grid-template-columns:repeat(2,1fr)">${tHoje.slice(0,8).map(card).join('')}</div>`})
  // 2. semana
  if(tSem.length) T.push({t:'Próximos dias',c:tSem.length+' tarefa(s)',
    h:`<div class="tvgrid" style="grid-template-columns:repeat(2,1fr)">${tSem.slice(0,8).map(card).join('')}</div>`})
  // 3. operação
  const estT=DB.itens.reduce((a,x)=>a+(+x.est_bsb||0)+(+x.est_sp||0),0)
  const estD=DB.itens.reduce((a,x)=>a+(+x.disp_bsb||0)+(+x.disp_sp||0),0)
  const demAb=DB.dem.filter(x=>x.status!=='RETORNADA').length
  const M=mesAtual()
  const labM=DB.lprod.filter(x=>String(x.data||'').slice(0,7)===M).reduce((a,x)=>a+(+x.q_modulos||0),0)
  T.push({t:'Operação agora',c:'ao vivo',
    h:`<div class="tvbig">
      <div class="tvkpi"><div class="v">${fmt(estD)}</div><div class="k">Painéis disponíveis</div></div>
      <div class="tvkpi"><div class="v">${demAb}</div><div class="k">Demandas abertas</div></div>
      <div class="tvkpi"><div class="v">${fmt(labM)}</div><div class="k">Módulos no mês</div></div>
      <div class="tvkpi"><div class="v">${fmt(estT)}</div><div class="k">Parque total</div></div></div>`})
  // 4. entregas / demandas proximas
  const prox=DB.dem.filter(d=>d.data_saida&&String(d.data_saida)>=hj)
    .sort((a,b)=>String(a.data_saida).localeCompare(String(b.data_saida))).slice(0,7)
  if(prox.length) T.push({t:'Próximas saídas',c:prox.length+' demanda(s)',
    h:`<div class="tvgrid">${prox.map(d=>{
      const dd=Math.ceil((toDate(d.data_saida)-HOJE)/864e5)
      return `<div class="tvcard ${dd<=1?'alta':dd<=3?'media':'baixa'}">
        <span class="tag" style="background:rgba(255,255,255,.08);color:#cfd3da">
          ${dd===0?'HOJE':dd===1?'AMANHÃ':'EM '+dd+' DIAS'}</span>
        <h4>${esc(d.evento||'')}</h4>
        <div class="who">${esc(d.base||'')}${d.metragem?' · '+fmt(d.metragem)+' m²':''}${d.cidade?' · '+esc(d.cidade):''}</div></div>`}).join('')}</div>`})
  // 5. avisos
  if(avisos.length) T.push({t:'Avisos',c:avisos.length,
    h:avisos.slice(0,4).map(a=>`<div class="tvaviso ${sa(a.tipo||'INFO').toUpperCase()}">
      <h3>${esc(a.titulo)}</h3><p>${esc(a.mensagem||'')}</p></div>`).join('')})
  // 6. pessoas
  const fm=DB.pfun[0]
  if(aniv.length||fm) T.push({t:'Nosso time',c:MESL[mesN],
    h:`${fm?`<div class="tvaviso COMEMORACAO" style="margin-bottom:18px">
        <h3>⭐ Funcionário do mês — ${esc(fm.nome)}</h3>
        <p>${esc(fm.setor||'')}${fm.destaque?' · '+esc(fm.destaque):''}</p></div>`:''}
      ${aniv.length?`<div class="eyebrow" style="margin-bottom:12px;font-size:13px">Aniversariantes de ${MESL[mesN]}</div>
      <div class="tvgrid" style="grid-template-columns:repeat(3,1fr)">
      ${aniv.slice(0,9).map(a=>`<div class="tvperson">
        <div class="av">${esc(String(a.nome).trim()[0]||'?')}</div>
        <div><b>${esc(nomeCurto(a.nome))}</b><span>dia ${a.dia}${a.setor?' · '+esc(a.setor):''}</span></div></div>`).join('')}</div>`:''}`})
  // 7. indicadores
  if(DB.pind.length) T.push({t:'Indicadores',c:'segurança e operação',
    h:`<div class="tvbig">${DB.pind.slice(0,4).map(i=>{
      const dd=i.data_ultimo?Math.floor((HOJE-toDate(i.data_ultimo))/864e5):null
      return `<div class="tvkpi"><div class="v" style="color:${dd!==null&&dd>90?'#37c98a':'#fff'}">${dd??'—'}</div>
        <div class="k">${esc(String(i.indicador||'').slice(0,26))}</div></div>`}).join('')}</div>`})
  return T.length?T:[{t:'Painel ILED',c:'',h:'<div class="mini" style="font-size:18px">Cadastre tarefas e avisos para aparecerem aqui.</div>'}]
}
function abrirTV(){
  const tv=$('#tv'); TV.idx=0
  const emp=pcfg('Nome da Empresa','ILED PRODUÇÕES')
  const cidade=pcfg('Cidade','Brasília'), uf=pcfg('UF','DF')
  const rot=(+pcfg('Rotacao',20)||20)*1000
  const rec=(+pcfg('Atualizacao',30)||30)*1000
  const telas=telasTV()
  tv.innerHTML=`
    <div class="subpixel">${Array(48).fill('<i></i>').join('')}</div>
    <div class="tvtop">
      <img class="lg" src="${LOGO_PRINT?'':''}" style="display:none">
      <div class="logowrap" style="flex:none"><div class="glow"></div>
        <img src="${document.querySelector('.logowrap img').src}" style="height:52px;position:relative;z-index:1"></div>
      <div class="emp"><b>${esc(emp)}</b><span id="tv_data">—</span></div>
      <div class="sp" style="flex:1"></div>
      <div style="text-align:right"><div class="tvclock" id="tv_hora">--:--<small id="tv_seg">:--</small></div>
        <div class="mini" style="font-size:13px">${esc(cidade)}, ${esc(uf)}</div></div>
      <button class="iconbtn" id="tv_sair" style="margin-left:18px">✕ Sair</button>
    </div>
    <div class="tvbody" id="tv_body">
      ${telas.map((s,i)=>`<div class="tvscr ${i===0?'on':''}" data-i="${i}">
        <div class="tvh"><div class="bar"></div><h2>${esc(s.t)}</h2>
          ${s.c?`<span class="cnt">${esc(String(s.c))}</span>`:''}</div>
        ${s.h}</div>`).join('')}
    </div>
    <div class="tvfoot">
      <div class="tvdots" id="tv_dots">${telas.map((_,i)=>`<i class="${i===0?'on':''}"></i>`).join('')}</div>
      <span id="tv_nome">${esc(telas[0].t)}</span>
      <span>·</span><span id="tv_ts">—</span>
    </div>`
  tv.classList.add('on')
  document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen().catch(()=>{})
  const tick=()=>{const d=new Date()
    $('#tv_hora').innerHTML=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')
      +`<small>:${String(d.getSeconds()).padStart(2,'0')}</small>`
    $('#tv_data').textContent=DIAS[d.getDay()]+', '+d.getDate()+' de '+MESL[d.getMonth()+1].toLowerCase()}
  tick(); TV.relogio=setInterval(tick,1000)
  const gira=()=>{const n=telas.length; if(n<2)return
    document.querySelectorAll('.tvscr').forEach(e=>e.classList.remove('on'))
    document.querySelectorAll('#tv_dots i').forEach(e=>e.classList.remove('on'))
    TV.idx=(TV.idx+1)%n
    const el=document.querySelector(`.tvscr[data-i="${TV.idx}"]`); if(el)el.classList.add('on')
    const dt=document.querySelectorAll('#tv_dots i')[TV.idx]; if(dt)dt.classList.add('on')
    $('#tv_nome').textContent=telas[TV.idx].t}
  TV.timer=setInterval(gira,rot)
  TV.recarga=setInterval(async()=>{await loadAll(); if($('#tv').classList.contains('on')){
    const i=TV.idx; fecharTV(true); abrirTV(); TV.idx=i}},rec)
  $('#tv_ts').textContent='atualizado '+new Date().toLocaleTimeString('pt-BR').slice(0,5)
  $('#tv_sair').onclick=()=>fecharTV()
  document.onkeydown=e=>{if(e.key==='Escape')fecharTV(); if(e.key==='ArrowRight')gira()}
}
function fecharTV(soLimpa){
  clearInterval(TV.timer);clearInterval(TV.relogio);clearInterval(TV.recarga)
  if(soLimpa)return
  $('#tv').classList.remove('on'); $('#tv').innerHTML=''
  document.fullscreenElement&&document.exitFullscreen&&document.exitFullscreen().catch(()=>{})
  document.onkeydown=null
}
window.__crud.abrirTV=abrirTV

/* --- mapa do Brasil (contorno geográfico real) --- */
function mapaBrasil(dados,unidade='m²'){
  const vals=Object.values(dados).filter(v=>v>0)
  const mx=Math.max(...vals,1)
  let s=`<svg viewBox="0 0 613 639" style="width:100%;max-width:520px;height:auto;display:block;margin:0 auto"
    xmlns="${svgNS}">`
  // sombra sutil do contorno do país
  s+=`<g>`
  for(const [uf,d] of Object.entries(BR_PATHS)){
    const v=dados[uf]||0, t=v/mx
    const cor=v>0?heatColor(t):'rgba(255,255,255,.045)'
    const brd=v>0?'rgba(255,255,255,.22)':'rgba(255,255,255,.09)'
    s+=`<path d="${d}" fill="${cor}" stroke="${brd}" stroke-width=".8" stroke-linejoin="round"
      style="transition:fill .3s"><title>${uf}: ${fmt(v)} ${unidade}</title></path>`
  }
  s+=`</g>`
  // rótulos: estado grande recebe o nome dentro; pequeno ganha marcador e etiqueta ao lado
  const comDado=Object.entries(dados).filter(([u,v])=>v>0&&UF_CENTRO[u]).sort((a,b)=>b[1]-a[1])
  const pequenos=[]
  comDado.forEach(([uf,v],i)=>{
    const [x,y,lado]=UF_CENTRO[uf], t=v/mx
    if(!(t>.28||i<7)) return
    const lbl=v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)
    if(lado>=42){
      s+=`<g style="pointer-events:none">
        <text x="${x}" y="${y-1}" text-anchor="middle" font-size="15" font-weight="800" fill="#fff"
          stroke="#08080a" stroke-width="3.4" paint-order="stroke" font-family="system-ui">${uf}</text>
        <text x="${x}" y="${y+13}" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff"
          stroke="#08080a" stroke-width="2.8" paint-order="stroke" opacity=".95" font-family="system-ui">${lbl}</text></g>`
    } else pequenos.push([uf,v,x,y,t,lbl])
  })
  // estados pequenos (DF, SE, AL, RJ, ES...) — anel de destaque e etiqueta deslocada
  pequenos.forEach(([uf,v,x,y,t,lbl],k)=>{
    const dx=x>330?52:-52, dy=(k%2?1:-1)*(12+k*9)
    const lx=x+dx, ly=y+dy
    s+=`<g style="pointer-events:none">
      <circle cx="${x}" cy="${y}" r="9" fill="none" stroke="${heatColor(Math.max(t,.55))}" stroke-width="2" opacity=".95"/>
      <line x1="${x+(dx>0?9:-9)}" y1="${y}" x2="${lx-(dx>0?26:-26)}" y2="${ly}"
        stroke="rgba(255,255,255,.4)" stroke-width="1.1"/>
      <rect x="${lx-26}" y="${ly-11}" width="52" height="23" rx="6"
        fill="rgba(8,8,10,.92)" stroke="${heatColor(Math.max(t,.55))}" stroke-width="1.2"/>
      <text x="${lx}" y="${ly-1}" text-anchor="middle" font-size="10.5" font-weight="800"
        fill="#fff" font-family="system-ui">${uf}</text>
      <text x="${lx}" y="${ly+9}" text-anchor="middle" font-size="9" font-weight="700"
        fill="#cfd3da" font-family="system-ui">${lbl}</text></g>`
  })
  s+='</svg>'
  return s
}
/* --- gráfico de área/linha --- */
function areaChart(series,opts={}){
  const W=opts.w||700, H=opts.h||210, P={t:16,r:14,b:26,l:44}
  const labels=opts.labels||[]
  const todos=series.flatMap(s=>s.data)
  const mx=Math.max(...todos,1), mn=0
  const iw=W-P.l-P.r, ih=H-P.t-P.b
  const px=i=>P.l+(labels.length>1?i/(labels.length-1)*iw:iw/2)
  const py=v=>P.t+ih-((v-mn)/(mx-mn||1))*ih
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" xmlns="${svgNS}">`
  s+=`<defs>`
  series.forEach((se,i)=>{s+=`<linearGradient id="g${i}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${se.cor}" stop-opacity=".38"/>
    <stop offset="100%" stop-color="${se.cor}" stop-opacity="0"/></linearGradient>`})
  s+=`</defs>`
  // grade
  for(let g=0;g<=4;g++){const y=P.t+ih-(g/4)*ih
    s+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
        <text x="${P.l-8}" y="${y+3.5}" text-anchor="end" font-size="9" fill="#6b7280" font-family="system-ui">
          ${mx*g/4>=1000?((mx*g/4)/1000).toFixed(1)+'k':Math.round(mx*g/4)}</text>`}
  series.forEach((se,i)=>{
    const pts=se.data.map((v,j)=>`${px(j)},${py(v)}`).join(' ')
    if(se.area!==false) s+=`<polygon points="${P.l},${P.t+ih} ${pts} ${px(se.data.length-1)},${P.t+ih}" fill="url(#g${i})"/>`
    s+=`<polyline points="${pts}" fill="none" stroke="${se.cor}" stroke-width="${se.w||2.4}"
      stroke-linejoin="round" stroke-linecap="round" ${se.tracejado?'stroke-dasharray="5 4"':''}/>`
    se.data.forEach((v,j)=>{if(v>0)s+=`<circle cx="${px(j)}" cy="${py(v)}" r="3.2" fill="${se.cor}"
      stroke="#0d0d11" stroke-width="1.5"><title>${labels[j]||''}: ${fmt(v)}</title></circle>`})
  })
  labels.forEach((l,i)=>{s+=`<text x="${px(i)}" y="${H-8}" text-anchor="middle" font-size="9.5"
    font-weight="700" fill="#8a8f99" font-family="system-ui">${l}</text>`})
  s+='</svg>'
  return s
}
/* --- rosca --- */
function donut(itens,opts={}){
  const S=opts.size||168, R=S/2-6, r=R*0.60, cx=S/2, cy=S/2
  const tot=itens.reduce((a,x)=>a+x.v,0)||1
  let ang=-Math.PI/2, s=`<svg viewBox="0 0 ${S} ${S}" style="width:${S}px;height:${S}px" xmlns="${svgNS}">`
  itens.forEach(it=>{
    const frac=it.v/tot, a2=ang+frac*Math.PI*2
    const big=frac>.5?1:0
    const x1=cx+R*Math.cos(ang), y1=cy+R*Math.sin(ang)
    const x2=cx+R*Math.cos(a2), y2=cy+R*Math.sin(a2)
    const x3=cx+r*Math.cos(a2), y3=cy+r*Math.sin(a2)
    const x4=cx+r*Math.cos(ang), y4=cy+r*Math.sin(ang)
    s+=`<path d="M${x1},${y1} A${R},${R} 0 ${big},1 ${x2},${y2} L${x3},${y3} A${r},${r} 0 ${big},0 ${x4},${y4} Z"
      fill="${it.cor}" opacity=".9"><title>${it.l}: ${fmt(it.v)} (${Math.round(frac*100)}%)</title></path>`
    ang=a2
  })
  if(opts.centro) s+=`<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="21" font-weight="800"
    fill="#f3f4f7" font-family="system-ui">${opts.centro}</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="8.5" font-weight="700"
    fill="#8a8f99" letter-spacing="1.4" font-family="system-ui">${opts.rotulo||''}</text>`
  return s+'</svg>'
}
/* --- medidor em arco --- */
function gauge(pct,label,opts={}){
  const W=210,H=126,cx=W/2,cy=H-8,R=88
  const a=Math.PI*(1-Math.min(Math.max(pct,0),1.35)/1.35)
  const pt=(ang,rr)=>[cx+rr*Math.cos(ang),cy-rr*Math.sin(ang)]
  const arc=(a1,a2,rr,cor,w)=>{const [x1,y1]=pt(a1,rr),[x2,y2]=pt(a2,rr)
    const big=Math.abs(a1-a2)>Math.PI?1:0
    return `<path d="M${x1},${y1} A${rr},${rr} 0 ${big},1 ${x2},${y2}" fill="none" stroke="${cor}" stroke-width="${w}" stroke-linecap="round"/>`}
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:auto" xmlns="${svgNS}">`
  s+=arc(Math.PI,0,R,'rgba(255,255,255,.07)',13)
  const cor=pct>=1?'#37c98a':pct>=.7?'#f2b53c':'#ff2b38'
  s+=arc(Math.PI,a,R,cor,13)
  s+=`<text x="${cx}" y="${cy-26}" text-anchor="middle" font-size="30" font-weight="800" fill="${cor}"
    font-family="system-ui" letter-spacing="-1">${Math.round(pct*100)}%</text>
    <text x="${cx}" y="${cy-8}" text-anchor="middle" font-size="9" font-weight="700" fill="#8a8f99"
    letter-spacing="1.6" font-family="system-ui">${label}</text>`
  return s+'</svg>'
}

function barrasH(itens,opts={}){
  const mx=Math.max(...itens.map(x=>x.v),1)
  return itens.map(it=>`<div style="display:flex;align-items:center;gap:9px;margin-bottom:7px">

      <div style="height:100%;width:${Math.round(it.v/mx*100)}%;border-radius:5px;
        background:${it.cor||'linear-gradient(90deg,#8a0400,#ff2b38)'}"></div>

/* FONTE ÚNICA: histórico congelado + demandas lançadas no sistema.
   Conforme a equipe usa o sistema, as demandas alimentam o dashboard sozinhas. */
function eventosUnificados(){
  const hist=DB.ehist.map(x=>({ano:+x.ano||0,mes:+x.mes||0,nome:x.nome,metragem:+x.metragem||0,
    tipo_painel:x.tipo_painel,comercial:x.comercial,cidade:x.cidade,uf:x.uf,
    painel_sub:+x.painel_sub||0,fonte:'HISTORICO'}))
  const dem=DB.dem.filter(d=>d.data_saida).map(d=>{
    const dt=String(d.data_saida)
    return {ano:+dt.slice(0,4),mes:+dt.slice(5,7),nome:d.evento,metragem:+d.metragem||0,
      tipo_painel:d.tipo_painel||'ILED',comercial:d.comercial,cidade:d.cidade,
      uf:d.uf||(d.base==='SP'?'SP':'DF'),painel_sub:+d.painel_sub||0,fonte:'SISTEMA'}})
  return hist.concat(dem)
}
function aggMes(evs,ano){
  const a={}; for(let m=1;m<=12;m++)a[m]={eventos:0,m2:0,cidades:new Set(),sub:0}
  evs.filter(x=>x.ano===ano).forEach(x=>{
    const m=x.mes; if(m<1||m>12)return
    a[m].eventos++; a[m].m2+=x.metragem; a[m].sub+=x.painel_sub
    if(x.cidade)a[m].cidades.add(String(x.cidade).trim().toUpperCase())})
  for(let m=1;m<=12;m++)a[m].cidades=a[m].cidades.size
  return a
}
function heatColor(t){
  if(t<.01) return 'rgba(255,255,255,.03)'
  if(t<.5){const k=t/.5
    return `rgba(${Math.round(20+235*k)},${Math.round(20+184*k)},${Math.round(24-24*k)},.78)`}
  const k=(t-.5)/.5
  return `rgba(255,${Math.round(204-173*k)},${Math.round(0+24*k)},.85)`
}

function desenhaHeat(agg){
  const meses=Object.keys(agg).filter(m=>agg[m].eventos>0)
  if(!meses.length){$('#dh_heat').innerHTML='<div class="mini" style="padding:20px">Sem dados no ano.</div>';return}
  const inds=[['eventos','EVENTOS'],['m2','METRAGEM (m²)'],['cidades','CIDADES'],['sub','SUBLOCAÇÃO (m²)']]
  const stress=meses.map(()=>0)
  let html=`<div style="display:grid;grid-template-columns:130px repeat(${meses.length},1fr);gap:3px;min-width:${130+meses.length*62}px">`
  html+='<div></div>'+meses.map(m=>`<div class="eyebrow" style="text-align:center;font-size:9px">${MESN[m]}</div>`).join('')
  for(const [k,lb] of inds){
    const vals=meses.map(m=>agg[m][k])
    const mn=Math.min(...vals), mx=Math.max(...vals)
    html+=`<div class="mini" style="font-weight:700;display:flex;align-items:center">${lb}</div>`
    vals.forEach((v,i)=>{
      const t=mx===mn?0:(v-mn)/(mx-mn); stress[i]+=t
      html+=`<div style="height:34px;border-radius:5px;background:${heatColor(t)};display:grid;place-items:center;
        font-size:10px;font-weight:700;color:${t>.2?'#fff':'#8a8f99'}" title="${lb}: ${fmt(v)}">
        ${v?(k==='m2'||k==='sub'?fmt(Math.round(v)):v):'—'}</div>`
    })
  }
  html+='</div>'
  $('#dh_heat').innerHTML=html
  let top=0,low=0
  stress.forEach((v,i)=>{if(v>stress[top])top=i; if(v<stress[low])low=i})
  $('#dh_top').textContent=MESL[meses[top]]
  $('#dh_low').textContent=MESL[meses[low]]
}

const CORES=['#e10600','#3d74ff','#37c98a','#f2b53c','#a855f7','#06b6d4','#f97316','#ec4899',
             '#84cc16','#8b5cf6','#14b8a6','#ef4444']
function desenhaGrade(r){
  const sinal=signalRouting(r.cabsW,r.cabsH,r.cabsPerPort)
  const ac=acRouting(r.cabsW,r.cabsH,r.m.cabsPerAC)
  const cel=Math.max(16,Math.min(38,Math.floor(760/r.cabsW)))
  let html=`<div style="display:grid;grid-template-columns:repeat(${r.cabsW},${cel}px);gap:2px;width:max-content">`
  for(let row=0;row<r.cabsH;row++) for(let c=0;c<r.cabsW;c++){
    const k=row+'_'+c
    const idx=CP.mapa==='sinal'?(sinal.cells[k]?sinal.cells[k].port:0):(ac.cells[k]?ac.cells[k].circuit:0)
    const ord=CP.mapa==='sinal'?(sinal.cells[k]?sinal.cells[k].order+1:''):(ac.cells[k]?ac.cells[k].order+1:'')
    const cor=CORES[idx%CORES.length]
    html+=`<div title="${CP.mapa==='sinal'?'Porta':'Circuito'} ${idx+1} · ordem ${ord}"
      style="height:${cel}px;background:${cor}22;border:1px solid ${cor};border-radius:3px;
      display:grid;place-items:center;font-size:${cel<24?8:9}px;font-weight:800;color:${cor}">${ord}</div>`
  }
  html+='</div>'
  const n=CP.mapa==='sinal'?sinal.ports:ac.circuits
  html+=`<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">`
    +Array.from({length:n},(_,i)=>`<span class="chip" style="background:${CORES[i%CORES.length]}22;color:${CORES[i%CORES.length]}">
      ${CP.mapa==='sinal'?'Porta':'Circuito'} ${i+1}</span>`).join('')+`</div>`
  $('#cp_grid').innerHTML=html
}

const chipDias=d=>{
  if(d===null) return '<span class="chip gy">—</span>'
  if(d<0) return `<span class="chip no">vencido ${Math.abs(d)}d</span>`
  if(d<30) return `<span class="chip no">${d}d</span>`
  if(d<60) return `<span class="chip wa">${d}d</span>`
  return `<span class="chip ok">${d}d</span>`
}
function drawFVei(){
  const q=($('#fv_q').value||'').toLowerCase()
  const rows=DB.fvei.filter(x=>(String(x.placa||'')+String(x.veiculo||'')).toLowerCase().includes(q))
  $('#ct_fv').textContent=rows.length
  $('#tb_fv').innerHTML=rows.map(x=>{
    const dim=(x.largura&&x.comprimento&&x.altura)?`${fmt(x.largura)}×${fmt(x.comprimento)}×${fmt(x.altura)}`:'—'
    return `<tr><td><span class="chip nt">${esc(x.placa)}</span></td>
      <td class="mini">${esc(String(x.veiculo||'—').slice(0,34))}</td><td>${esc(x.ano||'—')}</td>
      <td class="r num">${fmt(x.km_atual)}</td>
      <td>${chipDias(diasAte(x.licenciamento))}</td>
      <td>${chipDias(diasAte(x.vencimento_seguro))}</td>
      <td>${chipDias(diasAte(x.venc_tacografo))}</td>
      <td class="r mini">${dim}</td>

    || '<tr><td colspan="9" class="mini" style="padding:18px">Nenhum veículo.</td></tr>'
}
function drawFMot(){

function drawFMul(){

function drawFTro(){

    || '<tr><td colspan="7" class="mini" style="padding:18px">Nenhuma troca cadastrada.</td></tr>'

function drawFCusto(){
  const g={}
  DB.fvei.forEach(v=>{g[v.placa]={man:0,aba:0,cmp:0}})
  DB.fman.forEach(x=>{if(g[x.placa])g[x.placa].man+=(+x.valor||0)})
  DB.faba.forEach(x=>{if(g[x.placa])g[x.placa].aba+=(+x.total||0)})
  DB.cped.forEach(x=>{if(x.placa&&g[x.placa])g[x.placa].cmp+=(+x.valor_pago||0)})
  $('#tb_fc').innerHTML=Object.entries(g)
    .map(([p,v])=>({p,...v,tot:v.man+v.aba+v.cmp})).filter(x=>x.tot>0)
    .sort((a,b)=>b.tot-a.tot).map(x=>
    `<tr><td><span class="chip nt">${esc(x.p)}</span></td><td class="r num">${brl(x.man)}</td>
     <td class="r num">${brl(x.aba)}</td><td class="r num">${brl(x.cmp)}</td>
     <td class="r num" style="color:var(--red2)"><b>${brl(x.tot)}</b></td></tr>`).join('')
    || '<tr><td colspan="5" class="mini" style="padding:18px">Sem custo registrado.</td></tr>'
}

/* ---- simulação de carga ---- */
function veicCarga(){
  return DB.fvei.filter(v=>v.largura&&v.comprimento&&v.altura)
    .map(v=>({nome:v.veiculo||v.placa,l:+v.largura,c:+v.comprimento,a:+v.altura}))
}
function wireSim(){
  const vs=veicCarga()
  $('#sim_ve').innerHTML='<option value="">— selecione —</option>'
    +vs.map(v=>`<option ${SIM.veiculo===v.nome?'selected':''}>${esc(v.nome)}</option>`).join('')
    +`<option value="FRETE" ${SIM.veiculo==='FRETE'?'selected':''}>FRETE (dimensões avulsas)</option>`
  $('#sim_ev').value=SIM.evento
  $('#sim_ve').onchange=()=>{SIM.veiculo=$('#sim_ve').value
    $('#sim_frete').style.display=SIM.veiculo==='FRETE'?'flex':'none'}
  $('#sim_frete').style.display=SIM.veiculo==='FRETE'?'flex':'none'
  $('#sim_itens').innerHTML=DB.cgpai.map(p=>
    `<tr><td class="mini">${esc(String(p.sku).slice(0,40))}</td>
     <td class="r mini">${fmt(p.largura)}×${fmt(p.comprimento)}×${fmt(p.altura)}</td>
     <td class="r"><input type="number" min="0" value="${SIM.qty[p.sku]||''}" placeholder="0"
        style="width:70px;text-align:right" data-sku="${esc(p.sku)}" class="simq"></td></tr>`).join('')
  document.querySelectorAll('.simq').forEach(i=>i.oninput=()=>{
    SIM.qty[i.dataset.sku]=i.value
    const t=Object.values(SIM.qty).reduce((a,v)=>a+(+v||0),0)
    $('#sim_cnt').textContent=t+' cases'})
  $('#sim_cl').onclick=()=>{SIM={evento:'',veiculo:'',frete:{l:'',c:'',a:''},qty:{},res:null};viewFrota()}
  $('#sim_go').onclick=()=>{
    SIM.evento=$('#sim_ev').value
    let v
    if(SIM.veiculo==='FRETE'){
      v={nome:'FRETE',l:+$('#sim_fl').value,c:+$('#sim_fc').value,a:+$('#sim_fa').value}
      if(!v.l||!v.c||!v.a) return toast('Preencha as dimensões do frete',false)
    } else {
      v=veicCarga().find(x=>x.nome===SIM.veiculo)
      if(!v) return toast('Selecione um veículo',false)
    }
    const itens=Object.entries(SIM.qty).filter(([k,q])=>+q>0).map(([sku,qtd])=>({sku,qtd:+qtd}))
    if(!itens.length) return toast('Informe ao menos uma quantidade',false)
    const r=gerarRomaneio(v,itens,DB.cgpai)
    if(r.erro) return toast(r.erro,false)
    SIM.res=r; mostraRomaneio(v,r)
  }
}

/* ============ CONCILIAÇÃO FINANCEIRA ============ */
let CC={ini:'',fim:''}
const round2=v=>Math.round((+v||0)*100)/100
function statusConc(sis,fat){
  if(fat==null||fat==='') return {t:'AGUARDANDO',c:'gy',dif:null}
  const dif=round2(sis-(+fat||0))
  if(Math.abs(dif)<0.01) return {t:'OK',c:'ok',dif:0}
  return {t:'VERIFICAR',c:'no',dif}
}
function achaFat(tipo,chave){
  const r=DB.cconc.find(x=>x.tipo===tipo&&String(x.chave)===String(chave)
    &&x.periodo_ini===CC.ini&&x.periodo_fim===CC.fim)
  return r?r.valor_fatura:null
}
async function salvaFat(tipo,chave,valor){
  const obj={tipo,chave:String(chave),periodo_ini:CC.ini,periodo_fim:CC.fim,
    valor_fatura:(valor===''||valor==null)?null:Number(valor),updated_at:new Date().toISOString()}
  const {error}=await sb.from('compras_conciliacao')
    .upsert(obj,{onConflict:'tipo,chave,periodo_ini,periodo_fim'})
  if(error){ toast('Erro ao salvar: '+error.message,false); return false }
  const i=DB.cconc.findIndex(x=>x.tipo===tipo&&String(x.chave)===String(chave)
    &&x.periodo_ini===CC.ini&&x.periodo_fim===CC.fim)
  if(i>=0) DB.cconc[i].valor_fatura=obj.valor_fatura; else DB.cconc.push(obj)
  return true
}
async function marcaConciliado(id,val){
  const {error}=await sb.from('compras_pedidos').update({conciliado:val}).eq('id',id)
  if(error) return toast('Erro: '+error.message,false)
  const p=DB.cped.find(x=>x.id===id); if(p) p.conciliado=val
  toast(val?'Marcado como conciliado':'Desmarcado')
  desenhaConc()
}
window.__conc={salvaFat,marcaConciliado}

function wireConc(){
  const hj=new Date()
  CC.ini=CC.ini||new Date(hj.getFullYear(),hj.getMonth(),1).toISOString().slice(0,10)
  CC.fim=CC.fim||new Date(hj.getFullYear(),hj.getMonth()+1,0).toISOString().slice(0,10)
  $('#cc_di').value=CC.ini; $('#cc_df').value=CC.fim
  $('#cc_go').onclick=()=>{CC.ini=$('#cc_di').value; CC.fim=$('#cc_df').value; desenhaConc()}
  // formas disponiveis
  const formas=[...new Set(DB.cped.map(x=>x.forma_pagamento||'SEM FORMA'))].sort()
  $('#cc_card').innerHTML='<option value="">Todas</option>'+formas.map(f=>`<option>${esc(f)}</option>`).join('')
  $('#cc_card').onchange=desenhaConc
  desenhaConc()
}
function noPeriodo(){
  return DB.cped.filter(x=>{const d=String(x.data||''); return d&&d>=CC.ini&&d<=CC.fim})
}
function desenhaConc(){
  const P=noPeriodo()
  const total=P.reduce((a,x)=>a+(+x.valor_pago||0),0)
  $('#cc_tot').textContent=brl(total)

  /* --- Bloco 1: por forma de pagamento --- */
  const g={}
  P.forEach(x=>{const f=x.forma_pagamento||'SEM FORMA';g[f]=(g[f]||0)+(+x.valor_pago||0)})
  let somaSis=0,somaFat=0,pend=0
  $('#cc_b1').innerHTML=Object.entries(g).sort((a,b)=>b[1]-a[1]).map(([f,v])=>{
    const fat=achaFat('FORMA',f), st=statusConc(v,fat)
    somaSis+=v; somaFat+=(+fat||0); if(st.t==='AGUARDANDO')pend++
    return `<tr><td class="mini">${esc(f)}</td>
      <td class="r num">${brl(v)}</td>
      <td class="r"><input type="number" step="0.01" value="${fat==null?'':fat}" placeholder="digite"
         style="width:120px;text-align:right;background:rgba(242,181,60,.10);border-color:rgba(242,181,60,.35)"
         onchange="__conc.salvaFat('FORMA',${JSON.stringify(f)},this.value).then(function(ok){if(ok)__conc.redraw()})"></td>
      <td class="r num" style="color:${st.dif===null?'var(--mut)':(st.dif===0?'var(--grn)':'var(--red2)')}">${st.dif===null?'—':brl(st.dif)}</td>
      <td><span class="chip ${st.c}">${st.t}</span></td></tr>`}).join('')
    || '<tr><td colspan="5" class="mini" style="padding:16px">Nenhum pedido no período.</td></tr>'
  const stG=statusConc(somaSis,somaFat||null)
  $('#cc_b1f').innerHTML=`<tr style="background:rgba(225,6,0,.10)">
    <td><b>TOTAL GERAL</b></td><td class="r num"><b>${brl(somaSis)}</b></td>
    <td class="r num"><b>${somaFat?brl(somaFat):'—'}</b></td>
    <td class="r num" style="color:${stG.dif===0?'var(--grn)':'var(--red2)'}"><b>${somaFat?brl(somaSis-somaFat):'—'}</b></td>
    <td><span class="chip ${somaFat?stG.c:'gy'}">${somaFat?stG.t:'AGUARDANDO'}</span></td></tr>`
  $('#cc_stat').textContent=pend?`${pend} forma(s) aguardando fatura`:'todas as formas conferidas'

  /* --- Bloco 2: por ID de compra --- */
  const gi={}
  P.filter(x=>x.id_compra).forEach(x=>{const k=x.id_compra
    gi[k]=gi[k]||{n:0,v:0,canal:x.canal||'—'};gi[k].n++;gi[k].v+=(+x.valor_pago||0)})
  $('#cc_b2').innerHTML=Object.entries(gi).sort((a,b)=>b[1].v-a[1].v).map(([k,o])=>{
    const fat=achaFat('ID_COMPRA',k), st=statusConc(o.v,fat)
    return `<tr><td><span class="chip nt">${esc(k)}</span></td><td class="mini">${esc(o.canal)}</td>
      <td class="r num">${o.n}</td><td class="r num">${brl(o.v)}</td>
      <td class="r"><input type="number" step="0.01" value="${fat==null?'':fat}" placeholder="digite"
         style="width:110px;text-align:right;background:rgba(242,181,60,.10);border-color:rgba(242,181,60,.35)"
         onchange="__conc.salvaFat('ID_COMPRA',${JSON.stringify(k)},this.value).then(function(ok){if(ok)__conc.redraw()})"></td>
      <td class="r num" style="color:${st.dif===null?'var(--mut)':(st.dif===0?'var(--grn)':'var(--red2)')}">${st.dif===null?'—':brl(st.dif)}</td>
      <td><span class="chip ${st.c}">${st.t}</span></td></tr>`}).join('')
    || '<tr><td colspan="7" class="mini" style="padding:16px">Nenhum pedido com ID de compra no período.</td></tr>'

  /* --- Bloco 3: busca por cartão --- */
  const card=$('#cc_card').value
  const lst=P.filter(x=>!card||(x.forma_pagamento||'SEM FORMA')===card)
    .sort((a,b)=>String(a.data).localeCompare(String(b.data)))
  $('#cc_tf').textContent=brl(lst.reduce((a,x)=>a+(+x.valor_pago||0),0))
  $('#cc_b3').innerHTML=lst.slice(0,250).map(x=>
    `<tr><td>${dbr(x.data)}</td><td class="mini">${esc(x.forma_pagamento||'—')}</td>
     <td class="mini">${esc(String(x.fornecedor||'—').slice(0,24))}</td>
     <td class="mini">${esc(String(x.produto||'—').slice(0,28))}</td>
     <td class="r num">${brl(x.valor_pago)}</td>
     <td class="mini">${esc(x.id_compra||'—')}</td>
     <td><input type="checkbox" ${x.conciliado?'checked':''} style="width:17px;height:17px;accent-color:#37c98a;cursor:pointer"
        onchange="__conc.marcaConciliado('${x.id}',this.checked)"></td></tr>`).join('')
    || '<tr><td colspan="7" class="mini" style="padding:16px">Nenhum lançamento.</td></tr>'

  /* --- Bloco 4: matriz cartão × mês --- */
  const meses=[...new Set(DB.cped.map(x=>String(x.data||'').slice(0,7)).filter(Boolean))].sort()
  const cards=[...new Set(DB.cped.map(x=>x.forma_pagamento).filter(f=>f&&f.startsWith('CARTAO')))].sort()
  $('#cc_b4h').innerHTML='<th>Cartão</th>'+meses.map(m=>`<th class="r">${m.slice(5)}/${m.slice(0,4)}</th>`).join('')+'<th class="r">Total</th>'
  const mat={}, totM={}
  DB.cped.forEach(x=>{const f=x.forma_pagamento,m=String(x.data||'').slice(0,7)
    if(!f||!f.startsWith('CARTAO')||!m)return
    mat[f]=mat[f]||{};mat[f][m]=(mat[f][m]||0)+(+x.valor_pago||0)
    totM[m]=(totM[m]||0)+(+x.valor_pago||0)})
  $('#cc_b4').innerHTML=cards.map(c=>{
    const tot=meses.reduce((a,m)=>a+((mat[c]||{})[m]||0),0)
    return `<tr><td><b>${esc(c.replace('CARTAO ',''))}</b></td>`
      +meses.map(m=>{const v=(mat[c]||{})[m]||0
        return `<td class="r num" style="${v?'':'color:var(--mut)'}">${v?brl(v):'-'}</td>`}).join('')
      +`<td class="r num" style="color:var(--red2)"><b>${brl(tot)}</b></td></tr>`}).join('')
    +`<tr style="background:rgba(225,6,0,.10)"><td><b>TOTAL</b></td>`
      +meses.map(m=>`<td class="r num"><b>${totM[m]?brl(totM[m]):'-'}</b></td>`).join('')
      +`<td class="r num"><b>${brl(Object.values(totM).reduce((a,v)=>a+v,0))}</b></td></tr>`
}

  else if(st) rows=rows.filter(x=>String(x.status_gestao||'').toUpperCase()===st)
  $('#ct_cs').textContent=rows.length
  $('#tb_cs').innerHTML=rows.slice(0,250).map(x=>{

      <td><span class="chip ${String(x.prioridade||'').toUpperCase()==='ALTA'?'no':'gy'}">${esc(x.prioridade||'—')}</span></td>

      <td class="mini">${x.previsao_entrega?dbr(x.previsao_entrega):(x.previsao_obs?'<span class="chip wa">'+esc(x.previsao_obs.slice(0,18))+'</span>':'—')}</td>

function drawCPed(){
  const q=($('#fp_q').value||'').toLowerCase(), m=$('#fp_m').value, f=$('#fp_f').value
  let rows=DB.cped.filter(x=>(String(x.produto||'')+String(x.fornecedor||'')+String(x.setor||'')).toLowerCase().includes(q))
  if(m) rows=rows.filter(x=>String(x.data||'').slice(0,7)===m)
  if(f) rows=rows.filter(x=>x.forma_pagamento===f)
  $('#ct_cp').textContent=rows.length
  $('#tb_cp').innerHTML=rows.slice(0,250).map(x=>
    `<tr><td>${dbr(x.data)}</td><td class="mini">${esc(String(x.produto||'').slice(0,36))}</td>
     <td class="mini">${esc(String(x.fornecedor||'—').slice(0,22))}</td>
     <td class="mini">${esc(String(x.setor||'—').slice(0,18))}</td>
     <td class="r num">${brl(x.valor_pago)}</td>
     <td class="mini">${esc(x.forma_pagamento||'—')}</td>

function drawCForn(){
  const q=($('#ff_q').value||'').toLowerCase()
  // recalcula do real (pedidos) em vez de confiar no histórico da planilha
  const real={}

const mesAtual=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function diasUteis(ini,fim){let n=0;const d=new Date(ini)
  while(d<=fim){const w=d.getDay();if(w!==0&&w!==6)n++;d.setDate(d.getDate()+1)}return n}

  const M=mesAtual()
  const doMes=DB.lprod.filter(x=>String(x.data||'').slice(0,7)===M)
  const som=(arr,k)=>arr.reduce((a,x)=>a+(+x[k]||0),0)
  const modMes=som(doMes,'q_modulos'), pxMes=som(doMes,'q_pixels')
  const metaObj=DB.lmeta.find(x=>x.mes_ano===M)||DB.lmeta[0]
  const meta=+(metaObj&&metaObj.meta_modulos)||0
  const pct=meta?Math.round(modMes/meta*100):0
  // ritmo x necessario
  const hoje=new Date(), ano=hoje.getFullYear(), mes=hoje.getMonth()
  const ini=new Date(ano,mes,1), fim=new Date(ano,mes+1,0)
  const uteisTotal=diasUteis(ini,fim), uteisPass=diasUteis(ini,hoje)
  const uteisFalta=Math.max(uteisTotal-uteisPass,0)
  const ritmo=uteisPass?modMes/uteisPass:0
  const falta=Math.max(meta-modMes,0)
  const necessario=uteisFalta?falta/uteisFalta:0
  const projecao=Math.round(modMes+ritmo*uteisFalta)
  // metragem recuperada: modulos / divisor(modelo)
  const divisor={}; DB.lmod.forEach(m=>{if(m.divisor_metragem)divisor[String(m.modelo).toUpperCase().trim()]=+m.divisor_metragem})
  const m2=(arr)=>arr.reduce((a,x)=>{const dv=divisor[String(x.modelo||'').toUpperCase().trim()]
    return a+(dv?(+x.q_modulos||0)/dv:0)},0)

      </div>
      <div class="tblwrap"><table>

          <th class="r">Pixels</th><th class="r">Trilhas</th><th class="r">CI</th><th class="r">Másc.</th><th>Situação</th><th></th></tr></thead>

function drawLProd(){

     <td class="mini">${esc(x.situacao||'—')}</td>
     ${acts('lab_producao',x,x.tecnico+' '+dbr(x.data))}</tr>`).join('')

function drawPix(){
  // consumo medio/dia nos ultimos 30 dias -> projecao de esgotamento
  const lim=new Date(Date.now()-30*864e5).toISOString().slice(0,10)
  const cons={}
  DB.lprod.filter(x=>String(x.data||'')>=lim).forEach(x=>{
    const md=DB.lmod.find(m=>String(m.modelo).toUpperCase().trim()===String(x.modelo||'').toUpperCase().trim())
    const sku=md&&md.sku_pixel; if(!sku) return
    cons[sku]=(cons[sku]||0)+(+x.q_pixels||0)})
  $('#tb_px').innerHTML=DB.lpix.map(x=>{
    const sl=+x.saldo||0, mi=+x.minimo||0
    const dia=(cons[x.sku]||0)/30
    const ate=dia>0?Math.floor(Math.max(sl-mi,0)/dia):null
    let ch='<span class="chip ok">ok</span>'
    if(sl<=0) ch='<span class="chip no">zerado</span>'
    else if(sl<mi) ch='<span class="chip no">abaixo do mínimo</span>'
    else if(ate!==null&&ate<15) ch='<span class="chip wa">atenção</span>'
    return `<tr><td>${esc(x.sku)}</td><td class="r num" style="color:${sl<mi?'var(--red2)':'inherit'}">${fmt(sl)}</td>
      <td class="r num">${fmt(mi)}</td><td>${ch}</td>
      <td class="mini">${dia>0?(ate!==null?ate+' dias':'—'):'sem consumo'}</td>
      ${acts('lab_pixels',x,x.sku)}</tr>`}).join('')
    || '<tr><td colspan="6" class="mini" style="padding:18px">Nenhum SKU.</td></tr>'
}
function drawFisc(){
  const M=mesAtual()
  const g={}
  DB.lfisc.forEach(f=>{const t=f.tecnico||'—';g[t]=g[t]||{p:0,f:0,dias:[]}
    if(f.presente)g[t].p++;else g[t].f++
    g[t].dias.push({d:f.data,p:f.presente})})
  const prodT={}
  DB.lprod.filter(x=>String(x.data||'').slice(0,7)===M)
    .forEach(x=>{const t=x.tecnico||'—';prodT[t]=(prodT[t]||0)+(+x.q_modulos||0)})
  $('#tb_fs').innerHTML=Object.entries(g).sort((a,b)=>b[1].p-a[1].p).map(([t,v])=>{
    const tot=v.p+v.f, pc=tot?Math.round(v.p/tot*100):0
    const ult=v.dias.sort((a,b)=>String(b.d).localeCompare(String(a.d))).slice(0,12).reverse()
    return `<tr><td>${esc(t)}</td><td class="r num">${v.p}</td><td class="r num">${v.f}</td>
      <td class="r num" style="color:${pc>=90?'var(--grn)':pc>=70?'var(--amber)':'var(--red2)'}">${pc}%</td>
      <td class="r num">${fmt(prodT[t]||0)}</td>
      <td>${ult.map(d=>`<span title="${dbr(d.d)}" style="display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:2px;background:${d.p?'#37c98a':'#ff2b38'}"></span>`).join('')}</td></tr>`}).join('')
    || '<tr><td colspan="6" class="mini" style="padding:18px">Sem registro de fiscalização.</td></tr>'
}

const okSin=v=>!v||/^\s*(OK|OK!|SEM SINISTRO)/i.test(String(v))
const nItens=id=>DB.ditens.filter(x=>x.demanda_id===id).length
function drawEmiss(){
  const q=($('#fe_q').value||'').toLowerCase(), st=$('#fe_st').value
  let rows=DB.dem.filter(x=>(String(x.evento||'')+String(x.conferente||'')).toLowerCase().includes(q))
  if(st==='E') rows=rows.filter(x=>x.status!=='RETORNADA')
  if(st==='R') rows=rows.filter(x=>x.status==='RETORNADA')
  if(st==='S') rows=rows.filter(x=>!okSin(x.sinistros))
  if(st==='C') rows=rows.filter(x=>!x.cq_ok)
  $('#ct_em').textContent=rows.length+' demandas'
  $('#tb_em').innerHTML=rows.slice(0,300).map(x=>
    `<tr><td>${esc(x.evento||'—')}</td>
     <td class="r num">${nItens(x.id)}</td>
     <td class="r num">${fmt(x.total_cases)}</td><td class="r num">${fmt(x.metragem)}</td>
     <td class="mini">${esc(String(x.classificacao||'—').slice(0,26))}</td>
     <td class="mini">${esc(x.servico||'—')}</td>
     <td>${esc(x.conferente||'—')}</td><td>${dbr(x.data_saida)}</td>
     <td>${okSin(x.sinistros)?'<span class="chip ok">ok</span>':'<span class="chip no">sinistro</span>'}</td>
     <td>${x.cq_ok?'<span class="chip ok">✓</span>':'<span class="chip wa">pendente</span>'}</td>
     <td><div class="acts">
       <button class="ico pr" title="Relatório de saída (PDF)" onclick='__crud.relatorio(${JSON.stringify(x).replace(/'/g,"&#39;")})'>&#128424;</button>
       <button class="ico" title="Conferência do CQ" onclick='__crud.openForm("demandas_cq",${JSON.stringify(x).replace(/'/g,"&#39;")})'>&#9998;</button>
       <button class="ico del" title="Excluir demanda" onclick='__crud.delRow("demandas","${x.id}",${JSON.stringify(x.evento||"demanda").replace(/'/g,"&#39;")})'>&#10005;</button>
     </div></td></tr>`).join('')
    || '<tr><td colspan="11" class="mini" style="padding:18px">Nenhuma demanda.</td></tr>'
}
function drawRet(){
  const q=($('#fr_q').value||'').toLowerCase()
  const rows=DB.dem.filter(x=>x.status!=='RETORNADA'&&String(x.evento||'').toLowerCase().includes(q))
  $('#tb_ret').innerHTML=rows.slice(0,120).map(x=>{
    const r=toDate(x.data_retorno)
    let ch='<span class="chip wa">aguardando</span>'
    if(r&&r<HOJE) ch='<span class="chip no">atrasado</span>'
    else if(!x.data_retorno) ch='<span class="chip nt">sem previsão</span>'
    return `<tr><td>${esc(x.evento||'—')}</td><td class="r num">${fmt(x.total_cases)}</td>
      <td>${dbr(x.data_saida)}</td><td>${dbr(x.data_retorno)}</td><td>${ch}</td>
      ${acts('demandas',x,x.evento||'demanda')}</tr>`}).join('')
    || '<tr><td colspan="6" class="mini" style="padding:18px">Nada aguardando retorno.</td></tr>'
}
function drawInv(){
  const q=($('#fv_q').value||'').toLowerCase()
  const rows=DB.itens.filter(x=>String(x.descricao||'').toLowerCase().includes(q))
  $('#tb_inv').innerHTML=rows.slice(0,200).map(x=>{

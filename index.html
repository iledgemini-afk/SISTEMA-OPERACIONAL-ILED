<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ILED — Sistema Operacional</title>
<style>
:root{
  --bg:#08080a; --txt:#f3f4f7; --mut:#9aa0ac;
  --red:#e10600; --red2:#ff2b38; --grn:#37c98a; --amber:#f2b53c; --blue:#3d74ff;
  --line:rgba(255,255,255,.075); --glass-bd:rgba(255,255,255,.10);
  --glass-sh:0 8px 32px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.09);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  color-scheme:dark; background:var(--bg); color:var(--txt);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; min-height:100vh; overflow-x:hidden;
}
body:before{
  content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
  background:
   radial-gradient(1100px 600px at 12% -8%, rgba(225,6,0,.14), transparent 60%),
   radial-gradient(900px 620px at 108% 8%, rgba(61,116,255,.10), transparent 60%),
   radial-gradient(1200px 800px at 50% 120%, rgba(225,6,0,.06), transparent 55%),
   linear-gradient(180deg,#08080a,#0a0a0d 60%,#08080a);
}
#fx{position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.6}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:#0b0b0f}
::-webkit-scrollbar-thumb{background:linear-gradient(#e10600,#7a0400);border-radius:8px;border:2px solid #0b0b0f}
::-webkit-scrollbar-thumb:hover{background:#ff2b38}

.subpixel{height:5px;width:100%;display:flex}
.subpixel i{flex:1}
.subpixel i:nth-child(4n+1){background:var(--red)}
.subpixel i:nth-child(4n+2){background:var(--amber)}
.subpixel i:nth-child(4n+3){background:#f5f5f5}
.subpixel i:nth-child(4n){background:var(--blue)}

.glass{
  background:linear-gradient(180deg,rgba(22,22,28,.72),rgba(14,14,18,.62));
  -webkit-backdrop-filter:blur(16px) saturate(150%); backdrop-filter:blur(16px) saturate(150%);
  border:1px solid var(--glass-bd); border-radius:18px; box-shadow:var(--glass-sh);
}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mut);font-weight:700}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.02em}

/* ---------- HEADER ---------- */
header.top{position:sticky;top:0;z-index:20;backdrop-filter:blur(14px);background:rgba(8,8,10,.82);border-bottom:1px solid var(--line)}
.topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;flex-wrap:wrap}
.logowrap{position:relative;display:grid;place-items:center;flex:none}
.logowrap .glow{position:absolute;width:66px;height:20px;border-radius:12px;filter:blur(18px);z-index:0;animation:cyc 5s linear infinite}
@keyframes cyc{0%{background:#e10600}25%{background:#f2b53c}50%{background:#f5f5f5}75%{background:#3d74ff}100%{background:#e10600}}
.logowrap img{height:46px;width:auto;position:relative;z-index:1;display:block}
.htitle b{font-size:14.5px;font-weight:800;letter-spacing:.03em;display:block}
.htitle span{font-size:10px;color:var(--mut);letter-spacing:.18em;text-transform:uppercase}
.grow{flex:1}
.iconbtn{background:rgba(255,255,255,.05);border:1px solid var(--glass-bd);color:var(--txt);
  padding:8px 13px;border-radius:10px;font-size:12.5px;font-weight:700;cursor:pointer}
.iconbtn:hover{background:rgba(255,255,255,.09)}
.tstamp{font-size:11px;color:var(--mut)}
.stat{font-size:11px;font-weight:800;padding:5px 11px;border-radius:999px;background:rgba(55,201,138,.14);color:var(--grn);display:inline-flex;align-items:center;gap:6px}
.stat i{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}

nav.setores{display:flex;gap:2px;padding:0 16px;overflow-x:auto}
nav.setores button{white-space:nowrap;border:none;background:transparent;color:var(--mut);
  padding:11px 14px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent}
nav.setores button:hover:not(:disabled){color:var(--txt)}
nav.setores button.on{color:#fff;border-bottom-color:var(--red)}
nav.setores button:disabled{opacity:.32;cursor:not-allowed}
nav.setores button small{font-size:9px;opacity:.7;margin-left:5px;letter-spacing:.08em}

/* ---------- LAYOUT DE SESSOES EM COLUNAS ---------- */
main{padding:20px;max-width:1560px;margin:0 auto}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.span2{grid-column:1 / -1}
.sec{padding:18px}
.sechead{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sechead h3{margin:0;font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:800}
.sechead .cnt{font-size:11px;color:var(--mut);font-weight:700}
.sechead .sp{flex:1}
.addbtn{background:linear-gradient(180deg,var(--red2),var(--red));border:none;color:#fff;
  padding:7px 13px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(225,6,0,.3)}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{padding:17px}
.kpi .v{font-size:29px;font-weight:800;letter-spacing:-.03em;line-height:1.05}
.kpi .k{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.14em;font-weight:800;margin-top:7px}
.kpi.hero{background:linear-gradient(140deg,rgba(225,6,0,.20),rgba(20,20,26,.7))}

.tblwrap{max-height:430px;overflow:auto;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{position:sticky;top:0;background:#111116;text-align:left;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--mut);padding:9px 9px;border-bottom:1px solid var(--glass-bd);z-index:1}
td{padding:8px 9px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:nth-child(even){background:rgba(255,255,255,.016)}
tbody tr:hover{background:rgba(225,6,0,.06)}
td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
.mini{font-size:11px;color:var(--mut)}

input,select{background:rgba(0,0,0,.34);color:var(--txt);border:1px solid var(--glass-bd);
  border-radius:10px;padding:8px 11px;font-size:13px;font-weight:600;outline:none;font-family:inherit}
input:focus,select:focus{border-color:rgba(225,6,0,.55)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters input{flex:1;min-width:150px}

.chip{display:inline-block;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;white-space:nowrap}
.chip.ok{background:rgba(55,201,138,.15);color:var(--grn)}
.chip.wa{background:rgba(242,181,60,.15);color:var(--amber)}
.chip.no{background:rgba(255,43,56,.15);color:var(--red2)}
.chip.nt{background:rgba(61,116,255,.14);color:var(--blue)}
.chip.gy{background:rgba(255,255,255,.07);color:var(--mut)}

.bar{height:6px;border-radius:5px;background:rgba(255,255,255,.09);overflow:hidden;min-width:64px}
.bar i{display:block;height:100%;border-radius:5px}

.acts{display:flex;gap:5px}
.ico{background:rgba(255,255,255,.05);border:1px solid var(--glass-bd);color:var(--mut);
  width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:12px;line-height:1;display:grid;place-items:center}
.ico:hover{color:#fff;background:rgba(255,255,255,.1)}
.ico.del:hover{color:var(--red2);border-color:rgba(255,43,56,.4)}
.ico.pr{color:var(--blue);border-color:rgba(61,116,255,.28)}
.ico.pr:hover{color:#fff;background:rgba(61,116,255,.22)}

/* consulta */
.qform{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.qform .full{grid-column:1/-1}
.qform label{display:block;font-size:10.5px;color:var(--mut);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.1em}
.qform input,.qform select{width:100%}
.verdict{padding:16px;border-radius:14px;margin-top:6px;display:none}
.verdict.on{display:block}
.verdict.yes{background:rgba(55,201,138,.12);border:1px solid rgba(55,201,138,.35)}
.verdict.non{background:rgba(255,43,56,.12);border:1px solid rgba(255,43,56,.35)}
.verdict .big{font-size:21px;font-weight:800;letter-spacing:-.02em}

/* modal */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.66);backdrop-filter:blur(4px);z-index:60;
  display:none;align-items:center;justify-content:center;padding:20px}
.mask.on{display:flex}
.modal{width:100%;max-width:520px;padding:24px;max-height:88vh;overflow:auto}
.modal h4{margin:0 0 4px;font-size:16px}
.modal .sub{font-size:12px;color:var(--mut);margin-bottom:16px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fgrid .full{grid-column:1/-1}
.fgrid label{display:block;font-size:10.5px;color:var(--mut);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}
.fgrid input,.fgrid select{width:100%}
.mfoot{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
.btn{padding:10px 18px;border-radius:11px;font-weight:800;font-size:13px;cursor:pointer;border:none}
.btn.p{background:linear-gradient(180deg,var(--red2),var(--red));color:#fff;box-shadow:0 5px 16px rgba(225,6,0,.3)}
.btn.g{background:rgba(255,255,255,.06);color:var(--txt);border:1px solid var(--glass-bd)}

.toast{position:fixed;bottom:22px;right:22px;z-index:80;padding:13px 18px;border-radius:12px;
  font-weight:700;font-size:13px;display:none;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.on{display:block}
.toast.ok{background:#12492f;color:#8ff0c0;border:1px solid rgba(55,201,138,.4)}
.toast.er{background:#4d1418;color:#ffb4ba;border:1px solid rgba(255,43,56,.4)}

.loading{padding:60px;text-align:center;color:var(--mut)}
.spin{width:26px;height:26px;border:3px solid rgba(255,255,255,.12);border-top-color:var(--red);
  border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.warn{background:rgba(242,181,60,.1);border:1px solid rgba(242,181,60,.3);padding:10px 13px;
  border-radius:10px;font-size:12px;color:var(--amber);margin-bottom:12px}

@media(max-width:1120px){.cols{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.kpis{grid-template-columns:1fr}.qform,.fgrid{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){.logowrap .glow{animation:none}}
</style>
</head>

<script>

(function(){
  var cv=document.getElementById('fx'),cx=cv.getContext('2d'),W,H,ps;
  function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  function init(){ps=[];var n=Math.min(80,Math.floor(W*H/22000));
    for(var i=0;i<n;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.1+.5,
      vx:(Math.random()-.5)*.32,vy:(Math.random()-.5)*.32,a:Math.random()*.55+.2});}
  function tick(){cx.clearRect(0,0,W,H);cx.shadowColor='rgba(225,6,0,.95)';cx.shadowBlur=8;
    for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      cx.beginPath();cx.arc(p.x,p.y,p.r,0,6.283);cx.fillStyle='rgba(225,6,0,'+p.a+')';cx.fill();}
    requestAnimationFrame(tick);}
  addEventListener('resize',function(){rs();init();});rs();init();tick();
})();
</script>

  ]

  await Promise.all(FONTES.map(async ([chave,tab,ord,asc])=>{
    try{
      let q = tab==='demanda_itens'
        ? sb.from(tab).select('*, demandas(evento,base,data_saida,data_retorno,status,tipo)')
        : sb.from(tab).select('*')

      const {data,error}=await q

/* ================= MOTOR DE DISPONIBILIDADE =================
   disponivel(periodo) = estoque_fisico(base) - Σ saidas que se sobrepoem
   sobreposicao: saida <= dFim  E  (retorno vazio OU retorno >= dIni)      */
function foraNoPeriodo(equip,base,ini,fim){
  const eq=String(equip||'').toUpperCase().trim()
  let qtd=0, lista=[]
  for(const it of DB.ditens){
    if(String(it.equipamento||'').toUpperCase().trim()!==eq) continue
    const dm=it.demandas||{}
    if(base && dm.base!==base) continue
    const ds=toDate(dm.data_saida), dr=toDate(dm.data_retorno)
    const sobrepoe = (!ds || !fim || ds<=fim) && (!dr || !ini || dr>=ini)
    // quantidade NULL = Estoque ainda nao contou -> nao desconta, mas avisa
    if(sobrepoe){ qtd+=(+it.quantidade||0)
      lista.push({evento:dm.evento,quantidade:it.quantidade,
                  data_saida:dm.data_saida,data_retorno:dm.data_retorno}) }
  }
  return {qtd,lista}
}
function estoqueFisico(item,base){
  if(!item) return 0
  if(base==='BSB') return +item.est_bsb||0
  if(base==='SP')  return +item.est_sp||0
  return (+item.est_bsb||0)+(+item.est_sp||0)
}

function openForm(table,row){
  const sp=SPEC[table]; const alvo=sp.tabela||table; const ed=!!row; row=row||{}
  const dl=DB.itens.map(i=>`<option value="${esc(i.descricao)}">`).join('')
  const dlTec=[...new Set(DB.lprod.map(x=>x.tecnico).filter(Boolean))].sort().map(t=>`<option value="${esc(t)}">`).join('')
  const dlMod=DB.lmod.map(m=>`<option value="${esc(m.modelo)}">`).join('')
  const html=`<h4>${ed?'Editar':'Novo'} — ${sp.titulo}</h4>
    <div class="sub">${ed?'Alterando registro existente.':'Os dados vão direto para o banco.'}</div>
    <datalist id="dl_itens">${dl}</datalist>
    <datalist id="dl_tecnicos">${dlTec}</datalist>
    <datalist id="dl_modelos">${dlMod}</datalist>
    <div class="fgrid">${sp.campos.map(c=>{
      const v=row[c.k]==null?'':row[c.k]
      let f
      if(c.t==='demanda') f=`<select id="f_${c.k}">${DB.dem.map(dm=>`<option value="${dm.id}" ${v===dm.id?'selected':''}>${esc(dm.evento)} — ${dbr(dm.data_saida)}</option>`).join('')}</select>`
      else if(c.t==='select') f=`<select id="f_${c.k}">${c.opts.map(o=>`<option ${String(v)===o?'selected':''}>${o}</option>`).join('')}</select>`
      else if(c.t==='datalist') f=`<input id="f_${c.k}" list="dl_${c.src||'itens'}" value="${esc(v)}">`
      else f=`<input id="f_${c.k}" type="${c.t}" value="${esc(v)}" ${c.t==='number'?'step="any"':''}>`
      return `<div class="${c.full?'full':''}"><label>${c.l}${c.req?' *':''}</label>${f}</div>`
    }).join('')}</div>
    <div class="mfoot">
      <button class="btn g" id="mcancel">Cancelar</button>
      <button class="btn p" id="msave">${ed?'Salvar':'Adicionar'}</button>
    </div>`
  $('#modal').innerHTML=html; $('#mask').classList.add('on')
  $('#mcancel').onclick=closeForm
  $('#msave').onclick=async()=>{
    const obj={}
    for(const c of sp.campos){
      let v=document.getElementById('f_'+c.k).value
      if(c.req && !String(v).trim()){ toast('Preencha: '+c.l,false); return }
      if(c.t==='number') v=v===''?0:Number(v)
      if(c.t==='date' && v==='') v=null
      obj[c.k]=v===''?null:v
    }
    $('#msave').disabled=true
    try{
      if(alvo==='demandas' && sp.tabela) obj.cq_ok=true
      const q = ed ? sb.from(alvo).update(obj).eq('id',row.id) : sb.from(alvo).insert(obj)
      const {error}=await q
      if(error) throw new Error(error.message)
      closeForm(); toast(ed?'Registro atualizado':'Registro adicionado'); await loadAll()
    }catch(ex){ $('#msave').disabled=false; toast('Erro: '+ex.message,false) }
  }
}
function closeForm(){ $('#mask').classList.remove('on'); $('#modal').innerHTML='' }
$('#mask').addEventListener('click',e=>{ if(e.target.id==='mask') closeForm() })

async function delRow(table,id,label){
  if(!confirm('Excluir "'+label+'"?\n\nEssa ação não pode ser desfeita.')) return
  const {error}=await sb.from(table).delete().eq('id',id)
  if(error) return toast('Erro: '+error.message,false)
  toast('Registro excluído'); loadAll()
}
window.__crud={openForm,delRow,loadAll}

const mesAtual=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function diasUteis(ini,fim){let n=0;const d=new Date(ini)
  while(d<=fim){const w=d.getDay();if(w!==0&&w!==6)n++;d.setDate(d.getDate()+1)}return n}
function viewLab(){
  const M=mesAtual()
  const doMes=DB.lprod.filter(x=>String(x.data||'').slice(0,7)===M)
  const som=(arr,k)=>arr.reduce((a,x)=>a+(+x[k]||0),0)
  const modMes=som(doMes,'q_modulos'), pxMes=som(doMes,'q_pixels')
  const metaObj=DB.lmeta.find(x=>x.mes_ano===M)||DB.lmeta[0]
  const meta=+(metaObj&&metaObj.meta_modulos)||0
  const pct=meta?Math.round(modMes/meta*100):0
  // ritmo x necessario
  const hoje=new Date(), ano=hoje.getFullYear(), mes=hoje.getMonth()
  const ini=new Date(ano,mes,1), fim=new Date(ano,mes+1,0)
  const uteisTotal=diasUteis(ini,fim), uteisPass=diasUteis(ini,hoje)
  const uteisFalta=Math.max(uteisTotal-uteisPass,0)
  const ritmo=uteisPass?modMes/uteisPass:0
  const falta=Math.max(meta-modMes,0)
  const necessario=uteisFalta?falta/uteisFalta:0
  const projecao=Math.round(modMes+ritmo*uteisFalta)
  // metragem recuperada: modulos / divisor(modelo)
  const divisor={}; DB.lmod.forEach(m=>{if(m.divisor_metragem)divisor[String(m.modelo).toUpperCase().trim()]=+m.divisor_metragem})
  const m2=(arr)=>arr.reduce((a,x)=>{const dv=divisor[String(x.modelo||'').toUpperCase().trim()]
    return a+(dv?(+x.q_modulos||0)/dv:0)},0)

        <tr><td>Necessário p/ bater</td><td class="r num" style="color:${necessario>ritmo?'var(--red2)':'var(--grn)'}">${fmt(necessario)} /dia</td></tr>
        <tr><td><b>Projeção de fechamento</b></td><td class="r num"><b style="color:${projecao>=meta?'var(--grn)':'var(--amber)'}">${fmt(projecao)}</b></td></tr>

function ababrev(v){return v}
function drawLProd(){

  let rows=DB.lprod.filter(x=>(String(x.tecnico||'')+String(x.modelo||'')+String(x.observacao||'')).toLowerCase().includes(q))

  $('#ct_lp').textContent=rows.length+' lançamentos'
  $('#tb_lp').innerHTML=rows.slice(0,250).map(x=>
    `<tr><td>${dbr(x.data)}</td><td>${esc(x.tecnico||'—')}</td>
     <td class="mini">${esc(String(x.modelo||'—').slice(0,34))}</td>
     <td><span class="chip gy">${esc(x.tipo||'—')}</span></td>
     <td class="r num">${fmt(x.q_modulos)}</td><td class="r num">${fmt(x.q_pixels)}</td>
     <td class="r num">${fmt(x.q_trilhas)}</td><td class="r num">${fmt(x.q_ci)}</td><td class="r num">${fmt(x.q_mascaras)}</td>
     <td class="mini">${esc(x.situacao||'—')}</td>
     ${acts('lab_producao',x,x.tecnico+' '+dbr(x.data))}</tr>`).join('')
    || '<tr><td colspan="11" class="mini" style="padding:18px">Nenhum lançamento.</td></tr>'
}
function drawPix(){
  // consumo medio/dia nos ultimos 30 dias -> projecao de esgotamento
  const lim=new Date(Date.now()-30*864e5).toISOString().slice(0,10)
  const cons={}
  DB.lprod.filter(x=>String(x.data||'')>=lim).forEach(x=>{
    const md=DB.lmod.find(m=>String(m.modelo).toUpperCase().trim()===String(x.modelo||'').toUpperCase().trim())
    const sku=md&&md.sku_pixel; if(!sku) return
    cons[sku]=(cons[sku]||0)+(+x.q_pixels||0)})
  $('#tb_px').innerHTML=DB.lpix.map(x=>{
    const sl=+x.saldo||0, mi=+x.minimo||0
    const dia=(cons[x.sku]||0)/30
    const ate=dia>0?Math.floor(Math.max(sl-mi,0)/dia):null
    let ch='<span class="chip ok">ok</span>'
    if(sl<=0) ch='<span class="chip no">zerado</span>'
    else if(sl<mi) ch='<span class="chip no">abaixo do mínimo</span>'
    else if(ate!==null&&ate<15) ch='<span class="chip wa">atenção</span>'
    return `<tr><td>${esc(x.sku)}</td><td class="r num" style="color:${sl<mi?'var(--red2)':'inherit'}">${fmt(sl)}</td>
      <td class="r num">${fmt(mi)}</td><td>${ch}</td>
      <td class="mini">${dia>0?(ate!==null?ate+' dias':'—'):'sem consumo'}</td>
      ${acts('lab_pixels',x,x.sku)}</tr>`}).join('')
    || '<tr><td colspan="6" class="mini" style="padding:18px">Nenhum SKU.</td></tr>'
}
function drawFisc(){
  const M=mesAtual()
  const g={}
  DB.lfisc.forEach(f=>{const t=f.tecnico||'—';g[t]=g[t]||{p:0,f:0,dias:[]}
    if(f.presente)g[t].p++;else g[t].f++
    g[t].dias.push({d:f.data,p:f.presente})})
  const prodT={}
  DB.lprod.filter(x=>String(x.data||'').slice(0,7)===M)
    .forEach(x=>{const t=x.tecnico||'—';prodT[t]=(prodT[t]||0)+(+x.q_modulos||0)})
  $('#tb_fs').innerHTML=Object.entries(g).sort((a,b)=>b[1].p-a[1].p).map(([t,v])=>{
    const tot=v.p+v.f, pc=tot?Math.round(v.p/tot*100):0
    const ult=v.dias.sort((a,b)=>String(b.d).localeCompare(String(a.d))).slice(0,12).reverse()
    return `<tr><td>${esc(t)}</td><td class="r num">${v.p}</td><td class="r num">${v.f}</td>
      <td class="r num" style="color:${pc>=90?'var(--grn)':pc>=70?'var(--amber)':'var(--red2)'}">${pc}%</td>
      <td class="r num">${fmt(prodT[t]||0)}</td>
      <td>${ult.map(d=>`<span title="${dbr(d.d)}" style="display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:2px;background:${d.p?'#37c98a':'#ff2b38'}"></span>`).join('')}</td></tr>`}).join('')
    || '<tr><td colspan="6" class="mini" style="padding:18px">Sem registro de fiscalização.</td></tr>'
}

const okSin=v=>!v||/^\s*(OK|OK!|SEM SINISTRO)/i.test(String(v))
const nItens=id=>DB.ditens.filter(x=>x.demanda_id===id).length
function drawEmiss(){
  const q=($('#fe_q').value||'').toLowerCase(), st=$('#fe_st').value
  let rows=DB.dem.filter(x=>(String(x.evento||'')+String(x.conferente||'')).toLowerCase().includes(q))
  if(st==='E') rows=rows.filter(x=>x.status!=='RETORNADA')
  if(st==='R') rows=rows.filter(x=>x.status==='RETORNADA')
  if(st==='S') rows=rows.filter(x=>!okSin(x.sinistros))
  if(st==='C') rows=rows.filter(x=>!x.cq_ok)
  $('#ct_em').textContent=rows.length+' demandas'
  $('#tb_em').innerHTML=rows.slice(0,300).map(x=>
    `<tr><td>${esc(x.evento||'—')}</td>
     <td class="r num">${nItens(x.id)}</td>
     <td class="r num">${fmt(x.total_cases)}</td><td class="r num">${fmt(x.metragem)}</td>
     <td class="mini">${esc(String(x.classificacao||'—').slice(0,26))}</td>
     <td class="mini">${esc(x.servico||'—')}</td>
     <td>${esc(x.conferente||'—')}</td><td>${dbr(x.data_saida)}</td>
     <td>${okSin(x.sinistros)?'<span class="chip ok">ok</span>':'<span class="chip no">sinistro</span>'}</td>
     <td>${x.cq_ok?'<span class="chip ok">✓</span>':'<span class="chip wa">pendente</span>'}</td>
     <td><div class="acts">
       <button class="ico pr" title="Relatório de saída (PDF)" onclick='__crud.relatorio(${JSON.stringify(x).replace(/'/g,"&#39;")})'>&#128424;</button>
       <button class="ico" title="Conferência do CQ" onclick='__crud.openForm("demandas_cq",${JSON.stringify(x).replace(/'/g,"&#39;")})'>&#9998;</button>

     </div></td></tr>`).join('')
    || '<tr><td colspan="11" class="mini" style="padding:18px">Nenhuma demanda.</td></tr>'

function drawRet(){
  const q=($('#fr_q').value||'').toLowerCase()
  const rows=DB.dem.filter(x=>x.status!=='RETORNADA'&&String(x.evento||'').toLowerCase().includes(q))

function drawItens(){

  let rows=DB.itens.filter(x=>String(x.descricao||'').toLowerCase().includes(q))

  if(st==='z') rows=rows.filter(x=>((+x.disp_bsb||0)+(+x.disp_sp||0))===0)

  $('#ct_itens').textContent=rows.length+' itens'

    const t=(+x.est_bsb||0)+(+x.est_sp||0), d=(+x.disp_bsb||0)+(+x.disp_sp||0)

    return `<tr><td>${esc(x.descricao)}</td>

    let ch='<span class="chip wa">fora</span>'
    if(dm.status==='RETORNADA') ch='<span class="chip ok">retornada</span>'
    else if(!dm.data_retorno) ch='<span class="chip nt">sem previsão</span>'
    else if(r&&r<HOJE) ch='<span class="chip no">atrasado</span>'
    const qt = x.quantidade==null ? '<span class="chip wa">contar</span>' : fmt(x.quantidade)
    return `<tr><td>${esc(dm.evento||'—')}</td>
      <td class="mini">${esc(String(x.equipamento).slice(0,44))}</td>
      <td class="r num">${qt}</td>
      <td><span class="chip gy">${esc(x.tipo_item||'—')}</span></td>
      <td>${dbr(dm.data_saida)}</td><td>${dbr(dm.data_retorno)}</td><td>${ch}</td>
      ${acts('demanda_itens',x,x.equipamento)}</tr>`}).join('')
    || '<tr><td colspan="8" class="mini" style="padding:18px">Nada fora no momento.</td></tr>'
}
function drawPain(){
  const q=($('#fp_q').value||'').toLowerCase(), b=$('#fp_b').value
  let rows=DB.paineis.filter(x=>String(x.equipamento||'').toLowerCase().includes(q))
  if(b) rows=rows.filter(x=>x.base===b)
  $('#tb_pain').innerHTML=rows.map(x=>`<tr><td>${esc(x.equipamento)}</td>
    <td><span class="chip gy">${esc(x.base||'—')}</span></td>
    <td><span class="chip ${x.ambiente==='OUTDOOR'?'nt':'gy'}">${esc(x.ambiente||'—')}</span></td>
    <td class="r num">${fmt(x.quantidade)}</td><td class="r num">${fmt(x.metragem)}</td>
    ${acts('paineis_metragem',x,x.equipamento)}</tr>`).join('')
    || '<tr><td colspan="6" class="mini" style="padding:18px">Nenhum painel.</td></tr>'
}
function drawSist(){
  const q=($('#fs_q').value||'').toLowerCase()
  const rows=DB.sistema.filter(x=>String(x.equipamento||'').toLowerCase().includes(q))
  $('#tb_sist').innerHTML=rows.map(x=>`<tr><td>${esc(x.equipamento)}</td>
    <td class="r num">${fmt(x.quantidade)}</td><td><span class="chip gy">${esc(x.base||'BSB')}</span></td>
    ${acts('sistema_mainpower',x,x.equipamento)}</tr>`).join('')
    || '<tr><td colspan="4" class="mini" style="padding:18px">Nenhum equipamento.</td></tr>'
}
function drawPar(){
  const q=($('#fz_q').value||'').toLowerCase()
  const rows=DB.parado.filter(x=>String(x.equipamento||'').toLowerCase().includes(q))
  $('#tb_par').innerHTML=rows.map(x=>`<tr><td>${esc(x.equipamento)}</td>
    <td class="r num">${fmt(x.quantidade)}</td><td>${dbr(x.data)}</td><td class="mini">${esc(x.motivo||'—')}</td>
    ${acts('estoque_parado',x,x.equipamento)}</tr>`).join('')
    || '<tr><td colspan="5" class="mini" style="padding:18px">Nada parado.</td></tr>'
}

function wireConsulta(){
  const hoje=new Date().toISOString().slice(0,10)
  $('#q_di').value=hoje
  const d7=new Date(Date.now()+7*864e5).toISOString().slice(0,10); $('#q_df').value=d7
  $('#q_go').onclick=()=>{
    const eq=$('#q_eq').value, qt=+$('#q_qt').value||0, bs=$('#q_bs').value
    const ini=toDate($('#q_di').value), fim=toDate($('#q_df').value)
    const item=DB.itens.find(i=>i.descricao===eq)
    const fisico=estoqueFisico(item,bs)
    const {qtd:fora,lista}=foraNoPeriodo(eq,bs,ini,fim)
    const parado=DB.parado.filter(p=>String(p.equipamento||'').toUpperCase().trim()===eq.toUpperCase().trim())
                          .reduce((a,p)=>a+(+p.quantidade||0),0)
    const disp=fisico-fora-parado
    const ok=disp>=qt
    const out=$('#q_out')
    out.className='verdict on '+(ok?'yes':'non')
    out.innerHTML=`<div class="big" style="color:${ok?'var(--grn)':'var(--red2)'}">
        ${ok?'✓ Disponível':'✕ Indisponível'}</div>
      <div class="mini" style="margin-top:7px;line-height:1.7">
        Pedido: <b>${fmt(qt)}</b> · ${esc(eq)}<br>
        Estoque físico ${bs||'(ambas)'}: <b>${fmt(fisico)}</b><br>
        Fora em evento no período: <b>−${fmt(fora)}</b>${lista.length?` (${lista.length} saída${lista.length>1?'s':''})`:''}<br>
        ${parado?`Estoque parado: <b>−${fmt(parado)}</b><br>`:''}
        <span style="color:${ok?'var(--grn)':'var(--red2)'}">Disponível no período: <b>${fmt(disp)}</b></span>
      </div>
      ${lista.length?`<div style="margin-top:11px"><div class="eyebrow" style="margin-bottom:6px">Conflitos</div>
        ${lista.slice(0,6).map(s=>`<div class="mini">• ${esc(s.evento||'—')} — ${fmt(s.quantidade)} un · ${dbr(s.data_saida)} → ${dbr(s.data_retorno)}</div>`).join('')}
        ${lista.length>6?`<div class="mini">+ ${lista.length-6} outros…</div>`:''}</div>`:''}`
  }
}

window.loadAll=loadAll
loadAll()
</script>

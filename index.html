<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ILED · Sistema Operacional</title>
<style>
:root{--bg:#08080a;--txt:#f3f4f7;--mut:#9aa0ac;--red:#e10600;--red2:#ff2b38;--grn:#37c98a;
--amber:#f2b53c;--blue:#3d74ff;--line:rgba(255,255,255,.075);--glass-bd:rgba(255,255,255,.10);
--glass-sh:0 8px 32px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.09);--r:16px}
*{box-sizing:border-box}html,body{margin:0;min-height:100%}
body{font-family:system-ui,Segoe UI,Roboto,sans-serif;color:var(--txt);color-scheme:dark;
background:radial-gradient(1100px 560px at 82% -12%,rgba(225,6,0,.16),transparent 60%),
radial-gradient(900px 500px at 10% 110%,rgba(61,116,255,.07),transparent 60%),
linear-gradient(180deg,#08080a,#0d0d11 50%,#08080a);min-height:100vh;overflow-x:hidden}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.subbar{position:fixed;top:0;left:0;right:0;height:3px;z-index:5;
background:repeating-linear-gradient(90deg,#e10600 0 9px,#f2b53c 9px 18px,#f5f5f5 18px 27px,#3d74ff 27px 36px);opacity:.9}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--red),#7a0400);border-radius:20px;border:2px solid transparent;background-clip:padding-box}
.glass{background:rgba(255,255,255,.045);border:1px solid var(--glass-bd);border-radius:var(--r);
backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);box-shadow:var(--glass-sh)}
.wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:26px 20px 60px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:14px}
.brand{display:flex;align-items:center;gap:16px}
.logowrap{position:relative;display:grid;place-items:center}
.glow{position:absolute;width:70px;height:22px;border-radius:12px;filter:blur(16px);z-index:0;
animation:cyc 5s linear infinite}
@keyframes cyc{0%{background:#e10600}25%{background:#f2b53c}50%{background:#f5f5f5}75%{background:#3d74ff}100%{background:#e10600}}
.logo{height:58px;width:auto;position:relative;z-index:1;filter:drop-shadow(0 4px 14px rgba(0,0,0,.5))}
.bt b{font-size:15px;letter-spacing:.04em;font-weight:800}
.bt span{display:block;font-size:10px;color:var(--mut);letter-spacing:.16em;text-transform:uppercase;margin-top:2px}
.pill{font-size:11px;font-weight:800;padding:6px 12px;border-radius:999px;background:rgba(55,201,138,.14);color:var(--grn);
display:flex;align-items:center;gap:7px}.pill .d{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 17px;border-radius:12px;border:1px solid transparent;background:rgba(255,255,255,.03);color:var(--mut);font-weight:700;font-size:13.5px;cursor:pointer;transition:.15s}
.tab:hover{color:var(--txt);background:rgba(255,255,255,.06)}
.tab.on{background:rgba(225,6,0,.16);color:#fff;border-color:rgba(225,6,0,.32);box-shadow:0 4px 16px rgba(225,6,0,.2)}
.grid{display:grid;gap:15px;grid-template-columns:repeat(4,1fr);margin-bottom:18px}
.kpi{padding:20px}.kpi .n{font-size:32px;font-weight:800;letter-spacing:-.03em;line-height:1}
.kpi .l{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.13em;font-weight:800;margin-top:8px}
.kpi.hero{background:linear-gradient(135deg,rgba(225,6,0,.16),rgba(255,255,255,.04))}.kpi.hero .n{color:#fff}
.card{padding:20px;margin-bottom:16px}
.card h2{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin:0 0 14px;font-weight:800}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);padding:9px 10px;border-bottom:1px solid var(--glass-bd)}
td{padding:10px;border-bottom:1px solid var(--line)}tr:nth-child(even) td{background:rgba(255,255,255,.015)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
input{background:rgba(0,0,0,.32);color:var(--txt);border:1px solid var(--glass-bd);border-radius:11px;padding:10px 12px;font-size:13.5px;font-weight:600;outline:none;min-width:240px}
input:focus{border-color:rgba(225,6,0,.5)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:14px}
.f label{display:block;font-size:11px;color:var(--mut);font-weight:700;margin-bottom:6px}
.chip{display:inline-block;font-size:10px;font-weight:800;padding:3px 9px;border-radius:6px}
.chip.f{background:rgba(225,6,0,.16);color:var(--red2)}
.bar{height:6px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;min-width:80px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--grn),#2aa876)}
@media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}input{min-width:100%}}
@media(prefers-reduced-motion:reduce){.glow{animation:none}}
</style></head>

<script>
(function(){var cv=document.getElementById('bg'),cx=cv.getContext('2d'),W,H,ps;
function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
function init(){ps=[];var n=Math.min(70,Math.floor(W*H/26000));for(var i=0;i<n;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.2+.6,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,a:Math.random()*.5+.25});}
function tick(){cx.clearRect(0,0,W,H);cx.shadowColor='rgba(225,6,0,.9)';cx.shadowBlur=9;
for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
cx.beginPath();cx.arc(p.x,p.y,p.r,0,6.283);cx.fillStyle='rgba(225,6,0,'+p.a+')';cx.fill();}requestAnimationFrame(tick);}
addEventListener('resize',function(){rs();init();});rs();init();tick();})();
</script>

  <div class="tabs"><button class="tab on" data-t="geral">Visão Geral</button>

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');render(b.dataset.t)})
function kpi(n,l,h){return `<div class="glass kpi ${h?'hero':''}"><div class="n">${n??'—'}</div><div class="l">${l}</div></div>`}
async function render(t){const v=document.getElementById('view');v.innerHTML='Carregando...'
  try{if(t==='geral')return await geral(v);if(t==='estoque')return await estoque(v);if(t==='eventos')return await eventos(v)}
  catch(e){v.innerHTML=`<div class="card glass" style="color:var(--red2)">Erro: ${e.message}</div>`}}
async function geral(v){
  const [ev,md,sa,est]=await Promise.all([
    sb.from('eventos').select('*',{count:'exact',head:true}),
    sb.from('modelos_painel').select('*',{count:'exact',head:true}),
    sb.from('evento_saidas').select('*',{count:'exact',head:true}),
    sb.from('estoque').select('estoque_total,disponivel,bases(sigla)')])
  const rows=est.data||[];let tb=0,ts=0,db=0,ds=0
  rows.forEach(r=>{const s=r.bases?.sigla;if(s==='BSB'){tb+=+r.estoque_total||0;db+=+r.disponivel||0}else{ts+=+r.estoque_total||0;ds+=+r.disponivel||0}})
  v.innerHTML=`<div class="grid">${kpi((tb+ts).toLocaleString('pt-BR'),'Cabinets em estoque',1)}${kpi(md.count,'Modelos de painel')}${kpi(ev.count,'Eventos')}${kpi(sa.count,'Saídas registradas')}</div>
  <div class="card glass"><h2>Estoque por base</h2>
  <table><thead><tr><th>Base</th><th class="num">Total</th><th class="num">Disponível</th><th class="num">Em uso</th></tr></thead><tbody>
  <tr><td>Brasília (BSB)</td><td class="num">${tb}</td><td class="num">${db}</td><td class="num">${tb-db}</td></tr>
  <tr><td>São Paulo (SP)</td><td class="num">${ts}</td><td class="num">${ds}</td><td class="num">${ts-ds}</td></tr></tbody></table></div>`}
async function estoque(v){
  const {data}=await sb.from('estoque').select('estoque_total,disponivel,modelos_painel(nome_canonico,familia_eng),bases(sigla)')
  const rows=(data||[]).map(r=>({m:r.modelos_painel?.nome_canonico||'—',f:r.modelos_painel?.familia_eng||'',b:r.bases?.sigla||'',t:+r.estoque_total||0,d:+r.disponivel||0}))
  v.innerHTML=`<div class="card glass"><h2>Estoque · disponibilidade por base</h2>
  <div class="row"><div class="f"><label>Buscar modelo</label><input id="q" placeholder="ex.: NT 2.9, DP 3.9..."></div></div>
  <table><thead><tr><th>Modelo</th><th>Família</th><th>Base</th><th class="num">Total</th><th class="num">Disp.</th><th>Ocupação</th></tr></thead><tbody id="tb"></tbody></table></div>`
  const draw=(f='')=>{document.getElementById('tb').innerHTML=rows.filter(r=>r.m.toLowerCase().includes(f.toLowerCase()))
    .map(r=>{const p=r.t?Math.round(r.d/r.t*100):0;return `<tr><td>${r.m}</td><td>${r.f?`<span class="chip f">${r.f}</span>`:''}</td><td>${r.b}</td><td class="num">${r.t}</td><td class="num">${r.d}</td><td><div class="bar"><i style="width:${p}%"></i></div></td></tr>`}).join('')}
  draw();document.getElementById('q').oninput=e=>draw(e.target.value)}
async function eventos(v){
  const {data}=await sb.from('eventos').select('nome').order('nome');const rows=data||[]
  v.innerHTML=`<div class="card glass"><h2>Eventos (${rows.length})</h2>
  <div class="row"><div class="f"><label>Buscar evento</label><input id="q" placeholder="nome do evento..."></div></div>
  <table><thead><tr><th>Evento</th></tr></thead><tbody id="tb"></tbody></table></div>`
  const draw=(f='')=>{document.getElementById('tb').innerHTML=rows.filter(r=>(r.nome||'').toLowerCase().includes(f.toLowerCase()))
    .map(r=>`<tr><td>${r.nome}</td></tr>`).join('')}
  draw();document.getElementById('q').oninput=e=>draw(e.target.value)}
render('geral')
</script></body></html>

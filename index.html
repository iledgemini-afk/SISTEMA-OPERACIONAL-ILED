    `<tr><td>${dbr(x.data)}</td><td>${esc(x.responsavel||'—')}</td>
     <td><span class="chip gy">${esc(x.atividade||'—')}</span></td>
     <td class="mini">${esc(String(x.equipamento||'—').slice(0,40))}</td>
     <td class="r num">${fmt(x.quantidade)}</td>
     <td><span class="chip ${x.situacao==='CONCLUIDO'?'ok':x.situacao==='EM ANDAMENTO'?'wa':'gy'}">${esc(x.situacao||'—')}</span></td>
     ${acts('cq_producao',x,x.atividade||'produção')}</tr>`).join('')
    || '<tr><td colspan="7" class="mini" style="padding:18px">Nenhum lançamento ainda. Use “+ Lançar”.</td></tr>'
}
function drawPlan(){
  $('#tb_plan').innerHTML=DB.plan.slice(0,100).map(x=>{
    const at=toDate(x.data_prevista)&&toDate(x.data_prevista)<HOJE&&x.status!=='CONCLUIDO'
    return `<tr><td>${esc(x.tarefa||'—')}</td><td class="mini">${esc(x.evento||'—')}</td>
      <td>${esc(x.responsavel||'—')}</td>
      <td>${dbr(x.data_prevista)}${at?' <span class="chip no">venceu</span>':''}</td>
      <td><span class="chip ${x.prioridade==='ALTA'?'no':x.prioridade==='BAIXA'?'gy':'wa'}">${esc(x.prioridade||'—')}</span></td>
      <td><span class="chip ${x.status==='CONCLUIDO'?'ok':x.status==='EM ANDAMENTO'?'wa':'gy'}">${esc(x.status||'—')}</span></td>
      ${acts('cq_planejamento',x,x.tarefa||'tarefa')}</tr>`}).join('')
    || '<tr><td colspan="7" class="mini" style="padding:18px">Nenhuma tarefa. Use “+ Nova tarefa”.</td></tr>'
}

/* ---------- SETOR ESTOQUE (7 sessões em colunas) ---------- */
function viewEstoque(){
  const I=DB.itens
  const totB=I.reduce((a,x)=>a+(+x.est_bsb||0),0), totS=I.reduce((a,x)=>a+(+x.est_sp||0),0)
  const dspB=I.reduce((a,x)=>a+(+x.disp_bsb||0),0), dspS=I.reduce((a,x)=>a+(+x.disp_sp||0),0)
  const zerados=I.filter(x=>((+x.disp_bsb||0)+(+x.disp_sp||0))===0).length
  const foraAtiv=DB.dem.filter(x=>{const r=toDate(x.data_retorno);return x.status!=='RETORNADA'&&(!r||r>=HOJE)}).length
  const atras=DB.dem.filter(x=>{const r=toDate(x.data_retorno);return x.status!=='RETORNADA'&&r&&r<HOJE}).length
  const semQtd=DB.ditens.filter(x=>x.quantidade==null).length
  const m2=DB.paineis.reduce((a,x)=>a+(+x.metragem||0),0)

  $('#view').innerHTML=`
  <div class="kpis">
    <div class="glass kpi hero"><div class="v num">${fmt(totB+totS)}</div><div class="k">Estoque total</div></div>
    <div class="glass kpi"><div class="v num">${fmt(dspB+dspS)}</div><div class="k">Disponível agora</div></div>
    <div class="glass kpi"><div class="v num">${fmt(m2)} m²</div><div class="k">Metragem de painel</div></div>
    <div class="glass kpi"><div class="v num">${foraAtiv}</div><div class="k">Demandas abertas ${atras?'· '+atras+' atrasada(s)':''}</div></div>
  </div>

  <div class="cols">
    <!-- 1. VISÃO GERAL -->
    <section class="glass sec">
      <div class="sechead"><h3>Visão geral</h3><div class="sp"></div>
        <span class="cnt">${I.length} itens · ${zerados} zerado(s)</span></div>
      <div class="tblwrap"><table>
        <thead><tr><th>Base</th><th class="r">Estoque</th><th class="r">Disponível</th><th class="r">Em uso</th><th>Ocupação</th></tr></thead>
        <tbody>
          ${[['Brasília (BSB)',totB,dspB],['São Paulo (SP)',totS,dspS]].map(([n,t,d])=>{
            const uso=t-d, pct=t?Math.round(d/t*100):0
            return `<tr><td>${n}</td><td class="r num">${fmt(t)}</td><td class="r num">${fmt(d)}</td>
              <td class="r num">${fmt(uso)}</td>
              <td><div class="bar"><i style="width:${pct}%;background:${pct>50?'linear-gradient(90deg,#37c98a,#2aa876)':pct>20?'linear-gradient(90deg,#f2b53c,#c9902a)':'linear-gradient(90deg,#ff2b38,#b21620)'}"></i></div>
              <span class="mini">${pct}% livre</span></td></tr>`}).join('')}
        </tbody></table></div>
      <div style="margin-top:14px">
        <div class="eyebrow" style="margin-bottom:9px">Por categoria</div>
        <div class="tblwrap" style="max-height:190px"><table>
          <thead><tr><th>Categoria</th><th class="r">Itens</th><th class="r">Estoque</th><th class="r">Disp.</th></tr></thead>
          <tbody>${(()=>{const g={}
            I.forEach(x=>{const c=(x.categoria||'—').trim();g[c]=g[c]||{n:0,t:0,d:0}
              g[c].n++;g[c].t+=(+x.est_bsb||0)+(+x.est_sp||0);g[c].d+=(+x.disp_bsb||0)+(+x.disp_sp||0)})
            return Object.entries(g).sort((a,b)=>b[1].t-a[1].t).map(([c,v])=>
              `<tr><td>${esc(c)}</td><td class="r num">${v.n}</td><td class="r num">${fmt(v.t)}</td><td class="r num">${fmt(v.d)}</td></tr>`).join('')})()}
          </tbody></table></div>
      </div>
    </section>

    <!-- 2. CONSULTA DE DISPONIBILIDADE -->
    <section class="glass sec">
      <div class="sechead"><h3>Consulta de disponibilidade</h3><div class="sp"></div>
        <span class="cnt">o comercial pergunta aqui</span></div>
      <div class="qform">
        <div class="full"><label>Equipamento</label>
          <select id="q_eq">${I.map(i=>`<option>${esc(i.descricao)}</option>`).join('')}</select></div>
        <div><label>Quantidade</label><input id="q_qt" type="number" value="1" min="1"></div>
        <div><label>Base</label><select id="q_bs"><option value="BSB">Brasília</option><option value="SP">São Paulo</option><option value="">Ambas</option></select></div>
        <div><label>Data início</label><input id="q_di" type="date"></div>
        <div><label>Data fim</label><input id="q_df" type="date"></div>
        <div class="full"><button class="btn p" style="width:100%" id="q_go">Consultar</button></div>
      </div>
      <div class="verdict" id="q_out"></div>
    </section>

    <!-- 3. ESTOQUE POR ITEM (largo) -->
    <section class="glass sec span2">
      <div class="sechead"><h3>Estoque por item</h3>
        <span class="cnt" id="ct_itens">${I.length} itens</span><div class="sp"></div>
        <button class="addbtn" onclick="__crud.openForm('estoque_itens')">+ Novo item</button></div>
      <div class="filters">
        <input id="fi_q" placeholder="Buscar item…">
        <select id="fi_cat"><option value="">Todas as categorias</option>
          ${[...new Set(I.map(x=>(x.categoria||'').trim()).filter(Boolean))].sort().map(c=>`<option>${esc(c)}</option>`).join('')}</select>
        <select id="fi_st"><option value="">Todos</option><option value="z">Só zerados</option><option value="b">Disponível baixo (&lt;20%)</option></select>
      </div>
      <div class="tblwrap"><table>
        <thead><tr><th>Item</th><th>Categoria</th><th class="r">Est. BSB</th><th class="r">Disp. BSB</th>
          <th class="r">Est. SP</th><th class="r">Disp. SP</th><th>Ocupação</th><th></th></tr></thead>
        <tbody id="tb_itens"></tbody></table></div>
    </section>

    <!-- 4. EQUIPAMENTOS FORA (itens das demandas) -->
    <section class="glass sec">
      <div class="sechead"><h3>Equipamentos fora</h3>
        <span class="cnt">${DB.ditens.length} itens em ${DB.dem.length} demandas</span><div class="sp"></div>
        <button class="addbtn" onclick="__crud.openForm('demanda_itens')">+ Item na demanda</button>
        <button class="addbtn" style="background:rgba(255,255,255,.08);box-shadow:none" onclick="__crud.openForm('demandas')">+ Demanda</button></div>
      <div class="warn" style="background:rgba(61,116,255,.09);border-color:rgba(61,116,255,.3);color:#9dbaff">
        Aqui o <b>Estoque</b> informa a quantidade. A condição do painel é do Controle de Qualidade — mesma demanda.</div>
      ${semQtd?`<div class="warn">${semQtd} item(ns) sem quantidade informada — não descontam do disponível até o Estoque contar.</div>`:''}
      <div class="filters"><input id="fo_q" placeholder="Buscar demanda ou equipamento…"></div>
      <div class="tblwrap"><table>
        <thead><tr><th>Demanda</th><th>Equipamento</th><th class="r">Qtd</th><th>Tipo</th><th>Saída</th><th>Retorno</th><th>Status</th><th></th></tr></thead>
        <tbody id="tb_fora"></tbody></table></div>
    </section>

    <!-- 5. PAINÉIS (m²) -->
    <section class="glass sec">
      <div class="sechead"><h3>Painéis (m²)</h3>
        <span class="cnt">${fmt(m2)} m² no total</span><div class="sp"></div>
        <button class="addbtn" onclick="__crud.openForm('paineis_metragem')">+ Novo painel</button></div>
      <div class="filters"><input id="fp_q" placeholder="Buscar painel…">
        <select id="fp_b"><option value="">Todas as bases</option><option value="BSB">Brasília</option><option value="SP">São Paulo</option></select></div>
      <div class="tblwrap"><table>
        <thead><tr><th>Equipamento</th><th>Base</th><th>Ambiente</th><th class="r">Módulos</th><th class="r">m²</th><th></th></tr></thead>
        <tbody id="tb_pain"></tbody></table></div>
    </section>

    <!-- 6. SISTEMA / MAINPOWER -->
    <section class="glass sec">
      <div class="sechead"><h3>Sistema / Mainpower</h3>
        <span class="cnt">${DB.sistema.length} itens</span><div class="sp"></div>
        <button class="addbtn" onclick="__crud.openForm('sistema_mainpower')">+ Novo</button></div>
      <div class="filters"><input id="fs_q" placeholder="Buscar equipamento…"></div>
      <div class="tblwrap"><table>
        <thead><tr><th>Equipamento</th><th class="r">Qtd</th><th>Base</th><th></th></tr></thead>
        <tbody id="tb_sist"></tbody></table></div>
    </section>

    <!-- 7. ESTOQUE PARADO (ex-Laboratório) -->
    <section class="glass sec">
      <div class="sechead"><h3>Estoque parado</h3>
        <span class="cnt">${DB.parado.length} registros · não contam como disponível</span><div class="sp"></div>
        <button class="addbtn" onclick="__crud.openForm('estoque_parado')">+ Novo</button></div>
      <div class="filters"><input id="fz_q" placeholder="Buscar equipamento…"></div>
      <div class="tblwrap"><table>
        <thead><tr><th>Equipamento</th><th class="r">Qtd</th><th>Data</th><th>Motivo</th><th></th></tr></thead>
        <tbody id="tb_par"></tbody></table></div>
    </section>
  </div>`

  drawItens(); drawFora(); drawPain(); drawSist(); drawPar(); wireConsulta()
  $('#fi_q').oninput=drawItens; $('#fi_cat').onchange=drawItens; $('#fi_st').onchange=drawItens
  $('#fo_q').oninput=drawFora
  $('#fp_q').oninput=drawPain; $('#fp_b').onchange=drawPain
  $('#fs_q').oninput=drawSist
  $('#fz_q').oninput=drawPar
}

const acts=(t,id,lb)=>`<td><div class="acts">
  <button class="ico" title="Editar" onclick='__crud.openForm("${t}",${JSON.stringify(id).replace(/'/g,"&#39;")})'>&#9998;</button>
  <button class="ico del" title="Excluir" onclick='__crud.delRow("${t}","${id.id}",${JSON.stringify(lb).replace(/'/g,"&#39;")})'>&#10005;</button>
</div></td>`

function drawItens(){
  const q=($('#fi_q').value||'').toLowerCase(), cat=$('#fi_cat').value, st=$('#fi_st').value
  let rows=DB.itens.filter(x=>String(x.descricao||'').toLowerCase().includes(q))
  if(cat) rows=rows.filter(x=>(x.categoria||'').trim()===cat)
  if(st==='z') rows=rows.filter(x=>((+x.disp_bsb||0)+(+x.disp_sp||0))===0)
  if(st==='b') rows=rows.filter(x=>{const t=(+x.est_bsb||0)+(+x.est_sp||0),d=(+x.disp_bsb||0)+(+x.disp_sp||0);return t>0&&d/t<0.2})
  $('#ct_itens').textContent=rows.length+' itens'
  $('#tb_itens').innerHTML=rows.map(x=>{
    const t=(+x.est_bsb||0)+(+x.est_sp||0), d=(+x.disp_bsb||0)+(+x.disp_sp||0)
    const pct=t?Math.round(d/t*100):0
    const cor=pct>50?'#37c98a':pct>20?'#f2b53c':'#ff2b38'
    return `<tr><td>${esc(x.descricao)}</td>
      <td><span class="chip gy">${esc(x.categoria||'—')}</span></td>
      <td class="r num">${fmt(x.est_bsb)}</td><td class="r num">${fmt(x.disp_bsb)}</td>
      <td class="r num">${fmt(x.est_sp)}</td><td class="r num">${fmt(x.disp_sp)}</td>
      <td><div class="bar"><i style="width:${pct}%;background:${cor}"></i></div><span class="mini">${pct}%</span></td>
      ${acts('estoque_itens',x,x.descricao)}</tr>`}).join('')
    || '<tr><td colspan="8" class="mini" style="padding:18px">Nenhum item encontrado.</td></tr>'
}
function drawFora(){
  const q=($('#fo_q').value||'').toLowerCase()
  const rows=DB.ditens.filter(x=>{
    const dm=x.demandas||{}
    return (String(dm.evento||'')+String(x.equipamento||'')).toLowerCase().includes(q)})
  $('#tb_fora').innerHTML=rows.slice(0,250).map(x=>{
    const dm=x.demandas||{}, r=toDate(dm.data_retorno)
    let ch='<span class="chip wa">fora</span>'
    if(dm.status==='RETORNADA') ch='<span class="chip ok">retornada</span>'
    else if(!dm.data_retorno) ch='<span class="chip nt">sem previsão</span>'
    else if(r&&r<HOJE) ch='<span class="chip no">atrasado</span>'
    const qt = x.quantidade==null ? '<span class="chip wa">contar</span>' : fmt(x.quantidade)
    return `<tr><td>${esc(dm.evento||'—')}</td>
      <td class="mini">${esc(String(x.equipamento).slice(0,44))}</td>
      <td class="r num">${qt}</td>
      <td><span class="chip gy">${esc(x.tipo_item||'—')}</span></td>
      <td>${dbr(dm.data_saida)}</td><td>${dbr(dm.data_retorno)}</td><td>${ch}</td>
      ${acts('demanda_itens',x,x.equipamento)}</tr>`}).join('')
    || '<tr><td colspan="8" class="mini" style="padding:18px">Nada fora no momento.</td></tr>'
}
function drawPain(){
  const q=($('#fp_q').value||'').toLowerCase(), b=$('#fp_b').value
  let rows=DB.paineis.filter(x=>String(x.equipamento||'').toLowerCase().includes(q))
  if(b) rows=rows.filter(x=>x.base===b)
  $('#tb_pain').innerHTML=rows.map(x=>`<tr><td>${esc(x.equipamento)}</td>
    <td><span class="chip gy">${esc(x.base||'—')}</span></td>
    <td><span class="chip ${x.ambiente==='OUTDOOR'?'nt':'gy'}">${esc(x.ambiente||'—')}</span></td>
    <td class="r num">${fmt(x.quantidade)}</td><td class="r num">${fmt(x.metragem)}</td>
    ${acts('paineis_metragem',x,x.equipamento)}</tr>`).join('')
    || '<tr><td colspan="6" class="mini" style="padding:18px">Nenhum painel.</td></tr>'
}
function drawSist(){
  const q=($('#fs_q').value||'').toLowerCase()
  const rows=DB.sistema.filter(x=>String(x.equipamento||'').toLowerCase().includes(q))
  $('#tb_sist').innerHTML=rows.map(x=>`<tr><td>${esc(x.equipamento)}</td>
    <td class="r num">${fmt(x.quantidade)}</td><td><span class="chip gy">${esc(x.base||'BSB')}</span></td>
    ${acts('sistema_mainpower',x,x.equipamento)}</tr>`).join('')
    || '<tr><td colspan="4" class="mini" style="padding:18px">Nenhum equipamento.</td></tr>'
}
function drawPar(){
  const q=($('#fz_q').value||'').toLowerCase()
  const rows=DB.parado.filter(x=>String(x.equipamento||'').toLowerCase().includes(q))
  $('#tb_par').innerHTML=rows.map(x=>`<tr><td>${esc(x.equipamento)}</td>
    <td class="r num">${fmt(x.quantidade)}</td><td>${dbr(x.data)}</td><td class="mini">${esc(x.motivo||'—')}</td>
    ${acts('estoque_parado',x,x.equipamento)}</tr>`).join('')
    || '<tr><td colspan="5" class="mini" style="padding:18px">Nada parado.</td></tr>'
}

function wireConsulta(){
  const hoje=new Date().toISOString().slice(0,10)
  $('#q_di').value=hoje
  const d7=new Date(Date.now()+7*864e5).toISOString().slice(0,10); $('#q_df').value=d7
  $('#q_go').onclick=()=>{
    const eq=$('#q_eq').value, qt=+$('#q_qt').value||0, bs=$('#q_bs').value
    const ini=toDate($('#q_di').value), fim=toDate($('#q_df').value)
    const item=DB.itens.find(i=>i.descricao===eq)
    const fisico=estoqueFisico(item,bs)
    const {qtd:fora,lista}=foraNoPeriodo(eq,bs,ini,fim)
    const parado=DB.parado.filter(p=>String(p.equipamento||'').toUpperCase().trim()===eq.toUpperCase().trim())
                          .reduce((a,p)=>a+(+p.quantidade||0),0)
    const disp=fisico-fora-parado
    const ok=disp>=qt
    const out=$('#q_out')
    out.className='verdict on '+(ok?'yes':'non')
    out.innerHTML=`<div class="big" style="color:${ok?'var(--grn)':'var(--red2)'}">
        ${ok?'✓ Disponível':'✕ Indisponível'}</div>
      <div class="mini" style="margin-top:7px;line-height:1.7">
        Pedido: <b>${fmt(qt)}</b> · ${esc(eq)}<br>
        Estoque físico ${bs||'(ambas)'}: <b>${fmt(fisico)}</b><br>
        Fora em evento no período: <b>−${fmt(fora)}</b>${lista.length?` (${lista.length} saída${lista.length>1?'s':''})`:''}<br>
        ${parado?`Estoque parado: <b>−${fmt(parado)}</b><br>`:''}
        <span style="color:${ok?'var(--grn)':'var(--red2)'}">Disponível no período: <b>${fmt(disp)}</b></span>
      </div>
      ${lista.length?`<div style="margin-top:11px"><div class="eyebrow" style="margin-bottom:6px">Conflitos</div>
        ${lista.slice(0,6).map(s=>`<div class="mini">• ${esc(s.evento||'—')} — ${fmt(s.quantidade)} un · ${dbr(s.data_saida)} → ${dbr(s.data_retorno)}</div>`).join('')}
        ${lista.length>6?`<div class="mini">+ ${lista.length-6} outros…</div>`:''}</div>`:''}`
  }
}

window.loadAll=loadAll
loadAll()
</script>
